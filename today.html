<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fff7f0">
<title>今日任务 · 家庭学习门户</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a class="back" href="index.html">‹</a>
    <h1 id="title">今日任务</h1>
  </div>

  <div class="card" id="dateCard">
    <div style="font-size:15px;color:var(--muted)">今天是</div>
    <div id="dateText" style="font-size:22px;font-weight:800">—</div>
  </div>

  <div id="list" class="grid">
    <div class="empty">正在加载今日任务…</div>
  </div>

  <div class="grid" style="margin-top:16px">
    <a class="app-card" id="appsLink" href="apps.html" style="border-left-color:var(--candy-purple)">
      <span class="ico">🎮</span>
      <span><div class="t">打开软件库</div><div class="meta">所有学习软件</div></span>
    </a>
    <a class="app-card" id="podcastLink" href="#" style="border-left-color:var(--candy-pink)">
      <span class="ico">🎧</span>
      <span><div class="t">今日播报</div><div class="meta" id="podMeta">点这里听今天的播报</div></span>
    </a>
  </div>

  <div class="footer-note">选一个开始今天的学习吧 ✨</div>
</div>

<script>
  const CHILD_NAME = { kenton: "Kenton", eddey: "Eddey" };
  const CHILD_ICON = { kenton: "🦁", eddey: "🐯" };
  const SUBJECT_META = { "语文":{ico:"📜",color:"#ff8a5b"}, "数学":{ico:"🔢",color:"#8ce99a"}, "英语":{ico:"📖",color:"#36c5d6"} };
  const SUBJECT_ORDER = ["语文","数学","英语"];
  const SUBJECT_MAP = { "古诗":"语文", "综合":"语文" }; // 折叠到三类
  function norm(s){ return SUBJECT_MAP[s] || s || "英语"; }
  function getParam(k){ return new URLSearchParams(location.search).get(k); }
  function todayStr(){ const d=new Date(), p=n=>(n<10?'0':'')+n; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }

  async function load() {
    const who = getParam("who") || "kenton";
    document.title = CHILD_NAME[who] + " 的今日任务";
    document.getElementById("title").textContent =
      (CHILD_ICON[who]||"") + " " + (CHILD_NAME[who]||who) + " 的今日任务";
    document.getElementById("appsLink").href = "apps.html?who=" + who;
    document.getElementById("dateText").textContent = todayStr();

    const list = document.getElementById("list");
    try {
      const res = await fetch("data/tasks.json", { cache: "no-store" });
      const data = await res.json();
      const tasks = data[who] || [];
      if (!tasks.length) {
        list.innerHTML = '<div class="empty">今天还没安排任务，去软件库自由探索吧 ✨</div>';
      } else {
        let html = "";
        SUBJECT_ORDER.forEach(subj => {
          const items = tasks.filter(t => norm(t.subject) === subj);
          if (!items.length) return;
          const m = SUBJECT_META[subj];
          html += `<div style="margin:14px 0 6px;font-weight:800;font-size:16px;color:${m.color}">${m.ico} ${subj}</div>`;
          html += items.map(t => {
            const ico = t.type === "pdf" ? "📄" : m.ico;
            return `<a class="app-card" href="${t.link}" style="border-left-color:${m.color}">
              <span class="ico">${ico}</span>
              <span><div class="t">${t.title}</div><div class="meta">${subj}</div></span>
            </a>`;
          }).join("");
        });
        list.innerHTML = html;
      }
    } catch (e) {
      list.innerHTML = '<div class="empty">今日任务读取失败，请稍后再试</div>';
    }

    // 今日播报：指向真实最新一期 news_（来自 apps.json）
    try {
      const ares = await fetch("data/apps.json", { cache: "no-store" });
      const apps = await ares.json();
      const news = apps.filter(a => /news_\d{8}\.html$/.test(a.file||''));
      if (news.length) {
        news.sort((a,b)=> (a.file < b.file ? 1 : -1));
        document.getElementById("podcastLink").href = news[0].file;
        document.getElementById("podMeta").textContent = news[0].title || "点这里听今天的播报";
      } else {
        document.getElementById("podMeta").textContent = "播报即将上线";
      }
    } catch (e) {
      document.getElementById("podMeta").textContent = "播报即将上线";
    }
  }
  load();
</script>
</body>
</html>
