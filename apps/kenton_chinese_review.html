<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>语文期末冲刺 · 四下 5-8单元</title>
<style>
:root{
  --teal:#36c5d6;--teald:#1aa7b8;--tealbg:#e3fbff;
  --gold:#F2B632;--golddk:#D89400;--ink:#28323a;--paper:#f3fcff;
  --card:#fff;--line:#d7eef2;--green:#3C9D54;--greenbg:#EAF7EC;
  --red:#e15546;--redbg:#fdecea;--muted:#7d8b93;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'LXGW WenKai Screen','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
  background:radial-gradient(circle at 12% 6%,#d7f6ff 0,transparent 40%),radial-gradient(circle at 90% 96%,#ffe9c8 0,transparent 42%),var(--paper);
  color:var(--ink);min-height:100vh;padding:0 0 40px;}
.wrap{max-width:560px;margin:0 auto;padding:14px;}
.top{display:flex;align-items:center;gap:10px;padding:8px 2px 12px;}
.top .badge{background:var(--teal);color:#fff;font-weight:800;font-size:18px;padding:6px 13px;border-radius:13px 13px 13px 4px;box-shadow:0 4px 0 var(--teald);}
.top h1{font-size:17px;margin:0;flex:1;}
.top a.home{text-decoration:none;font-size:20px;background:#fff;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:var(--ink);box-shadow:0 3px 0 #cfe9ee;flex-shrink:0;}
.card{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:18px;margin:12px 0;box-shadow:0 6px 0 #e2f1f4;}
.modgrid{display:grid;gap:12px;}
.mod{display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);border-left:7px solid var(--teal);border-radius:16px;padding:15px;cursor:pointer;box-shadow:0 5px 0 #e2f1f4;text-align:left;width:100%;font-family:inherit;color:inherit;}
.mod:active{transform:translateY(2px);box-shadow:0 3px 0 #e2f1f4;}
.mod .ico{font-size:30px;}
.mod .t{font-size:18px;font-weight:800;}
.mod .meta{font-size:13px;color:var(--muted);margin-top:2px;}
.mod.allin{border-left-color:var(--gold);background:linear-gradient(180deg,#fffdf6,#fff);}
.qhead{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:6px;}
.bar{height:9px;background:#e6f3f6;border-radius:6px;overflow:hidden;margin-bottom:14px;}
.bar>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s;}
.qtag{display:inline-block;font-size:12px;background:var(--tealbg);color:var(--teald);padding:3px 10px;border-radius:20px;font-weight:700;margin-bottom:10px;}
.qtext{font-size:21px;font-weight:800;line-height:1.5;margin:4px 0 16px;}
.qtext .blank{color:var(--teald);border-bottom:3px solid var(--gold);padding:0 18px;}
.opts{display:grid;gap:11px;}
.opt{font-family:inherit;font-size:18px;text-align:left;background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;color:var(--ink);box-shadow:0 4px 0 #e2f1f4;}
.opt:active{transform:translateY(2px);box-shadow:0 2px 0 #e2f1f4;}
.opt.right{background:var(--greenbg);border-color:var(--green);color:var(--green);font-weight:800;}
.opt.wrong{background:var(--redbg);border-color:var(--red);color:var(--red);font-weight:800;}
.opt.dim{opacity:.5;}
.fb{margin-top:14px;padding:13px 15px;border-radius:14px;font-size:16px;line-height:1.6;display:none;}
.fb.ok{background:var(--greenbg);color:var(--green);display:block;}
.fb.no{background:var(--redbg);color:var(--red);display:block;}
.next{margin-top:16px;width:100%;font-family:inherit;font-size:18px;font-weight:800;color:#fff;background:var(--teal);border:none;border-radius:14px;padding:15px;cursor:pointer;box-shadow:0 5px 0 var(--teald);display:none;}
.next:active{transform:translateY(2px);box-shadow:0 3px 0 var(--teald);}
.bigbtn{width:100%;font-family:inherit;font-size:18px;font-weight:800;border-radius:14px;padding:15px;cursor:pointer;border:none;margin-top:10px;}
.bigbtn.primary{color:#fff;background:var(--teal);box-shadow:0 5px 0 var(--teald);}
.bigbtn.gold{color:#fff;background:var(--gold);box-shadow:0 5px 0 var(--golddk);}
.bigbtn.ghost{background:#fff;color:var(--teald);border:2px solid var(--teal);box-shadow:0 5px 0 #e2f1f4;}
.bigbtn:active{transform:translateY(2px);}
.score{font-size:54px;font-weight:900;text-align:center;color:var(--teal);}
.scoresub{text-align:center;color:var(--muted);margin-bottom:8px;}
.wronglist{margin:10px 0;}
.wrongitem{background:var(--redbg);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:15px;}
.wrongitem b{color:var(--red);}
textarea{width:100%;height:150px;font-size:12px;border:2px solid var(--line);border-radius:12px;padding:10px;font-family:monospace;}
.hide{display:none;}
.tip{font-size:13px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}
.streak{text-align:center;font-size:15px;color:var(--golddk);font-weight:700;height:20px;margin-bottom:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="home" href="../index.html">‹</a>
    <span class="badge">语文冲刺</span>
    <h1>四下期末 · 5-8单元</h1>
  </div>

  <!-- 首页：选模块 -->
  <div id="menu">
    <div class="card" style="padding:14px 16px">
      <div style="font-weight:800;font-size:16px">挑一关开始练 💪</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">全是点选题，不用打字。做完可以导出成绩发给爸爸。</div>
    </div>
    <div class="modgrid" id="modgrid"></div>
    <div class="tip" id="histTip"></div>
  </div>

  <!-- 答题区 -->
  <div id="quiz" class="hide">
    <div class="card">
      <div class="qhead"><span id="qProgress">第 1 / 10 题</span><span id="qScore">✅ 0 ❌ 0</span></div>
      <div class="bar"><i id="qbar"></i></div>
      <div class="streak" id="streak"></div>
      <span class="qtag" id="qtag">多音字</span>
      <div class="qtext" id="qtext"></div>
      <div class="opts" id="opts"></div>
      <div class="fb" id="fb"></div>
      <button class="next" id="nextBtn">下一题 ›</button>
    </div>
  </div>

  <!-- 小结 -->
  <div id="result" class="hide">
    <div class="card">
      <div class="score" id="rScore">0%</div>
      <div class="scoresub" id="rSub"></div>
      <div id="rWrong"></div>
      <button class="bigbtn gold" id="retryWrong">只重练错题 🔁</button>
      <button class="bigbtn primary" id="againBtn">再练一遍这一关 ↺</button>
      <button class="bigbtn ghost" id="backMenu">← 回到选关</button>
    </div>
    <div class="card">
      <div style="font-weight:800;font-size:16px;margin-bottom:6px">📤 导出成绩发给爸爸</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:10px">点下面按钮复制，把内容发给爸爸，他会存进你的学习档案，下次专门帮你练错的地方。</div>
      <button class="bigbtn primary" id="copyBtn" style="margin-top:0">📋 复制我的练习存档</button>
      <textarea id="exportBox" class="hide" readonly></textarea>
    </div>
  </div>
</div>

function mkOpts(correct,pool){
  var seen={};seen[correct]=1;var opts=[correct];
  var p=shuffle(pool);
  for(var i=0;i<p.length && opts.length<4;i++){if(!seen[p[i]]){seen[p[i]]=1;opts.push(p[i]);}}
  return shuffle(opts);
}

function buildDuoyin(){
  var qs=[];
  DATA.duoyin.forEach(function(d){
    var allyin=[];DATA.duoyin.forEach(function(x){x.r.forEach(function(rr){allyin.push(rr[0]);});});
    d.r.forEach(function(rr){
      qs.push({tag:"多音字",q:'「'+rr[1]+'」中「'+d.c+'」读什么？',a:rr[0],opts:mkOpts(rr[0],allyin),word:d.c+'('+rr[1]+')'});
    });
  });
  return qs;
}
function buildYinhard(){
  return DATA.yinhard.map(function(d){
    return {tag:"易错字音",q:'「'+d[0]+'」的红色字读音是？',a:d[1],opts:shuffle([d[1],d[2]]),word:d[0]};
  });
}
function buildXingjin(){
  return DATA.xingjin.map(function(d){
    return {tag:"形近字",q:'选择正确的字：'+d[0].replace("__","（　）"),a:d[1],opts:shuffle(d[2].slice()),word:d[0].replace("__",d[1])};
  });
}
function buildCiyu(){

}
function buildQiuxue(){

  });
}
function buildShici(){

    return {tag:"古诗警句",q:d[0],a:d[1],opts:shuffle(d[2].slice()),word:d[1]};

function buildSimple(key){
  return function(){
    return DATA[key].map(function(d){
      return {tag:MODULES.filter(function(m){return m.id===key;})[0].name,q:d[0],a:d[1],opts:shuffle(d[2].slice()),word:d[1]};
    });
  };
}

/* ============ 状态与逻辑 ============ */
var STORE_KEY="kenton_chinese_review_v1";
var cur=null; // 当前session

function loadStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{events:[]};}catch(e){return {events:[]};}}
function saveEvent(ev){var s=loadStore();s.events.push(ev);try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){}}

function renderMenu(){
  var g=document.getElementById("modgrid");g.innerHTML="";
  // 综合闯关
  var all=document.createElement("button");all.className="mod allin";
  all.innerHTML='<span class="ico">🏆</span><span><div class="t">综合闯关（随机20题）</div><div class="meta">各关混合抽题，检验整体水平</div></span>';
  all.onclick=function(){startAll();};g.appendChild(all);
  MODULES.forEach(function(m){
    var qs=m.build();
    var b=document.createElement("button");b.className="mod";
    b.innerHTML='<span class="ico">'+m.ico+'</span><span><div class="t">'+m.name+'</div><div class="meta">'+qs.length+' 题</div></span>';
    b.onclick=function(){startQuiz(m.name,qs);};
    g.appendChild(b);
  });
  var s=loadStore();
  document.getElementById("histTip").innerHTML = s.events.length
    ? '你已经练了 <b>'+s.events.length+'</b> 关啦，继续加油 🌟<br>做完记得导出发给爸爸哦'
    : '第一次来？随便挑一关试试吧 ✨';
}

function startAll(){
  var pool=[];MODULES.forEach(function(m){pool=pool.concat(m.build());});
  startQuiz("综合闯关",shuffle(pool).slice(0,20));
}

function startQuiz(name,qs){
  cur={name:name,qs:shuffle(qs),idx:0,right:0,wrong:0,items:[],t0:Date.now(),qt0:0};
  show("quiz");renderQ();
}

function show(id){
  ["menu","quiz","result"].forEach(function(x){document.getElementById(x).classList.add("hide");});
  document.getElementById(id).classList.remove("hide");
  window.scrollTo(0,0);
}

function renderQ(){
  var q=cur.qs[cur.idx];cur.qt0=Date.now();
  document.getElementById("qProgress").textContent="第 "+(cur.idx+1)+" / "+cur.qs.length+" 题";
  document.getElementById("qScore").textContent="✅ "+cur.right+" ❌ "+cur.wrong;
  document.getElementById("qbar").style.width=(cur.idx/cur.qs.length*100)+"%";
  document.getElementById("qtag").textContent=q.tag;
  document.getElementById("qtext").innerHTML=q.q.replace(/______/g,'<span class="blank">？</span>');
  document.getElementById("streak").textContent="";
  var fb=document.getElementById("fb");fb.className="fb";fb.textContent="";
  document.getElementById("nextBtn").style.display="none";
  var o=document.getElementById("opts");o.innerHTML="";
  q.opts.forEach(function(opt){
    var b=document.createElement("button");b.className="opt";b.textContent=opt;
    b.onclick=function(){answer(b,opt,q);};
    o.appendChild(b);
  });
}

function answer(btn,chosen,q){
  var ms=Date.now()-cur.qt0;
  var ok=(chosen===q.a);
  var btns=document.getElementById("opts").querySelectorAll(".opt");
  btns.forEach(function(b){
    b.onclick=null;
    if(b.textContent===q.a)b.classList.add("right");
    else if(b===btn)b.classList.add("wrong");
    else b.classList.add("dim");
  });
  var fb=document.getElementById("fb");
  if(ok){cur.right++;fb.className="fb ok";fb.textContent="✅ 答对啦！";}
  else{cur.wrong++;fb.className="fb no";fb.textContent="❌ 正确答案：「"+q.a+"」";}
  document.getElementById("qScore").textContent="✅ "+cur.right+" ❌ "+cur.wrong;
  cur.items.push({word:q.a,hint:q.q,ok:ok,ms:ms,user:chosen});
  var nb=document.getElementById("nextBtn");
  nb.textContent=(cur.idx+1>=cur.qs.length)?"看成绩 🎉":"下一题 ›";
  nb.style.display="block";
}

document.getElementById("nextBtn").onclick=function(){
  cur.idx++;
  if(cur.idx>=cur.qs.length)finish();
  else renderQ();
};

function finish(){
  var dur=Math.round((Date.now()-cur.t0)/1000);
  var total=cur.qs.length;
  // 记录事件（兼容默写软件格式）
  var ev={ts:Date.now(),type:"review",subject:"cn",lesson:cur.name,total:total,wrong:cur.wrong,durationSec:dur,items:cur.items};
  saveEvent(ev);
  cur.lastEvent=ev;
  // 渲染小结
  var pct=Math.round(cur.right/total*100);
  document.getElementById("rScore").textContent=pct+"%";
  document.getElementById("rSub").textContent="「"+cur.name+"」 答对 "+cur.right+" / "+total+" 题 · 用时 "+dur+" 秒"+(pct>=90?" 🌟太棒了！":pct>=70?" 👍不错！":" 加油，多练几遍！");
  var wl=document.getElementById("rWrong");
  var wrongs=cur.items.filter(function(it){return !it.ok;});
  if(wrongs.length){
    var h='<div style="font-weight:800;margin:10px 0 4px">错题回顾：</div><div class="wronglist">';
    wrongs.forEach(function(it){h+='<div class="wrongitem">'+it.hint.replace(/______/g,'____')+'<br>你选了「'+it.user+'」，正确是 <b>'+it.word+'</b></div>';});
    h+='</div>';wl.innerHTML=h;
    document.getElementById("retryWrong").style.display="block";
  }else{wl.innerHTML='<div style="text-align:center;color:var(--green);font-weight:800;font-size:18px;margin:10px 0">全对！完美通关 🎉</div>';document.getElementById("retryWrong").style.display="none";}
  document.getElementById("exportBox").classList.add("hide");
  document.getElementById("copyBtn").textContent="📋 复制我的练习存档";
  show("result");
}

document.getElementById("retryWrong").onclick=function(){
  var wrongQs=cur.qs.filter(function(q,i){ // 取本轮答错的题
    return cur.items[i] && !cur.items[i].ok;
  });
  if(!wrongQs.length){return;}
  startQuiz(cur.name+"（错题重练）",wrongQs);
};
document.getElementById("againBtn").onclick=function(){
  var name=cur.name.replace("（错题重练）","");
  var mod=MODULES.filter(function(m){return m.name===name;})[0];
  if(name==="综合闯关")startAll();
  else if(mod)startQuiz(mod.name,mod.build());
  else renderMenu(),show("menu");
};
document.getElementById("backMenu").onclick=function(){renderMenu();show("menu");};

/* 导出（格式兼容默写软件，可直接投喂给Claude归档） */
document.getElementById("copyBtn").onclick=function(){
  var s=loadStore();
  var txt=buildExport(s);
  var box=document.getElementById("exportBox");
  box.value=txt;box.classList.remove("hide");
  box.select();
  var done=false;
  try{done=document.execCommand("copy");}catch(e){}
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){},function(){});}
  document.getElementById("copyBtn").textContent=done?"✅ 已复制！发给爸爸吧":"👆 长按上面文字框全选复制";
};

function pad(n){return n<10?"0"+n:""+n;}
function fmt(ts){var d=new Date(ts);return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes());}
function buildExport(s){
  var lines=[];
  lines.push("【哥哥语文复习档案】导出时间:"+fmt(Date.now()));
  lines.push("练习总关数:"+s.events.length);
  lines.push("");
  // 反复错的题（错≥2次）
  var wrongCount={};
  s.events.forEach(function(e){(e.items||[]).forEach(function(it){if(!it.ok)wrongCount[it.word]=(wrongCount[it.word]||0)+1;});});
  var rep=Object.keys(wrongCount).filter(function(k){return wrongCount[k]>=2;});
  lines.push("== 反复错的题(错≥2次,优先复习)==");
  lines.push(rep.length?rep.map(function(k){return k+"(错"+wrongCount[k]+"次)";}).join("、"):"(无)");
  lines.push("");
  lines.push("== 每关明细 ==");
  s.events.forEach(function(e){
    lines.push("["+fmt(e.ts)+"] "+e.lesson+" ｜ "+(e.total-e.wrong)+"/"+e.total+"对 ｜ "+e.durationSec+"秒");
    var w=(e.items||[]).filter(function(it){return !it.ok;});
    if(w.length)lines.push("  错题:"+w.map(function(it){return it.word+"(选了"+it.user+")";}).join("、"));
  });
  lines.push("");
  lines.push("== 原始数据(JSON,可直接投喂给Claude)==");
  lines.push(JSON.stringify({child:"哥哥",subject:"语文四下5-8单元",events:s.events}));
  return lines.join("\n");
}

renderMenu();
</script>
