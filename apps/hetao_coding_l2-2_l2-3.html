<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核桃 L2-2 复习 & L2-3 预习 · 听读版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange-1: #FF6B35;
  --orange-2: #FF8C42;
  --orange-3: #FFB347;
  --purple-1: #6B5BFF;
  --purple-2: #8B7FFF;
  --green-1: #4ECDC4;
  --green-2: #5FD9D0;
  --yellow-1: #FFD93D;
  --pink-1: #FF6B9D;
  --bg-warm: #FFF8F0;
  --ink: #2D2A4A;
  --ink-soft: #5A5775;
  --shadow: 0 8px 32px rgba(45, 42, 74, 0.15);
  --good: #2BB673;
  --bad: #E64A4A;
}

html, body {
  height: 100%;
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 100%);
  color: var(--ink);
  overflow: hidden;
  user-select: none;
}

.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
  border-bottom: 2px solid rgba(255, 107, 53, 0.15);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 16px;
  color: var(--orange-1);
}

.brand .logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
}

.controls { display: flex; gap: 8px; align-items: center; }

.btn {
  background: white;
  border: 2px solid var(--orange-1);
  color: var(--orange-1);
  padding: 7px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.btn:hover { background: var(--orange-1); color: white; transform: translateY(-2px); }
.btn.muted { background: #ccc; border-color: #999; color: #555; }

.start-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, var(--orange-1) 0%, var(--orange-2) 50%, var(--yellow-1) 100%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  padding: 32px;
  transition: opacity 0.6s, visibility 0.6s;
}

.start-overlay.hidden { opacity: 0; visibility: hidden; }

.start-emoji { font-size: 110px; margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
.start-title { font-size: 48px; font-weight: 900; margin-bottom: 14px; letter-spacing: -1px; }
.start-sub { font-size: 20px; font-weight: 600; opacity: 0.95; margin-bottom: 30px; max-width: 640px; line-height: 1.6; }

.start-btn {
  background: white;
  color: var(--orange-1);
  border: none;
  padding: 18px 50px;
  border-radius: 999px;
  font-size: 24px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  transition: all 0.2s;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 12px;
}

.start-btn:hover { transform: scale(1.05); }

.start-tips {
  margin-top: 28px;
  font-size: 15px;
  opacity: 0.88;
  font-weight: 600;
  line-height: 1.7;
}

.progress-bar {
  position: fixed;
  top: 56px;
  left: 0; right: 0;
  height: 6px;
  background: rgba(255, 255, 255, 0.5);
  z-index: 99;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange-1), var(--yellow-1));
  width: 0%;
  transition: width 0.4s ease-out;
  box-shadow: 0 0 12px rgba(255, 107, 53, 0.6);
}

.speech-indicator {
  position: fixed;
  top: 70px;
  right: 16px;
  background: white;
  padding: 8px 14px;
  border-radius: 999px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--orange-1);
  z-index: 98;
  max-width: 70%;
}

.speech-indicator.show { display: flex; }

.speech-indicator .wave { display: inline-flex; gap: 2px; align-items: center; }
.speech-indicator .wave span {
  width: 3px;
  background: var(--orange-1);
  border-radius: 2px;
  animation: wave 1s ease-in-out infinite;
}
.speech-indicator .wave span:nth-child(1) { height: 10px; animation-delay: 0s; }
.speech-indicator .wave span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
.speech-indicator .wave span:nth-child(3) { height: 12px; animation-delay: 0.3s; }
.speech-indicator .wave span:nth-child(4) { height: 18px; animation-delay: 0.45s; }
.speech-indicator .wave span:nth-child(5) { height: 10px; animation-delay: 0.6s; }

@keyframes wave {
  0%, 100% { transform: scaleY(0.5); }
  50% { transform: scaleY(1); }
}

.stage {
  position: fixed;
  top: 62px; left: 0;
  right: 0; bottom: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.slide {
  position: absolute;
  width: 100%;
  max-width: 1100px;
  height: 100%;
  max-height: 720px;
  background: white;
  border-radius: 32px;
  box-shadow: var(--shadow);
  padding: 30px 42px;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(40px) scale(0.96);
  transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
              transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  pointer-events: none;
  overflow: hidden;
}

.slide.active {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.slide-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-shrink: 0;
}

.chapter-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.5px;
}

.tag-review {
  background: linear-gradient(135deg, #4ECDC4, #5FD9D0);
  color: white;
  box-shadow: 0 4px 16px rgba(78, 205, 196, 0.35);
}

.tag-new {
  background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
  color: white;
  box-shadow: 0 4px 16px rgba(255, 107, 53, 0.35);
}

.tag-tip {
  background: linear-gradient(135deg, var(--purple-1), var(--purple-2));
  color: white;
  box-shadow: 0 4px 16px rgba(107, 91, 255, 0.35);
}

.slide-counter {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-soft);
  background: var(--bg-warm);
  padding: 5px 12px;
  border-radius: 999px;
}

.slide-title {
  font-size: 33px;
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--ink) 0%, var(--orange-1) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.slide-subtitle {
  font-size: 18px;
  color: var(--ink-soft);
  font-weight: 600;
  margin-bottom: 16px;
}

.slide-body {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 单词卡 */
.word-card {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 28px;
  align-items: center;
}

.word-left { min-width: 0; }

.word-big {
  font-family: "Georgia", serif;
  font-size: 84px;
  font-weight: 900;
  color: var(--orange-1);
  line-height: 1;
  letter-spacing: -2px;
  margin-bottom: 4px;
  cursor: pointer;
  transition: transform 0.2s;
  display: inline-block;
}

.word-big:hover { transform: scale(1.05); }

.speak-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--purple-1), var(--purple-2));
  color: white;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(107, 91, 255, 0.3);
  margin-bottom: 12px;
}

.word-phonetic {
  font-size: 26px;
  color: var(--ink-soft);
  font-weight: 400;
  margin-bottom: 16px;
  font-family: "Georgia", serif;
}

.word-meaning {
  font-size: 22px;
  line-height: 1.55;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 14px;
}

.word-meaning .pos {
  color: var(--purple-1);
  font-style: italic;
  margin-right: 8px;
  font-weight: 800;
}

.word-meaning .line { display: block; margin-bottom: 4px; }

.word-phrase {
  background: linear-gradient(135deg, #FFE8D6 0%, #FFD4A3 100%);
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  border-left: 6px solid var(--orange-1);
  display: inline-block;
}

.word-phrase .label {
  display: inline-block;
  background: var(--orange-1);
  color: white;
  padding: 2px 10px;
  border-radius: 8px;
  font-size: 13px;
  margin-right: 10px;
  vertical-align: middle;
}

.word-emoji {
  font-size: 160px;
  text-align: center;
  filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.15));
}

/* 知识点卡 */
.concept-grid { display: grid; gap: 14px; }

.concept-row {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 20px;
  align-items: center;
  padding: 16px 20px;
  background: var(--bg-warm);
  border-radius: 18px;
  border-left: 6px solid var(--orange-1);
  font-size: 19px;
}

.concept-row.alt { border-left-color: var(--purple-1); background: #F0EEFF; }
.concept-row.alt2 { border-left-color: var(--green-1); background: #E8FAF8; }

.concept-icon { font-size: 38px; flex-shrink: 0; }
.concept-text { font-weight: 600; line-height: 1.5; }
.concept-text strong { color: var(--orange-1); font-weight: 900; }
.concept-row.alt .concept-text strong { color: var(--purple-1); }
.concept-row.alt2 .concept-text strong { color: var(--green-1); }

/* 代码块 */
.code-block {
  background: #1E1B3A;
  color: #E0E0F0;
  border-radius: 16px;
  padding: 20px 24px;
  font-family: "Consolas", "Monaco", monospace;
  font-size: 20px;
  line-height: 1.7;
  box-shadow: 0 8px 24px rgba(30, 27, 58, 0.3);
  position: relative;
  margin-bottom: 12px;
}

.code-block::before {
  content: "● ● ●";
  position: absolute;
  top: 10px;
  left: 16px;
  color: #FF6B6B;
  font-size: 12px;
  letter-spacing: 4px;
}

.code-block .code-content { margin-top: 16px; }

.code-key { color: #FF6B9D; font-weight: 700; }
.code-str { color: #FFD93D; }
.code-num { color: #4ECDC4; }
.code-cmt { color: #888; font-style: italic; }
.code-var { color: #95EFFE; }
.code-op { color: #FFB347; }
.code-fn { color: #C5A0FF; font-weight: 700; }

.code-explain {
  background: linear-gradient(135deg, #FFF4D6 0%, #FFE8A3 100%);
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  color: #5A3D00;
  line-height: 1.6;
  border-left: 5px solid #FFB347;
}

.code-explain .label {
  display: inline-block;
  background: #FFB347;
  color: white;
  padding: 2px 10px;
  border-radius: 8px;
  font-size: 12px;
  margin-right: 8px;
  vertical-align: middle;
  font-weight: 800;
}

/* 逻辑运算符大符号卡 */
.logic-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 28px;
  align-items: center;
  margin-bottom: 16px;
}

.logic-symbol-box {
  background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
  color: white;
  border-radius: 24px;
  padding: 24px 32px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
}

.logic-symbol-box.or {
  background: linear-gradient(135deg, var(--purple-1), var(--purple-2));
  box-shadow: 0 8px 24px rgba(107, 91, 255, 0.4);
}

.logic-symbol {
  font-family: "Consolas", monospace;
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}

.logic-cn { font-size: 30px; font-weight: 900; }

.logic-rule {
  font-size: 21px;
  font-weight: 700;
  line-height: 1.6;
  color: var(--ink);
}

.logic-rule strong { color: var(--orange-1); font-weight: 900; }
.logic-rule.or strong { color: var(--purple-1); }

/* 例题卡（&& 和 || 的四个例子） */
.example-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.example-cell {
  background: var(--bg-warm);
  border-radius: 16px;
  padding: 16px 18px;
  border: 2px solid #eee;
}

.example-cell.good { border-color: var(--good); background: #EAFBF2; }
.example-cell.bad { border-color: var(--bad); background: #FDEEEE; }

.example-vals {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}

.example-expr {
  font-family: "Consolas", monospace;
  font-size: 17px;
  font-weight: 700;
  color: var(--ink-soft);
  margin-bottom: 8px;
}

.example-result {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 18px;
  font-weight: 900;
  padding: 4px 14px;
  border-radius: 999px;
}

.example-cell.good .example-result { background: var(--good); color: white; }
.example-cell.bad .example-result { background: var(--bad); color: white; }

/* 注意提示卡 */
.note-card {
  background: linear-gradient(135deg, #FFF4D6 0%, #FFE8A3 100%);
  border-radius: 18px;
  padding: 20px 24px;
  border-left: 6px solid #FFB347;
}

.note-title {
  font-size: 20px;
  font-weight: 900;
  color: #C84B1A;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.note-item {
  font-size: 18px;
  font-weight: 700;
  color: #5A3D00;
  line-height: 1.6;
  margin-bottom: 6px;
  display: flex;
  gap: 8px;
}

.note-item .num {
  background: #FFB347;
  color: white;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* 与或对比卡 */
.andor-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.andor-card {
  padding: 22px;
  border-radius: 22px;
  text-align: center;
}

.andor-and {
  background: linear-gradient(135deg, #FFE8D6 0%, #FFD4A3 100%);
  border: 3px solid var(--orange-1);
}

.andor-or {
  background: linear-gradient(135deg, #E0DAFF 0%, #C5BAFF 100%);
  border: 3px solid var(--purple-1);
}

.andor-symbol {
  font-family: "Consolas", monospace;
  font-size: 60px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 8px;
}

.andor-and .andor-symbol { color: var(--orange-1); }
.andor-or .andor-symbol { color: var(--purple-1); }

.andor-cn {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 12px;
}

.andor-and .andor-cn { color: #C84B1A; }
.andor-or .andor-cn { color: #4B3FB8; }

.andor-rule {
  background: white;
  padding: 14px;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.5;
}

.andor-rule .key-and { color: var(--orange-1); font-weight: 900; }
.andor-rule .key-or { color: var(--purple-1); font-weight: 900; }

/* 哥哥弟弟差异化 */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  height: 100%;
}

.compare-card {
  padding: 20px;
  border-radius: 22px;
  display: flex;
  flex-direction: column;
}

.compare-gege {
  background: linear-gradient(135deg, #FFE8D6 0%, #FFD4A3 100%);
  border: 3px solid var(--orange-1);
}

.compare-didi {
  background: linear-gradient(135deg, #E8FAF8 0%, #B8F0EA 100%);
  border: 3px solid var(--green-1);
}

.compare-title {
  font-size: 23px;
  font-weight: 900;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.compare-gege .compare-title { color: #C84B1A; }
.compare-didi .compare-title { color: #2A8F87; }

.compare-list { list-style: none; padding: 0; }

.compare-list li {
  font-size: 16px;
  font-weight: 600;
  padding: 6px 0;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.45;
}

.compare-list li::before {
  content: "✓";
  font-weight: 900;
  flex-shrink: 0;
  margin-top: 1px;
}

.compare-gege .compare-list li::before { color: var(--orange-1); }
.compare-didi .compare-list li::before { color: var(--green-1); }

/* 章节封面 */
.cover-slide {
  background: linear-gradient(135deg, var(--orange-1) 0%, var(--orange-2) 50%, var(--yellow-1) 100%);
  color: white;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.cover-slide.purple {
  background: linear-gradient(135deg, var(--purple-1) 0%, var(--purple-2) 50%, var(--pink-1) 100%);
}

.cover-slide.green {
  background: linear-gradient(135deg, var(--green-1) 0%, #5FD9D0 50%, var(--yellow-1) 100%);
}

.cover-slide.night {
  background: linear-gradient(135deg, #2C3E73 0%, #4B3FB8 50%, #6B5BFF 100%);
}

.cover-mega-title {
  font-size: 76px;
  font-weight: 900;
  line-height: 1.05;
  margin-bottom: 20px;
  text-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  letter-spacing: -2px;
}

.cover-sub {
  font-size: 22px;
  font-weight: 700;
  opacity: 0.95;
  margin-bottom: 14px;
  white-space: pre-line;
  line-height: 1.5;
}

.cover-emoji {
  font-size: 130px;
  margin-bottom: 18px;
  filter: drop-shadow(0 12px 32px rgba(0, 0, 0, 0.2));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* 主题封面卡 */
.theme-card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: center;
}

.theme-emoji-big {
  font-size: 180px;
  text-align: center;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.15));
}

.theme-info {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.theme-label {
  display: inline-block;
  background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
  color: white;
  padding: 6px 16px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 14px;
  width: fit-content;
}

.theme-name {
  font-size: 38px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1.15;
}

.theme-desc {
  font-size: 17px;
  color: var(--ink-soft);
  font-weight: 600;
  line-height: 1.6;
}

.theme-list {
  background: var(--bg-warm);
  padding: 14px 18px;
  border-radius: 14px;
  border-left: 5px solid var(--orange-1);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.7;
}

/* if-else 对比图 */
.ifelse-flow {
  background: var(--bg-warm);
  border-radius: 18px;
  padding: 24px;
  text-align: center;
}

.ifelse-top {
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
  margin-bottom: 18px;
}

.ifelse-branch {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.branch-card {
  border-radius: 16px;
  padding: 18px;
  border: 3px solid;
}

.branch-yes { background: #EAFBF2; border-color: var(--good); }

// ============== 语音引擎 ==============
const synth = window.speechSynthesis;
let voices = [];
let voiceZh = null;
let voiceEn = null;
let isMuted = false;
// 播放令牌：每次切换 slide / 重听 / 停止，都让 token +1
// 所有异步回调都检查自己的 token 是否还等于当前 token，不等于就立刻作废
let speechToken = 0;

function loadVoices() {
  voices = synth.getVoices();
  voiceZh = voices.find(v => /zh-CN/i.test(v.lang) && /female|女|xiaoxiao|huihui/i.test(v.name))
         || voices.find(v => /zh-CN/i.test(v.lang))
         || voices.find(v => /zh/i.test(v.lang))
         || voices.find(v => /chinese/i.test(v.name));
  voiceEn = voices.find(v => /en-US/i.test(v.lang) && /female|samantha|ava|aria/i.test(v.name))
         || voices.find(v => /en-US/i.test(v.lang))
         || voices.find(v => /en-GB/i.test(v.lang))
         || voices.find(v => /^en/i.test(v.lang));
}

loadVoices();
if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = loadVoices;
}

const indicator = document.getElementById('speechIndicator');
const indicatorText = document.getElementById('speechText');

function showIndicator(text) {
  indicatorText.textContent = text;
  indicator.classList.add('show');
}
function hideIndicator() { indicator.classList.remove('show'); }

// myToken：发起这次朗读时的令牌。中途 token 变了就立即作废
function speakOne(item, myToken) {
  return new Promise((resolve) => {
    if (isMuted || myToken !== speechToken) { resolve(); return; }
    try {
      if (!voiceZh || !voiceEn) loadVoices();

      const u = new SpeechSynthesisUtterance(item.text);
      if (item.lang === 'en') {
        u.lang = 'en-US';
        u.voice = voiceEn || null;
        u.rate = 0.82;
        u.pitch = 1.0;
        showIndicator('🇬🇧 ' + item.text);
      } else {
        u.lang = 'zh-CN';
        u.voice = voiceZh || null;
        u.rate = 0.95;
        u.pitch = 1.05;
        showIndicator('🔊 ' + (item.text.length > 26 ? item.text.slice(0, 26) + '...' : item.text));
      }
      u.volume = 1;

      let resolved = false;
      const finish = () => { if (!resolved) { resolved = true; resolve(); } };

      const heartbeat = setInterval(() => {
        if (resolved) { clearInterval(heartbeat); return; }
        // token 变了：这次朗读已作废，立即结束
        if (myToken !== speechToken) { clearInterval(heartbeat); finish(); return; }
        if (!synth.speaking && !synth.pending) { clearInterval(heartbeat); finish(); }
      }, 200);

      const keepAlive = setInterval(() => {
        if (resolved || myToken !== speechToken) { clearInterval(keepAlive); return; }
        if (synth.speaking) { synth.pause(); synth.resume(); }
      }, 10000);

      const cleanFinish = () => {
        clearInterval(heartbeat);
        clearInterval(keepAlive);
        finish();
      };
      u.onend = cleanFinish;
      u.onerror = cleanFinish;

      synth.speak(u);
    } catch (e) {
      console.warn('Speak error', e);
      resolve();
    }
  });
}

function speakSequence(sequence, myToken) {
  return _runSequence(sequence, myToken);
}

async function _runSequence(sequence, myToken) {
  if (!sequence || isMuted) return;
  const total = sequence.length;
  // 只有当前 token 才更新进度条
  if (myToken === speechToken) progressFill.style.width = '0%';

  for (let i = 0; i < sequence.length; i++) {
    // 每句开始前都检查 token
    if (myToken !== speechToken) return;
    if (myToken === speechToken) progressFill.style.width = ((i / total) * 100) + '%';
    await speakOne(sequence[i], myToken);
    // 念完一句再检查一次 token
    if (myToken !== speechToken) return;
    progressFill.style.width = (((i + 1) / total) * 100) + '%';
    await new Promise(r => setTimeout(r, 280));
    if (myToken !== speechToken) return;
  }
  // 全部念完且仍是当前 token，才触发翻页
  if (myToken === speechToken) {
    hideIndicator();
    if (speechFinishedCallback) {
      const cb = speechFinishedCallback;
      speechFinishedCallback = null;
      cb();
    }
  }
}

let speechFinishedCallback = null;

// 停止当前所有朗读：让 token +1，使所有进行中的回调全部作废
function stopSpeech() {
  speechToken++;            // 关键：旧的播放循环检测到 token 变了会立即退出
  speechFinishedCallback = null;
  try { synth.cancel(); } catch(e) {}
  // 某些浏览器 cancel 后仍有残留，再 cancel 一次
  setTimeout(() => { try { synth.cancel(); } catch(e) {} }, 0);
  hideIndicator();
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  if (isMuted) {
    btn.textContent = '🔇 朗读关';
    btn.classList.add('muted');
    stopSpeech();
    if (isPlaying) startTimer();
  } else {
    btn.textContent = '🔊 朗读开';
    btn.classList.remove('muted');
    repeatSpeech();
  }
}

function repeatSpeech() {
  stopSpeech();
  const myToken = speechToken;   // stopSpeech 已 +1，这里拿到的是最新 token
  setTimeout(() => {
    if (myToken !== speechToken) return;  // 这期间又翻页了，作废
    const s = slides[currentIndex];
    if (s.sequence && !isMuted) speakSequence(s.sequence, myToken);
  }, 120);
}

// ============== 渲染 ==============
const stage = document.getElementById('stage');
const dotsContainer = document.getElementById('dots');
const progressFill = document.getElementById('progressFill');
const playBtn = document.getElementById('playBtn');
const jumpBtn = document.getElementById('jumpBtn');

let currentIndex = 0;
let isPlaying = true;
let timer = null;
let progressTimer = null;
const MUTED_DURATION = 9000;

function renderSlide(slide, idx) {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.idx = idx;

  let bodyHTML = '';
  let headerHTML = '';

  if (slide.type === 'cover') {
    div.classList.add('cover-slide');
    if (slide.bg === 'purple') div.classList.add('purple');
    if (slide.bg === 'green') div.classList.add('green');
    if (slide.bg === 'night') div.classList.add('night');
    div.innerHTML = `
      <div class="cover-emoji">${slide.icon}</div>
      <div class="cover-mega-title">${slide.title}</div>
      <div class="cover-sub">${slide.sub}</div>
    `;
    stage.appendChild(div);
    return;
  }

  const tagClass = slide.section === 'review' ? 'tag-review'
                 : slide.section === 'new' ? 'tag-new' : 'tag-tip';
  headerHTML = `
    <div class="slide-header">
      <div class="chapter-tag ${tagClass}">${slide.tag || ''}</div>
      <div class="slide-counter">${idx + 1} / ${slides.length}</div>
    </div>
    <div class="slide-title">${slide.title}</div>
    <div class="slide-subtitle">${slide.sub || ''}</div>
  `;

  if (slide.type === 'word') {
    const meaningContent = slide.meaningHTML
      ? slide.meaningHTML
      : `<span class="pos">${slide.pos}</span>${slide.meaning}`;
    bodyHTML = `
      <div class="slide-body">
        <div class="word-card">
          <div class="word-left">
            <div class="word-big" onclick="speakWord('${slide.word.replace(/'/g, "\\'")}')">${slide.word}</div>
            <div class="speak-tag" onclick="speakWord('${slide.word.replace(/'/g, "\\'")}')">🔊 点单词听发音</div>
            <div class="word-phonetic">${slide.phonetic}</div>
            <div class="word-meaning">${meaningContent}</div>
            <div class="word-phrase"><span class="label">短语</span>${slide.phrase}</div>
          </div>
          <div class="word-emoji">${slide.emoji}</div>
        </div>
      </div>
    `;
  } else if (slide.type === 'concept') {
    bodyHTML = `
      <div class="slide-body">
        <div class="concept-grid">
          ${slide.rows.map(r => `
            <div class="concept-row ${r.cls}">
              <div class="concept-icon">${r.icon}</div>
              <div class="concept-text">${r.text}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else if (slide.type === 'code') {
    bodyHTML = `
      <div class="slide-body">
        <div class="code-block">
          <div class="code-content"><pre style="font-family:inherit;font-size:inherit;line-height:inherit;color:inherit;background:transparent;margin:0;">${slide.code}</pre></div>
        </div>
        ${slide.explain ? `<div class="code-explain">${slide.explain}</div>` : ''}
      </div>
    `;
  } else if (slide.type === 'logic') {
    const boxClass = slide.logicType === 'or' ? 'or' : '';
    const ruleClass = slide.logicType === 'or' ? 'or' : '';
    bodyHTML = `
      <div class="slide-body">
        <div class="logic-hero">
          <div class="logic-symbol-box ${boxClass}">
            <div class="logic-symbol">${slide.symbol}</div>
            <div class="logic-cn">${slide.cn}</div>
          </div>
          <div class="logic-rule ${ruleClass}">${slide.rule}</div>
        </div>
        <div class="code-block">
          <div class="code-content"><pre style="font-family:inherit;font-size:inherit;line-height:inherit;color:inherit;background:transparent;margin:0;">${slide.code}</pre></div>
        </div>
      </div>
    `;
  } else if (slide.type === 'example') {
    bodyHTML = `
      <div class="slide-body">
        <div class="example-grid">
          ${slide.examples.map(e => `
            <div class="example-cell ${e.good ? 'good' : 'bad'}">
              <div class="example-vals">${e.vals}</div>
              <div class="example-expr">${e.expr}</div>
              <div class="example-result">${e.good ? '✓ ' : '✗ '}${e.result}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else if (slide.type === 'andor') {
    bodyHTML = `
      <div class="slide-body">
        <div class="andor-grid">
          <div class="andor-card andor-and">
            <div class="andor-symbol">&&</div>
            <div class="andor-cn">与</div>
            <div class="andor-rule">两个条件<span class="key-and">都成立</span><br>整体才成立<br>👉 记住一个字：<span class="key-and">都</span></div>
          </div>
          <div class="andor-card andor-or">
            <div class="andor-symbol">||</div>
            <div class="andor-cn">或</div>
            <div class="andor-rule">只要<span class="key-or">有一个成立</span><br>整体就成立<br>👉 记住一个字：<span class="key-or">有</span></div>
          </div>
        </div>
      </div>
    `;
  } else if (slide.type === 'ifelse') {
    bodyHTML = `
      <div class="slide-body">
        <div class="ifelse-flow">
          <div class="ifelse-top">🤔 先看 if 的条件成不成立？</div>
          <div class="ifelse-branch">
            <div class="branch-card branch-yes">
              <div class="branch-head">✓ 条件成立</div>
              <div class="branch-body">走"是"这边<br>执行 <b>if { }</b> 里的代码</div>
            </div>
            <div class="branch-card branch-no">
              <div class="branch-head">✗ 条件不成立</div>
              <div class="branch-body">走"否"这边<br>执行 <b>else { }</b> 里的代码</div>
            </div>
          </div>
          <div style="margin-top:16px;font-size:18px;font-weight:900;color:#C84B1A;">⚠️ 两边只走一边，绝不会都执行！</div>
        </div>
      </div>
    `;
  } else if (slide.type === 'theme') {
    bodyHTML = `
      <div class="slide-body">
        <div class="theme-card">
          <div class="theme-emoji-big">${slide.themeEmoji}</div>
          <div class="theme-info">
            <div class="theme-label">${slide.themeLabel}</div>
            <div class="theme-name">${slide.themeName}</div>
            <div class="theme-desc">${slide.themeDesc}</div>
            <div class="theme-list">${slide.themeList}</div>
          </div>
        </div>
      </div>
    `;
  } else if (slide.type === 'compare') {
    bodyHTML = `
      <div class="slide-body">
        <div class="compare-grid">
          <div class="compare-card compare-gege">
            <div class="compare-title">${slide.gege.icon} ${slide.gege.title}</div>
            <ul class="compare-list">
              ${slide.gege.items.map(i => `<li>${i}</li>`).join('')}
            </ul>
          </div>
          <div class="compare-card compare-didi">
            <div class="compare-title">${slide.didi.icon} ${slide.didi.title}</div>
            <ul class="compare-list">
              ${slide.didi.items.map(i => `<li>${i}</li>`).join('')}
            </ul>
          </div>
        </div>
      </div>
    `;
  } else if (slide.type === 'tip') {
    bodyHTML = `
      <div class="slide-body" style="justify-content:center;">
        <div class="tip-card">
          <span class="star">${slide.tipStar}</span>
          ${slide.tipText}
        </div>
      </div>
    `;
  }

  div.innerHTML = headerHTML + bodyHTML;
  stage.appendChild(div);
}

slides.forEach((s, i) => renderSlide(s, i));

slides.forEach((s, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot ' + (s.section === 'review' ? 'review' : 'new');
  dot.onclick = () => goTo(i);
  dotsContainer.appendChild(dot);
});

const allSlides = document.querySelectorAll('.slide');
const allDots = document.querySelectorAll('.dot');

function showSlide(idx) {
  allSlides.forEach(s => s.classList.remove('active'));
  allDots.forEach(d => d.classList.remove('active'));
  allSlides[idx].classList.add('active');
  allDots[idx].classList.add('active');

  if (slides[idx].section === 'review' || slides[idx].section === 'intro') {
    jumpBtn.textContent = '⏩ 跳到预习';
  } else {
    jumpBtn.textContent = '⏪ 回到复习';
  }
  progressFill.style.width = '0%';
}

function goTo(idx) {
  if (idx < 0) idx = slides.length - 1;
  if (idx >= slides.length) idx = 0;
  stopSpeech();              // 令牌 +1，作废所有旧朗读
  clearInterval(progressTimer);
  clearTimeout(timer);

  currentIndex = idx;
  showSlide(currentIndex);

  const myToken = speechToken;   // 本次切换后的最新令牌

  if (isPlaying) {
    if (isMuted) {
      startTimer();
    } else {
      const s = slides[idx];
      if (s.sequence && s.sequence.length > 0) {
        speechFinishedCallback = () => {
          // 只有本次令牌仍然有效，才在念完后翻页
          if (isPlaying && myToken === speechToken) {
            setTimeout(() => {
              if (isPlaying && myToken === speechToken) nextSlide();
            }, 1200);
          }
        };
        speakSequence(s.sequence, myToken);
      } else {
        startTimer();
      }
    }
  }
}

function nextSlide() { goTo(currentIndex + 1); }
function prevSlide() { goTo(currentIndex - 1); }

function startTimer() {
  clearInterval(progressTimer);
  clearTimeout(timer);
  const startTime = Date.now();
  progressTimer = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const pct = Math.min(100, (elapsed / MUTED_DURATION) * 100);
    progressFill.style.width = pct + '%';
    if (pct >= 100) {
      clearInterval(progressTimer);
      nextSlide();
    }
  }, 60);
}

function togglePlay() {
  isPlaying = !isPlaying;
  playBtn.textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    goTo(currentIndex);
  } else {
    stopSpeech();
    clearInterval(progressTimer);
    clearTimeout(timer);
  }
}

function toggleSection() {
  const currentSection = slides[currentIndex].section;
  if (currentSection === 'intro' || currentSection === 'review') {
    const firstNew = slides.findIndex(s => s.section === 'new');
    goTo(firstNew);
  } else {
    const firstReview = slides.findIndex(s => s.section === 'review');
    goTo(firstReview);
  }
}

function speakWord(word) {
  stopSpeech();
  const myToken = speechToken;
  setTimeout(() => {
    if (myToken !== speechToken) return;
    if (!voiceEn) loadVoices();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US';
    u.voice = voiceEn || null;
    u.rate = 0.78;
    u.volume = 1;
    showIndicator('🇬🇧 ' + word);
    u.onend = () => { if (myToken === speechToken) hideIndicator(); };
    u.onerror = () => { if (myToken === speechToken) hideIndicator(); };
    synth.speak(u);
  }, 120);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  else if (e.key === 'p' || e.key === 'P') { togglePlay(); }
  else if (e.key === 'r' || e.key === 'R') { repeatSpeech(); }
});

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) { if (dx < 0) nextSlide(); else prevSlide(); }
});

document.getElementById('startBtn').addEventListener('click', () => {
  try {
    const unlock = new SpeechSynthesisUtterance('');
    unlock.volume = 0;
    synth.speak(unlock);
  } catch(e) {}
  loadVoices();
  document.getElementById('startOverlay').classList.add('hidden');
  setTimeout(() => { showSlide(0); goTo(0); }, 400);
});

showSlide(0);
</script>

</body>
</html>
