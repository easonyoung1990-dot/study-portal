<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>语文期末闯关王 · 三下</title>
<style>
:root{
  --red:#ff8a5b;--redd:#e8643a;--redbg:#fff1ea;
  --gold:#F2B632;--golddk:#D89400;--ink:#3A2A1E;--paper:#FBF3E6;
  --card:#fff;--line:#EBDCC4;--green:#3C9D54;--greenbg:#EAF7EC;
  --wrong:#e15546;--wrongbg:#fdecea;--muted:#a08d6f;--blue:#3170B5;--bluebg:#E8F0FA;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'LXGW WenKai Screen','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
  background:radial-gradient(circle at 10% 6%,#FCE6B8 0,transparent 38%),radial-gradient(circle at 92% 96%,#F6D2C0 0,transparent 42%),var(--paper);
  color:var(--ink);min-height:100vh;padding:0 0 40px;}
.wrap{max-width:560px;margin:0 auto;padding:14px;}
.top{display:flex;align-items:center;gap:10px;padding:8px 2px 12px;}
.top .badge{background:var(--red);color:#fff;font-weight:800;font-size:18px;padding:6px 13px;border-radius:13px 13px 13px 4px;box-shadow:0 4px 0 var(--redd);}
.top h1{font-size:17px;margin:0;flex:1;}
.top a.home{text-decoration:none;font-size:22px;background:#fff;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:var(--ink);box-shadow:0 3px 0 #efe1c8;flex-shrink:0;}
.card{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:18px;margin:12px 0;box-shadow:0 6px 0 #efe1c8;}
.modgrid{display:grid;gap:12px;}
.mod{display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);border-left:7px solid var(--red);border-radius:16px;padding:15px;cursor:pointer;box-shadow:0 5px 0 #efe1c8;text-align:left;width:100%;font-family:inherit;color:inherit;}
.mod:active{transform:translateY(2px);box-shadow:0 3px 0 #efe1c8;}
.mod .ico{font-size:30px;}
.mod .t{font-size:18px;font-weight:800;}
.mod .meta{font-size:13px;color:var(--muted);margin-top:2px;}
.mod .done{margin-left:auto;font-size:13px;font-weight:800;flex-shrink:0;color:var(--redd);text-align:right;line-height:1.3;}
.mod.allin{border-left-color:var(--gold);background:linear-gradient(180deg,#fffdf6,#fff);}
.qhead{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:6px;}
.bar{height:9px;background:#f0e6d2;border-radius:6px;overflow:hidden;margin-bottom:14px;}
.bar>i{display:block;height:100%;background:var(--red);width:0;transition:width .3s;}
.qtag{display:inline-block;font-size:12px;background:var(--redbg);color:var(--redd);padding:3px 10px;border-radius:20px;font-weight:700;margin-bottom:10px;}
.qtext{font-size:21px;font-weight:800;line-height:1.55;margin:4px 0 16px;}
.qtext .blank{color:var(--redd);border-bottom:3px solid var(--gold);padding:0 18px;}
.opts{display:grid;gap:11px;}
.opt{font-family:inherit;font-size:18px;text-align:left;background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;color:var(--ink);box-shadow:0 4px 0 #efe1c8;}
.opt:active{transform:translateY(2px);box-shadow:0 2px 0 #efe1c8;}
.opt.right{background:var(--greenbg);border-color:var(--green);color:var(--green);font-weight:800;}
.opt.wrong{background:var(--wrongbg);border-color:var(--wrong);color:var(--wrong);font-weight:800;}
.opt.dim{opacity:.5;}
.fb{margin-top:14px;padding:13px 15px;border-radius:14px;font-size:16px;line-height:1.65;display:none;}
.fb.ok{background:var(--greenbg);color:var(--green);display:block;}
.fb.no{background:var(--wrongbg);color:var(--wrong);display:block;}
.next{margin-top:16px;width:100%;font-family:inherit;font-size:18px;font-weight:800;color:#fff;background:var(--red);border:none;border-radius:14px;padding:15px;cursor:pointer;box-shadow:0 5px 0 var(--redd);display:none;}
.next:active{transform:translateY(2px);box-shadow:0 3px 0 var(--redd);}
.bigbtn{width:100%;font-family:inherit;font-size:18px;font-weight:800;border-radius:14px;padding:15px;cursor:pointer;border:none;margin-top:10px;}
.bigbtn.primary{color:#fff;background:var(--red);box-shadow:0 5px 0 var(--redd);}
.bigbtn.gold{color:#fff;background:var(--gold);box-shadow:0 5px 0 var(--golddk);}
.bigbtn.ghost{background:#fff;color:var(--redd);border:2px solid var(--red);box-shadow:0 5px 0 #efe1c8;}
.bigbtn:active{transform:translateY(2px);}
.score{font-size:54px;font-weight:900;text-align:center;color:var(--red);}
.scoresub{text-align:center;color:var(--muted);margin-bottom:8px;}
.wronglist{margin:10px 0;}
.wrongitem{background:var(--wrongbg);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:15px;line-height:1.6;}
.wrongitem b{color:var(--wrong);}
textarea{width:100%;height:150px;font-size:12px;border:2px solid var(--line);border-radius:12px;padding:10px;font-family:monospace;}
.hide{display:none;}
.tip{font-size:13px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}
.streak{text-align:center;font-size:15px;color:var(--golddk);font-weight:700;height:20px;margin-bottom:4px;}
.speak{background:#fff;border:2px solid var(--gold);color:var(--golddk);border-radius:12px;padding:7px 14px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 #f0dca0;margin-bottom:12px;font-family:inherit;}
.speak:active{transform:translateY(2px);box-shadow:0 1px 0 #f0dca0;}
#qTimer{font-variant-numeric:tabular-nums;}
.soundtoggle{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;padding:0 4px;}
/* 方法点拨（讲练合一） */
.introbox h2{margin:0 0 6px;font-size:20px;color:var(--redd);}
.method{background:linear-gradient(180deg,#FCEFCF,#FBE6B0);border:2px dashed var(--golddk);border-radius:14px;padding:13px 15px;margin:10px 0;color:#7a5800;font-size:15px;line-height:1.85;}
.method b{color:#5e4300;}
.eg{background:var(--bluebg);border:2px solid #cfe0f2;border-radius:12px;padding:11px 14px;margin:10px 0;font-size:15px;line-height:1.7;color:#2b4f7a;}
.eg .lab{font-weight:800;color:var(--blue);}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="home" href="../index.html">‹</a>
    <span class="badge">语文闯关</span>
    <h1>三下期末 · 闯关王 🐯</h1>
  </div>

  <!-- 首页：选模块 -->
  <div id="menu">
    <div class="card" style="padding:14px 16px">
      <div style="font-weight:800;font-size:16px">挑一关开始练 💪</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">每关先看 <b>💡方法点拨</b> 再做题，全是点选不用打字。<b>每题答完都有讲解</b>，做完能导出成绩发给爸爸。</div>
    </div>
    <div class="modgrid" id="modgrid"></div>

    <div class="card" id="recCard">
      <div style="font-weight:800;font-size:16px">📊 我的练习记录</div>
      <div id="recStat" style="font-size:14px;color:var(--muted);margin:6px 0 12px;line-height:1.6"></div>
      <button class="bigbtn primary" id="menuExport" style="margin-top:0">📋 复制全部记录发给爸爸</button>
      <button class="bigbtn ghost" id="menuDownload">💾 存成文件（再发给爸爸）</button>
      <textarea id="menuExportBox" class="hide" readonly></textarea>
      <div style="font-size:12px;color:var(--muted);margin-top:8px">记录都存在这台平板里，不会丢。练得越多，爸爸越能帮你抓住要补的地方 💪</div>
    </div>
    <div class="tip" id="histTip"></div>
  </div>

  <!-- 方法点拨（讲练合一） -->
  <div id="intro" class="hide">
    <div class="card introbox" id="introCard"></div>
  </div>

  <!-- 答题区 -->
  <div id="quiz" class="hide">
    <div class="card">
      <div class="qhead"><span id="qProgress">第 1 / 10 题</span><span id="qTimer">⏱ 0s</span><span id="qScore">✅ 0 ❌ 0</span></div>
      <div class="bar"><i id="qbar"></i></div>
      <div class="streak" id="streak"></div>
      <span class="qtag" id="qtag">多音字</span>
      <div style="display:flex;align-items:center;margin-bottom:12px">
        <button class="speak" id="speakBtn" style="margin-bottom:0">🔊 读题</button>
        <button class="soundtoggle" id="soundBtn" title="开关声音">🔔</button>
      </div>
      <div class="qtext" id="qtext"></div>
      <div class="opts" id="opts"></div>
      <div class="fb" id="fb"></div>
      <button class="next" id="nextBtn">下一题 ›</button>
    </div>
  </div>

  <!-- 小结 -->
  <div id="result" class="hide">
    <div class="card">
      <div class="score" id="rScore">0%</div>
      <div class="scoresub" id="rSub"></div>
      <div id="rWrong"></div>
      <button class="bigbtn gold" id="retryWrong">只重练错题 🔁</button>
      <button class="bigbtn primary" id="againBtn">再练一遍这一关 ↺</button>
      <button class="bigbtn ghost" id="backMenu">← 回到选关</button>
    </div>
    <div class="card">
      <div style="font-weight:800;font-size:16px;margin-bottom:6px">📤 导出成绩发给爸爸</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:10px">点下面按钮复制，把内容发给爸爸，他会存进你的学习档案，下次专门帮你练错的地方。</div>
      <button class="bigbtn primary" id="copyBtn" style="margin-top:0">📋 复制我的练习存档</button>
      <textarea id="exportBox" class="hide" readonly></textarea>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============ 题库数据（来自三下期末复习索引：默写 + 要掌握的知识点） ============
   每题 [题干, 正确答案, [选项], 讲解]；多音字单独结构。 */
var DATA = {
  /* 知识点1：辨析多音字读音（识字表蓝色字 P116-118） */
  duoyin: [
    {c:"扇",r:[["shān","扇动翅膀"],["shàn","一把扇子"]]},
    {c:"降",r:[["jiàng","降落"],["xiáng","投降"]]},
    {c:"参",r:[["cān","参加"],["shēn","海参"]]},
    {c:"缝",r:[["féng","裁缝"],["fèng","门缝"]]},
    {c:"磨",r:[["mó","磨刀"],["mò","石磨"]]},
    {c:"分",r:[["fēn","分开"],["fèn","天分"]]},
    {c:"相",r:[["xiāng","相遇"],["xiàng","照相"]]},
    {c:"应",r:[["yīng","应该"],["yìng","答应"]]},
    {c:"了",r:[["le","走了"],["liǎo","了解"]]},
    {c:"假",r:[["jiǎ","假装"],["jià","放假"]]},
    {c:"几",r:[["jǐ","几个"],["jī","几乎"]]},
    {c:"转",r:[["zhuǎn","转身"],["zhuàn","转动"]]}
  ],
  /* 知识点2：照样子仿写词语（P92） */
  fangci: [
    ["「红彤彤」是 ABB 式词语，下面也是 ABB 的是？","金灿灿",["金灿灿","明明白白","争奇斗艳","又大又圆"],"ABB 式＝一个字＋两个相同的字（红彤彤、金灿灿、绿油油）。"],
    ["「明明白白」是 AABB 式，下面也是 AABB 的是？","高高兴兴",["高高兴兴","红彤彤","白茫茫","兴高采烈"],"AABB 式＝两个字各叠一次（明明白白、高高兴兴、许许多多）；兴高采烈是成语，红彤彤是 ABB。"],
    ["「争奇斗艳」里藏着近义词（奇/艳），下面结构相同的是？","眉清目秀",["眉清目秀","红彤彤","越来越高","三心二意"],"「争奇斗艳、眉清目秀」是并列式，前后两部分意思相关、结构对称。"],
    ["「又大又圆」是「又…又…」式，照样子写一个？","又香又甜",["又香又甜","高高兴兴","金灿灿","半紫半黄"],"「又…又…」表示同时有两个特点：又大又圆、又香又甜。"],
    ["「半紫半黄」是「半…半…」式（火烧云颜色），照样子是？","半信半疑",["半信半疑","明明白白","争奇斗艳","绿油油"],"「半…半…」表示两种状态各一半：半紫半黄、半信半疑。"]
  ],
  /* 知识点3：照样子仿写句子（P95，修辞） */
  fangju: [
    ["「溪水像绿玉带一样平静」用了比喻。下面也是比喻句的是？","月亮像一只弯弯的小船。",["月亮像一只弯弯的小船。","月亮升起来了。","我喜欢看月亮。","月亮亮不亮？"],"比喻句＝把一样东西比作另一样（像…一样）。"],
    ["「垂柳把溪水当作梳妆的镜子」把柳树当人来写，是拟人。下面是拟人的是？","风儿轻轻地唱着歌。",["风儿轻轻地唱着歌。","风很大。","风从北边吹来。","今天有风吗？"],"拟人＝把东西写得像人一样会做动作（唱歌、招手、点头）。"],
    ["照样子写排比句：「公园里有红的花，______，______。」最合适的是？","有绿的草，有清的水",["有绿的草，有清的水","非常漂亮","我很喜欢","有花有草"],"排比＝三个或以上结构相同的短语连起来，句子更有气势。"],
    ["「一双双小手拨动着浪花」写得很生动，因为它？","用动作把画面写活了",["用动作把画面写活了","只说了一个名字","写得很短","用了很多数字"],"抓住「拨动」这个动作，画面就活了——仿写也要写出动作。"]
  ],
  /* 知识点4：体会加点词意思的不同（一词多义 P84） */
  yici: [
    ["「米饭没熟」和「这首曲子我很熟」的「熟」意思一样吗？","不一样：一个是煮好了，一个是熟练",["不一样：一个是煮好了，一个是熟练","一样，都是煮好了","一样，都是熟练","都表示成熟的果子"],"同一个字在不同句子里意思不同：饭熟＝煮好；曲子熟＝熟练、常接触。"],
    ["「我喜欢苹果的味道」中的「味道」指？","酸甜苦辣的滋味",["酸甜苦辣的滋味","有趣、情趣","气味难闻","味道好不好"],"这里「味道」是吃到嘴里的滋味。"],
    ["「这本书越看越有味道」中的「味道」指？","趣味、情趣",["趣味、情趣","酸甜的滋味","难闻的气味","书的厚度"],"这里「味道」不是吃的味，而是越读越觉得有意思、有情趣。"],
    ["要知道一个加点词在句子里的意思，最好的办法是？","把它放回句子里，联系上下文想",["把它放回句子里，联系上下文想","只背字典第一个解释","随便猜一个","看字有几画"],"一词多义要联系上下文：同一个词，换个句子可能就换了意思。"]
  ],
  /* 知识点5：围绕一个意思把句子写具体（P84） */
  juti: [
    ["要把「小丽多才多艺」写具体，下面哪句最好？","她会弹钢琴，会画画，还会跳舞。",["她会弹钢琴，会画画，还会跳舞。","小丽很棒。","小丽是我的同学。","小丽今年九岁。"],"围绕中心意思「多才多艺」，从几个方面举例子，句子才具体。"],
    ["要把「雨下得真大」写具体，下面哪句最好？","豆大的雨点砸下来，地上很快积起了水洼。",["豆大的雨点砸下来，地上很快积起了水洼。","雨真的好大。","今天下雨了。","我没带伞。"],"写具体＝写出看到的、听到的样子（雨点、声音、积水），不要只说「很大」。"],
    ["「我的表弟小沙天生胆小，他怕吃药，怕做噩梦，还怕剃头。」这句话围绕哪个意思来写？","胆小",["胆小","聪明","调皮","爱吃"],"围绕「胆小」举了怕吃药、怕做噩梦、怕剃头三个例子，所以读起来很具体。"]
  ],
  /* 知识点6：用有趣的开头向别人介绍一种事物（P95《海底世界》开头） */
  kaitou: [
    ["《海底世界》开头「你可知道，大海的深处是怎样的吗？」用了什么方法？","设问：先提问，引起好奇",["设问：先提问，引起好奇","直接报数字","写自己的名字","写天气"],"用问句开头，勾起读者好奇心，想往下读。"],
    ["想有趣地向别人介绍「萤火虫」，下面哪个开头最好？","你见过会在夜里提着小灯笼的小虫子吗？",["你见过会在夜里提着小灯笼的小虫子吗？","萤火虫是一种昆虫。","我要介绍萤火虫。","萤火虫有六条腿。"],"用提问＋打比方（小灯笼）开头，又新奇又有趣。"],
    ["有趣的开头，作用是？","一下子抓住读者，让人想读下去",["一下子抓住读者，让人想读下去","让文章变长","凑字数","让题目更难"],"好开头像钩子，先勾住读者的好奇心。"]
  ],
  /* 知识点7：按正确格式写寻物启事（P96）—— 弟弟易漏项 */
  qiwu: [
    ["一则完整的寻物启事，最上面要写什么？","标题：寻物启事",["标题：寻物启事","自己的成绩","今天的天气","一首小诗"],"第一行居中写标题「寻物启事」。"],
    ["寻物启事的正文要写清楚什么？","丢了什么、什么时间、在什么地方丢的",["丢了什么、什么时间、在什么地方丢的","自己几岁","喜欢什么颜色","昨天吃了什么"],"正文＝物品特征＋丢失的时间和地点＋请拾到的人联系。"],
    ["寻物启事最后两行要写什么？","署名和日期",["署名和日期","谢谢观看","再见","句号"],"启事结尾右下角写署名（谁找）和日期。"],
    ["「昨天放学后我把一件蓝色外套落在操场上，如有拾到请联系我。」这则启事还缺什么？","缺标题、署名和日期",["缺标题、署名和日期","缺颜色","缺地点","什么都不缺"],"寻物启事六要素：①标题 ②物品特征 ③时间 ④地点 ⑤联系方式 ⑥署名和日期——这里缺①⑥。"]
  ],
  /* 知识点8：体会拟声词的作用并写一写（P114） */
  nisheng: [
    ["「忽然扑腾一声，人影碎了」中的「扑腾」是什么词？","拟声词（模仿声音的词）",["拟声词（模仿声音的词）","表示颜色的词","表示动作的词","表示数量的词"],"拟声词＝模仿声音的词，如扑腾、哗啦、叮咚。"],

function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function mkOpts(correct,pool){
  var seen={};seen[correct]=1;var opts=[correct];
  var p=shuffle(pool);
  for(var i=0;i<p.length && opts.length<4;i++){if(!seen[p[i]]){seen[p[i]]=1;opts.push(p[i]);}}
  return shuffle(opts);
}
function buildDuoyin(){
  var qs=[];
  var allyin=[];DATA.duoyin.forEach(function(x){x.r.forEach(function(rr){allyin.push(rr[0]);});});
  DATA.duoyin.forEach(function(d){
    var rd=d.r.map(function(rr){return rr[0]+'（'+rr[1]+'）';}).join('、');
    d.r.forEach(function(rr){
      qs.push({tag:"多音字",q:'「'+rr[1]+'」里「'+d.c+'」读什么？',a:rr[0],opts:mkOpts(rr[0],allyin),word:d.c+'('+rr[1]+')',
        explain:'多音字「'+d.c+'」：'+rd+'。本词「'+rr[1]+'」读 '+rr[0]+'，多音字要放回词语里读。'});
    });
  });
  return qs;
}
function buildSimple(key){
  return function(){
    var name=MODULES.filter(function(m){return m.id===key;})[0].name;
    return DATA[key].map(function(d){
      return {tag:name,q:d[0],a:d[1],opts:shuffle(d[2].slice()),word:d[1],explain:d[3]||('正确答案：'+d[1])};
    });
  };
}

/* ---- 云端上传（错题自动上传到家长云端）：本地保存后 fire-and-forget；无端点/断网/出错一律静默，不影响使用。 ---- */
function cloudUpload(ev){
  try{
    var endpoint=localStorage.getItem("eb_endpoint");if(!endpoint)return;
    var kid="eddey",subject="语文";
    var topic=(ev&&ev.lesson)?ev.lesson:"";
    var rows=((ev&&ev.items)||[]).map(function(it){
      return {kid:kid,subject:subject,topic:topic,item:(it&&(it.word||it.t))||"",ok:!!(it&&it.ok),hint:(it&&it.hint)||""};
    });
    if(!rows.length)return;
    fetch(endpoint,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(rows)}).then(function(){},function(){}).catch(function(){});
  }catch(e){}
}
function lessonDone(name){var s=loadStore();for(var i=s.events.length-1;i>=0;i--){if(s.events[i].lesson===name)return s.events[i];}return null;}
function doneBadge(name){var d=lessonDone(name);return d?'<span class="done">✅'+(d.total-d.wrong)+'<br>❌'+d.wrong+'</span>':'';}

var soundOn=true, actx=null;
function initAudio(){try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();}catch(e){}}
function tone(freq,dur,delay,type){
  if(!soundOn||!actx)return;
  try{var o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime+delay;
    o.type=type||"triangle";o.frequency.value=freq;o.connect(g);g.connect(actx.destination);
    g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.22,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}
}
function playRight(){initAudio();tone(880,0.13,0,"triangle");tone(1320,0.18,0.1,"triangle");}
function playWrong(){initAudio();tone(196,0.3,0,"sawtooth");}

var AUDIO_DIR="audio/eddey_chinese_review/";
var exAudio=null,audioTok=0;
function audioHash(s){var b=new TextEncoder().encode(s);var x=0x811c9dc5>>>0;for(var i=0;i<b.length;i++){x^=b[i];x=Math.imul(x,0x01000193)>>>0;}return ('0000000'+x.toString(16)).slice(-8);}
function getExAudio(){if(!exAudio){exAudio=new Audio();exAudio.setAttribute('playsinline','');exAudio.preload='auto';try{document.body.appendChild(exAudio);}catch(e){}}return exAudio;}
function haltAudio(){audioTok++;if(exAudio){try{exAudio.pause();}catch(e){}}}
function ttsSpeak(text){try{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();try{window.speechSynthesis.resume();}catch(e){}var u=new SpeechSynthesisUtterance(text);u.lang="zh-CN";u.rate=0.9;window.speechSynthesis.speak(u);}catch(e){}}
function speak(text){
  if(!soundOn)return;
  try{if(window.speechSynthesis)window.speechSynthesis.cancel();}catch(e){}
  audioTok++;var myTok=audioTok;var a=getExAudio();var done=false;
  function stale(){return done||myTok!==audioTok||!soundOn;}
  function fb(){if(stale())return;done=true;ttsSpeak(text);}
  a.onended=function(){if(stale())return;done=true;};a.onerror=fb;
  try{a.pause();}catch(e){}
  a.src=AUDIO_DIR+audioHash("zh|"+text)+".mp3";
  try{a.currentTime=0;}catch(e){}
  var p=a.play();if(p&&typeof p.catch==='function')p.catch(fb);
}

/* ---- 计时 ---- */
var timerInt=null;
function startTimer(){stopTimer();timerInt=setInterval(function(){
  if(!cur)return;var sec=Math.floor((Date.now()-cur.t0)/1000);
  var el=document.getElementById("qTimer");if(el)el.textContent="⏱ "+sec+"s";
},500);}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

function renderMenu(){
  var g=document.getElementById("modgrid");g.innerHTML="";
  var all=document.createElement("button");all.className="mod allin";
  all.innerHTML='<span class="ico">🏆</span><span><div class="t">综合闯关（随机20题）</div><div class="meta">各关混合抽题，检验整体水平</div></span>'+doneBadge("综合闯关");
  all.onclick=function(){startAll();};g.appendChild(all);
  MODULES.forEach(function(m){
    var qs=m.build();
    var b=document.createElement("button");b.className="mod";
    b.innerHTML='<span class="ico">'+m.ico+'</span><span><div class="t">'+m.name+'</div><div class="meta">'+qs.length+' 题</div></span>'+doneBadge(m.name);
    b.onclick=function(){openIntro(m);};
    g.appendChild(b);
  });
  var s=loadStore();var totItems=0,totWrong=0;
  s.events.forEach(function(e){totItems+=(e.items||[]).length;totWrong+=(e.wrong||0);});
  var rec=document.getElementById("recStat");
  if(s.events.length){
    rec.innerHTML='已记录 <b style="color:var(--redd)">'+s.events.length+'</b> 关 · 共练 <b>'+totItems+'</b> 题 · 错 <b style="color:var(--wrong)">'+totWrong+'</b> 题<br>这些就是要发给爸爸做进化的数据 👇';
    document.getElementById("menuExport").style.display="block";document.getElementById("menuDownload").style.display="block";
  }else{
    rec.innerHTML='还没有记录。挑一关练完，这里就会自动记下你的对错啦 ✨';
    document.getElementById("menuExport").style.display="none";document.getElementById("menuDownload").style.display="none";
  }
  document.getElementById("histTip").innerHTML = s.events.length?'继续加油 🌟 练得越多，爸爸越能帮你补到点子上':'第一次来？先看方法点拨，再挑一关试试 ✨';
}

/* 方法点拨页（讲练合一） */
function openIntro(m){
  pendingModule=m;
  var c=document.getElementById("introCard");
  c.innerHTML='<button class="speak" onclick="goMenu()" style="margin-bottom:14px">← 返回选关</button>'+
    '<h2>'+m.ico+' '+m.name+'</h2>'+(m.intro||'')+
    '<button class="bigbtn primary" id="introStart">开始这一关 ▶</button>';
  document.getElementById("introStart").onclick=function(){var mm=pendingModule;startQuiz(mm.name,mm.build());};
  show("intro");
}

function startAll(){var pool=[];MODULES.forEach(function(m){pool=pool.concat(m.build());});startQuiz("综合闯关",shuffle(pool).slice(0,20));}

function startQuiz(name,qs){
  cur={name:name,qs:shuffle(qs),idx:0,right:0,wrong:0,items:[],t0:Date.now(),qt0:0};
  initAudio();startTimer();show("quiz");renderQ();
}

function show(id){
  haltAudio();try{if(window.speechSynthesis)window.speechSynthesis.cancel();}catch(e){}
  ["menu","intro","quiz","result"].forEach(function(x){document.getElementById(x).classList.add("hide");});
  document.getElementById(id).classList.remove("hide");window.scrollTo(0,0);
}
function goMenu(){stopTimer();renderMenu();show("menu");}

function renderQ(){
  var q=cur.qs[cur.idx];cur.qt0=Date.now();
  var sb=document.getElementById("speakBtn");
  if(sb)sb.onclick=function(){initAudio();speak(q.q.replace(/______/g,"什么").replace(/<[^>]+>/g,""));};
  document.getElementById("qProgress").textContent="第 "+(cur.idx+1)+" / "+cur.qs.length+" 题";
  document.getElementById("qScore").textContent="✅ "+cur.right+" ❌ "+cur.wrong;
  document.getElementById("qbar").style.width=(cur.idx/cur.qs.length*100)+"%";
  document.getElementById("qtag").textContent=q.tag;
  document.getElementById("qtext").innerHTML=q.q.replace(/______/g,'<span class="blank">？</span>');
  document.getElementById("streak").textContent="";
  var fb=document.getElementById("fb");fb.className="fb";fb.textContent="";
  document.getElementById("nextBtn").style.display="none";
  var o=document.getElementById("opts");o.innerHTML="";
  q.opts.forEach(function(opt){
    var b=document.createElement("button");b.className="opt";b.textContent=opt;
    b.onclick=function(){answer(b,opt,q);};o.appendChild(b);
  });
}

function answer(btn,chosen,q){
  var ms=Date.now()-cur.qt0;var ok=(chosen===q.a);
  if(ok)playRight();else playWrong();
  var btns=document.getElementById("opts").querySelectorAll(".opt");
  btns.forEach(function(b){b.onclick=null;
    if(b.textContent===q.a)b.classList.add("right");
    else if(b===btn)b.classList.add("wrong");else b.classList.add("dim");});
  var fb=document.getElementById("fb");
  var exp=q.explain?'<br><span style="font-weight:400;font-size:14.5px">💡 '+q.explain+'</span>':'';
  if(ok){cur.right++;fb.className="fb ok";fb.innerHTML="✅ 答对啦！"+exp;}
  else{cur.wrong++;fb.className="fb no";fb.innerHTML="❌ 正确答案：「"+q.a+"」"+exp;}
  document.getElementById("qScore").textContent="✅ "+cur.right+" ❌ "+cur.wrong;
  cur.items.push({word:q.a,hint:q.q.replace(/<[^>]+>/g,""),ok:ok,ms:ms,user:chosen,explain:q.explain||""});
  var nb=document.getElementById("nextBtn");
  nb.textContent=(cur.idx+1>=cur.qs.length)?"看成绩 🎉":"下一题 ›";nb.style.display="block";
}

document.getElementById("nextBtn").onclick=function(){cur.idx++;if(cur.idx>=cur.qs.length)finish();else renderQ();};

function finish(){
  stopTimer();var dur=Math.round((Date.now()-cur.t0)/1000);var total=cur.qs.length;
  var ev={ts:Date.now(),type:"review",subject:"cn",lesson:cur.name,total:total,wrong:cur.wrong,durationSec:dur,items:cur.items};
  saveEvent(ev);cloudUpload(ev);cur.lastEvent=ev;
  var pct=Math.round(cur.right/total*100);
  document.getElementById("rScore").textContent=pct+"%";
  document.getElementById("rSub").textContent="「"+cur.name+"」 答对 "+cur.right+" / "+total+" 题 · 用时 "+dur+" 秒 · 平均每题 "+(Math.round(dur/total*10)/10)+" 秒"+(pct>=90?" 🌟太棒了！":pct>=70?" 👍不错！":" 加油，多练几遍！");
  var wl=document.getElementById("rWrong");
  var wrongs=cur.items.filter(function(it){return !it.ok;});
  if(wrongs.length){
    var h='<div style="font-weight:800;margin:10px 0 4px">错题回顾：</div><div class="wronglist">';
    wrongs.forEach(function(it){h+='<div class="wrongitem">'+it.hint.replace(/______/g,'____')+'<br>你选了「'+it.user+'」，正确是 <b>'+it.word+'</b>'+(it.explain?'<br><span style="color:var(--muted)">💡 '+it.explain+'</span>':'')+'</div>';});
    h+='</div>';wl.innerHTML=h;document.getElementById("retryWrong").style.display="block";
  }else{wl.innerHTML='<div style="text-align:center;color:var(--green);font-weight:800;font-size:18px;margin:10px 0">全对！完美通关 🎉</div>';document.getElementById("retryWrong").style.display="none";}
  document.getElementById("exportBox").classList.add("hide");
  document.getElementById("copyBtn").textContent="📋 复制我的练习存档";
  show("result");
}

document.getElementById("retryWrong").onclick=function(){
  var wrongQs=cur.qs.filter(function(q,i){return cur.items[i] && !cur.items[i].ok;});
  if(!wrongQs.length)return;startQuiz(cur.name+"（错题重练）",wrongQs);
};
document.getElementById("againBtn").onclick=function(){
  var name=cur.name.replace("（错题重练）","");
  var mod=MODULES.filter(function(m){return m.name===name;})[0];
  if(name==="综合闯关")startAll();else if(mod)startQuiz(mod.name,mod.build());else goMenu();
};
document.getElementById("backMenu").onclick=function(){goMenu();};
document.getElementById("soundBtn").onclick=function(){
  soundOn=!soundOn;this.textContent=soundOn?"🔔":"🔕";
  if(soundOn)initAudio();else{haltAudio();try{window.speechSynthesis&&window.speechSynthesis.cancel();try{window.speechSynthesis.resume();}catch(e){}}catch(e){}}
};

/* 导出（格式兼容默写软件，可直接投喂给Claude归档） */
function copyToClipboard(txt,boxId,btn){
  var box=document.getElementById(boxId);box.value=txt;box.classList.remove("hide");box.select();
  var done=false;try{done=document.execCommand("copy");}catch(e){}
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){},function(){});}
  btn.textContent=done?"✅ 已复制！发给爸爸吧":"👆 长按上面文字框全选复制";
}
function downloadText(txt){
  try{var blob=new Blob([txt],{type:"text/plain;charset=utf-8"});var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download="弟弟语文复习记录_"+stamp()+".txt";
    document.body.appendChild(a);a.click();setTimeout(function(){a.remove();URL.revokeObjectURL(url);},500);return true;
  }catch(e){return false;}
}
function stamp(){var d=new Date();return ""+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+"_"+pad(d.getHours())+pad(d.getMinutes());}
document.getElementById("copyBtn").onclick=function(){copyToClipboard(buildExport(loadStore()),"exportBox",this);};
document.getElementById("menuExport").onclick=function(){copyToClipboard(buildExport(loadStore()),"menuExportBox",this);};
document.getElementById("menuDownload").onclick=function(){var ok=downloadText(buildExport(loadStore()));this.textContent=ok?"✅ 已存成文件，去发给爸爸吧":"换上面的复制按钮试试";};
function pad(n){return n<10?"0"+n:""+n;}
function fmt(ts){var d=new Date(ts);return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes());}
function buildExport(s){
  var lines=[];lines.push("【弟弟语文复习档案】导出时间:"+fmt(Date.now()));
  lines.push("练习总关数:"+s.events.length);lines.push("");
  var wrongCount={};
  s.events.forEach(function(e){(e.items||[]).forEach(function(it){if(!it.ok)wrongCount[it.word]=(wrongCount[it.word]||0)+1;});});
  var rep=Object.keys(wrongCount).filter(function(k){return wrongCount[k]>=2;});
  lines.push("== 反复错的题(错≥2次,优先复习)==");
  lines.push(rep.length?rep.map(function(k){return k+"(错"+wrongCount[k]+"次)";}).join("、"):"(无)");
  lines.push("");lines.push("== 每关明细 ==");
  s.events.forEach(function(e){
    lines.push("["+fmt(e.ts)+"] "+e.lesson+" ｜ "+(e.total-e.wrong)+"/"+e.total+"对 ｜ "+e.durationSec+"秒");
    var w=(e.items||[]).filter(function(it){return !it.ok;});
    if(w.length)lines.push("  错题:"+w.map(function(it){return it.word+"(选了"+it.user+")";}).join("、"));
  });
  lines.push("");lines.push("== 原始数据(JSON,可直接投喂给Claude)==");
  lines.push(JSON.stringify({child:"弟弟",subject:"语文三下期末复习",events:s.events}));
  return lines.join("\n");
}

document.addEventListener("visibilitychange",function(){if(document.hidden){haltAudio();try{if(window.speechSynthesis)window.speechSynthesis.cancel();}catch(e){}}});
renderMenu();
</script>
