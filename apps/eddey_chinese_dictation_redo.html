<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>弟弟语文 · 错词重默（三下）</title>
<style>
:root{--red:#ff8a5b;--redd:#e8643a;--gold:#F2B632;--golddk:#D89400;--ink:#3A2A1E;--paper:#FBF3E6;--line:#EBDCC4;
--green:#3C9D54;--greenbg:#EAF7EC;--blue:#3170B5;--bluebg:#E8F0FA;--purple:#9a6cc0;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'LXGW WenKai Screen','PingFang SC','Microsoft YaHei',serif;
background:radial-gradient(circle at 10% 6%,#FCE6B8 0,transparent 38%),radial-gradient(circle at 92% 96%,#FFD9C2 0,transparent 42%),var(--paper);
color:var(--ink);min-height:100vh;padding-bottom:30px;}
.wrap{max-width:740px;margin:0 auto;padding:14px;}
.top{display:flex;align-items:center;gap:10px;padding:12px 4px 6px;}
.top .badge{background:var(--red);color:#fff;font-weight:700;font-size:19px;padding:6px 13px;border-radius:13px 13px 13px 4px;box-shadow:0 4px 0 var(--redd);}
.top h1{font-size:19px;margin:0;}
.top .sub{font-size:12px;color:#a8946f;}
.speak{background:#fff;border:2px solid var(--gold);color:var(--golddk);border-radius:50%;width:42px;height:42px;font-size:20px;cursor:pointer;box-shadow:0 3px 0 #f0dca0;flex-shrink:0;}
.card{background:#fff;border:2px solid var(--line);border-radius:18px;padding:18px;margin:13px 0;box-shadow:0 6px 0 #efe1c8;}
.card h2{margin:0 0 8px;font-size:19px;color:var(--redd);}
.lead{font-size:14px;color:#7d6a4e;line-height:1.7;margin:0 0 10px;}
.bigmenu{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.bigtile{background:#fff;border:3px solid var(--line);border-radius:18px;padding:22px 12px;cursor:pointer;box-shadow:0 6px 0 #efe1c8;text-align:center;transition:transform .08s;}
.bigtile:active{transform:translateY(3px);}
.bigtile .ic{font-size:44px;}
.bigtile .nm{font-weight:700;font-size:20px;margin-top:8px;}
.bigtile .ds{font-size:12px;color:#a08d6f;margin-top:4px;}
.bigtile.cn{border-color:#ffd0b8;} .bigtile.ex{border-color:#e7d2b0;}
.list{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.lesson{background:#fff;border:2px solid var(--line);border-radius:14px;padding:13px 8px;cursor:pointer;box-shadow:0 4px 0 #efe1c8;text-align:center;transition:transform .07s;}
.lesson:active{transform:translateY(3px);}
.lesson .t{font-weight:700;font-size:15px;}
.lesson .n{font-size:11px;color:#a08d6f;margin-top:3px;}
.lesson.done{border-color:var(--green);background:var(--greenbg);}
.lesson.all{grid-column:1/-1;border-color:var(--red);background:linear-gradient(180deg,#fff3ec,#fff);}
.lesson.all .t{font-size:17px;color:var(--redd);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--red);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:16px;padding:12px 20px;border-radius:14px;box-shadow:0 4px 0 var(--redd);cursor:pointer;transition:transform .06s;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--redd);}
.btn.ghost{background:#fff;color:var(--redd);border:2px solid var(--red);box-shadow:0 4px 0 #f0d3cf;}
.btn.green{background:var(--green);box-shadow:0 4px 0 #2c7a40;}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 #225182;}
.btn.big{font-size:19px;padding:15px 26px;}
.btn.sm{font-size:14px;padding:9px 14px;}
.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:12px;justify-content:center;}
.back{background:none;border:none;color:#a08d6f;font-size:15px;font-family:inherit;cursor:pointer;padding:8px 2px;font-weight:700;}
.hidden{display:none!important;}
/* 默写界面 */
.dictbox{text-align:center;padding:10px 0;}
.dnum{font-size:15px;color:#a08d6f;font-weight:700;}
.dstatus{font-size:30px;font-weight:700;margin:18px 0 8px;min-height:44px;}
.dstatus.spk{color:var(--blue);animation:pulse2 1s infinite;}
.dstatus.wrt{color:var(--green);}
@keyframes pulse2{0%,100%{opacity:1;}50%{opacity:.55;}}
.dhint{font-size:15px;color:#7d6a4e;min-height:24px;}
.bigcount{font-size:64px;font-weight:800;color:var(--green);line-height:1;margin:8px 0 2px;font-variant-numeric:tabular-nums;}
.bigcount.warn{color:var(--red);animation:flash .5s infinite;}
@keyframes flash{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.12);opacity:.6;}}
.bigcount small{font-size:20px;font-weight:700;color:#a08d6f;}
.timerbar{height:20px;background:#F0E6D2;border-radius:10px;margin:10px 8px 4px;overflow:hidden;border:2px solid #E5D3Ae;}
.timerbar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#7CC98F);border-radius:8px;transition:width .25s linear;}
.timerbar i.warn{background:linear-gradient(90deg,var(--red),#FF7043);}
.dots2{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
.dots2 i{width:10px;height:10px;border-radius:50%;background:#e6d8bf;}
.dots2 i.on{background:var(--red);}
.dots2 i.cur{background:var(--gold);transform:scale(1.3);}
/* 答案对照 */
.ansgrid{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:12px 0;}
.answord{background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 14px;font-size:21px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 #efe1c8;transition:all .12s;}
.answord .py{display:block;font-size:11px;color:#a08d6f;font-weight:400;}
.answord.miss{background:#FBE6E2;border-color:var(--red);color:var(--redd);}
.kou{background:linear-gradient(180deg,#FCEFCF,#FBE6B0);border:2px dashed var(--golddk);border-radius:13px;padding:11px 14px;margin:11px 0;color:#7a5800;font-weight:700;font-size:14.5px;line-height:1.8;text-align:center;}
.lion{display:flex;gap:10px;align-items:flex-start;margin:10px 0;}
.lion .face{font-size:32px;flex-shrink:0;}
.lion .bubble{background:#fff;border:2px solid var(--line);border-radius:14px 14px 14px 2px;padding:10px 13px;font-size:15px;line-height:1.7;box-shadow:0 3px 0 #efe1c8;text-align:left;}
/* 错词讲解卡 */
.expl{border:2px solid var(--line);border-radius:14px;padding:12px 14px;margin:9px 0;background:#fff;box-shadow:0 4px 0 #efe1c8;cursor:pointer;}
.expl .w{font-size:21px;font-weight:800;color:var(--redd);}
.expl .py2{font-size:13px;color:#a08d6f;margin-left:7px;}
.expl .d{font-size:14px;color:#5e4f3a;line-height:1.8;margin-top:7px;display:none;}
.expl.open .d{display:block;}
.expl .tip{font-size:12px;color:var(--blue);float:right;margin-top:4px;}
.opts{display:grid;gap:10px;margin-top:8px;}
.opt{font-family:inherit;font-size:17px;text-align:left;background:#fff;border:2px solid var(--line);border-radius:13px;padding:12px 15px;cursor:pointer;color:var(--ink);box-shadow:0 4px 0 #efe1c8;}
.opt.right{background:var(--greenbg);border-color:var(--green);color:var(--green);font-weight:800;}
.opt.wrong{background:#FBE6E2;border-color:var(--red);color:var(--redd);font-weight:800;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge">弟弟</div>
    <div style="flex:1"><h1>语文错词重默 · 三下</h1><div class="sub">把这次默错的词补回来 · 全自动报默</div></div>
    <button class="speak" onclick="testVoice()">🔊</button>
  </div>
  <div id="home">
    <div class="card">
      <div class="lion"><div class="face">🐯</div><div class="bubble">这里只练你这次<b>默写错的 11 个词</b>。每个词<b>边听边写</b>(读三遍)，时间到自动下一个；默完对照答案，<b>写错的点一下标红</b>再重默，直到全写对！先看「错词讲解」搞懂<b>为什么</b>，再去默写。</div></div>
      <div class="kou">先点右上角 🔊 试一下声音！</div>
    </div>
    <div class="bigmenu">
      <div class="bigtile cn" onclick="showCnList()"><div class="ic">📝</div><div class="nm">错词重默</div><div class="ds">11 个错词 + 理解小测</div></div>
      <div class="bigtile ex" onclick="showExpl()"><div class="ic">📖</div><div class="nm">错词讲解</div><div class="ds">每个错在哪 · 口诀记牢</div></div>
    </div>
    <div class="card" style="margin-top:14px;cursor:pointer" onclick="showArchive()">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:34px">📊</div>
        <div style="flex:1"><div style="font-weight:700;font-size:18px;color:var(--redd)">学习档案</div>
        <div style="font-size:13px;color:#7d6a4e" id="homestat">查看每次默写记录、错词本，导出给爸爸</div></div>
        <div style="font-size:22px;color:#a08d6f">›</div>
      </div>
    </div>
  </div>
  <div id="cnlist" class="hidden"></div>
  <div id="expl" class="hidden"></div>
  <div id="dict" class="hidden"></div>
  <div id="ans" class="hidden"></div>
  <div id="quiz" class="hidden"></div>
  <div id="archive" class="hidden"></div>
</div>
<script>
/* ===================== 数据：弟弟 2026-06-19 默写错词 ===================== */
/* [词, 拼音] */
const CN={
 '★全部错词（11）':[["适应","shì yìng"],["淡雅","dàn yǎ"],["展示","zhǎn shì"],["沿途","yán tú"],["陌生","mò shēng"],["想念","xiǎng niàn"],["受刑","shòu xíng"],["提防","dī fang"],["窟窿","kū long"],["摧毁","cuī huǐ"],["唠叨","láo dao"]],
 '课13 花钟':[["适应","shì yìng"],["淡雅","dàn yǎ"],["展示","zhǎn shì"]],
 '课14 蜜蜂':[["沿途","yán tú"],["陌生","mò shēng"]],
 '课17·19·25':[["想念","xiǎng niàn"],["受刑","shòu xíng"],["提防","dī fang"]],
 '第八单元':[["窟窿","kū long"],["摧毁","cuī huǐ"],["唠叨","láo dao"]],
};
/* 错词讲解：错在哪 + 口诀 */
const EXPL=[
 ["适应","shì yìng","和「适宜 shì yí」别混！<b>人</b>去配合环境叫<b>适应</b>（yìng，第四声）；环境合适叫「适宜」。口诀：人会<b>适应</b>，环境<b>适宜</b>。"],
 ["淡雅","dàn yǎ","「雅」右边是「牙＋隹」。意思是<b>素净文雅</b>，不浓艳。"],
 ["展示","zhǎn shì","「展」是<b>尸字头</b>，下面别少笔画。意思是<b>摆出来给人看</b>。"],
 ["沿途","yán tú","「沿」右边是「㕣」，<b>不是「几」</b>；「途」走之底。沿途＝<b>一路上</b>。"],
 ["陌生","mò shēng","「陌」是<b>左耳旁＋百</b>。不认识＝陌生（和「阡陌」同一个陌）。"],
 ["想念","xiǎng niàn","「念」上面是<b>「今」（没有点）</b>，不是「令」。"],
 ["受刑","shòu xíng","「刑」右边是<b>立刀旁「刂」</b>。和「形（彡）」「型（土）」分清。"],
 ["提防","dī fang","<b>多音字！</b>「提」在「提防」里读 <b>dī</b>，不读 tí。意思＝<b>小心防备</b>。"],
 ["窟窿","kū long","两个字都是<b>穴宝盖「穴」</b>。「窿」读<b>轻声 long</b>。窟窿＝洞。"],
 ["摧毁","cuī huǐ","「摧」是<b>提手旁＋崔</b>。意思是<b>彻底毁坏</b>。"],
 ["唠叨","láo dao","两个字都是<b>口字旁</b>。说个没完＝唠叨（dao 轻声）。"]
];
/* 语文理解题:选词填空/辨析,检查是否真懂 */
const CN_QUIZ={
 '★全部错词（11）':[
  {q:'新转来的同学很快就______了这里的生活。',o:['适应','适宜','展示'],a:0},
  {q:'这种花______在温暖湿润的地方生长。',o:['适宜','适应','陌生'],a:0},
  {q:'「提防」的「提」读哪个音？',o:['dī','tí','dǐ'],a:0},
  {q:'走在山间的______上，处处是风景。',o:['沿途','受刑','摧毁'],a:0},
  {q:'到了一个______的城市，他谁也不认识。',o:['陌生','想念','淡雅'],a:0},
  {q:'墙角破了一个大______，风直往里灌。',o:['窟窿','唠叨','淡雅'],a:0}
 ],
};

let voices=[];function loadVoices(){voices=speechSynthesis.getVoices();}
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
let warmed=false;function warm(){if(!('speechSynthesis'in window))return;try{speechSynthesis.resume();}catch(e){}if(warmed)return;loadVoices();try{var wu=new SpeechSynthesisUtterance('ok');wu.volume=0.02;speechSynthesis.speak(wu);}catch(e){}warmed=true;}
document.body.addEventListener('touchstart',warm,{once:true});
document.body.addEventListener('click',warm,{once:true});
document.addEventListener('visibilitychange',()=>{if(document.hidden){haltAudio();try{speechSynthesis.cancel();}catch(e){}stopTimer();}});
setInterval(()=>{if('speechSynthesis'in window&&speechSynthesis.speaking){try{speechSynthesis.pause();speechSynthesis.resume();}catch(e){}}},9000);
function pickZhVoice(){
  if(!voices||!voices.length)return null;
  const zh=voices.filter(v=>/zh|cmn|Chinese/i.test(v.lang||'')||/中文|普通话|国语|Chinese/i.test(v.name||''));
  if(!zh.length)return null;
  // 优先 Chrome 谷歌中文神经音；其次 zh-CN；再退而求其次
  return zh.find(v=>/Google/i.test(v.name||'')&&/zh[-_]CN|cmn/i.test(v.lang||''))
       ||zh.find(v=>/Google|Microsoft|Ting-Ting|Mei-Jia/i.test(v.name||''))
       ||zh.find(v=>/zh[-_]CN/i.test(v.lang||''))||zh[0];
}
function mkUtter(t,lang){
  const u=new SpeechSynthesisUtterance(t);
  const v=pickZhVoice();if(v)u.voice=v;u.lang='zh-CN';u.rate=0.85;  // 默写放慢,听清好写
  u.pitch=1.0;return u;
}

/* ===== 朗读：优先用浏览器(Chrome)自带中文语音；无语音合成时回退预合成MP3 ===== */
/* 家长要求：先用 Chrome 能正常放的自带 TTS（谷歌中文神经音）。如需切回预合成神经音，把 USE_BROWSER_TTS 改为 false。 */
const USE_BROWSER_TTS=true;
const AUDIO_DIR="audio/eddey_chinese_dictation_redo/";
let exAudio=null;let audioTok=0;
function audioHash(s){const b=new TextEncoder().encode(s);let x=0x811c9dc5>>>0;for(let i=0;i<b.length;i++){x^=b[i];x=Math.imul(x,0x01000193)>>>0;}return ('0000000'+x.toString(16)).slice(-8);}
function getExAudio(){if(!exAudio){exAudio=new Audio();exAudio.setAttribute('playsinline','');exAudio.preload='auto';try{document.body.appendChild(exAudio);}catch(e){}}return exAudio;}
function haltAudio(){audioTok++;if(exAudio){try{exAudio.pause();}catch(e){}}}
function ttsSpeakOnce(t,lang){try{speechSynthesis.cancel();speechSynthesis.resume();}catch(e){}try{speechSynthesis.speak(mkUtter(t,lang));}catch(e){}}
function speakOnce(t,lang){
  if(USE_BROWSER_TTS&&('speechSynthesis'in window)){ttsSpeakOnce(t,lang);return;}
  try{speechSynthesis.cancel();}catch(e){}
  audioTok++;const myTok=audioTok;
  const a=getExAudio();let done=false;
  const stale=()=>done||myTok!==audioTok;
  const fb=()=>{if(stale())return;done=true;ttsSpeakOnce(t,lang);};
  a.onended=()=>{if(stale())return;done=true;};
  a.onerror=fb;
  try{a.pause();}catch(e){}
  a.src=AUDIO_DIR+audioHash(lang+"|"+t)+".mp3";
  try{a.currentTime=0;}catch(e){}
  const p=a.play();
  if(p&&typeof p.catch==='function')p.catch(fb);
}
function testVoice(){if(!('speechSynthesis'in window)){var k=document.querySelector('.kou');if(k)k.textContent='这个浏览器不支持朗读，请用 Safari 或 Chrome 打开';return;}warm();speakOnce('你好弟弟，我是默写助手。','zh');}
let speakSession=0;
function ttsSpeakTimes(t,lang,times,sid,onDone){
  try{speechSynthesis.cancel();}catch(e){}
  let count=0,fired=false;
  function fire(){if(fired||sid!==speakSession)return;fired=true;onDone&&onDone();}
  function one(){
    if(sid!==speakSession)return;
    const u=mkUtter(t,lang);
    u.onend=()=>{ if(sid!==speakSession)return; count++;
      if(count<times){ setTimeout(one,900); } else { setTimeout(fire,400); } };
    u.onerror=()=>{ count++; if(count<times){setTimeout(one,900);} else {setTimeout(fire,400);} };
    try{speechSynthesis.resume();}catch(e){}speechSynthesis.speak(u);
  }
  one();
  const est=(t.length*380+1600)*times+2500;
  setTimeout(fire,Math.min(est,40000));
}
function speakTimes(t,lang,times,onDone){
  const sid=++speakSession;
  if(USE_BROWSER_TTS&&('speechSynthesis'in window)){ttsSpeakTimes(t,lang,times,sid,onDone);return;}
  const myTok=++audioTok;
  try{speechSynthesis.cancel();}catch(e){}
  let count=0,fired=false;
  const dead=()=>sid!==speakSession||myTok!==audioTok;
  function fire(){if(fired||dead())return;fired=true;onDone&&onDone();}
  const a=getExAudio();
  const src=AUDIO_DIR+audioHash(lang+"|"+t)+".mp3";
  let fellBack=false;
  function toTTS(){ if(fellBack||dead())return; fellBack=true;
    try{a.pause();}catch(e){} a.onended=null;a.onerror=null;
    ttsSpeakTimes(t,lang,times-count,sid,onDone); }
  function playOne(){
    if(dead())return;
    a.onended=()=>{ if(dead())return; count++;
      if(count<times){ setTimeout(playOne,900); } else { setTimeout(fire,400); } };
    a.onerror=toTTS;
    try{a.pause();}catch(e){}
    a.src=src;
    try{a.currentTime=0;}catch(e){}
    const p=a.play();
    if(p&&typeof p.catch==='function')p.catch(toTTS);
  }
  playOne();
  const est=(t.length*380+1600)*times+2500;
  setTimeout(fire,Math.min(est,40000));
}

/* ===================== 状态与导航 ===================== */
const S={mode:null,key:null,items:[],idx:0,miss:new Set(),lang:'zh',paused:false,
  startTime:0,perItem:[],marks:[]};
let timerH=null,timerLeft=0;
function stopTimer(){if(timerH){clearInterval(timerH);timerH=null;}}
function show(id){['home','cnlist','expl','dict','ans','quiz','archive'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');window.scrollTo(0,0);}
function goHome(){speakSession++;haltAudio();try{speechSynthesis.cancel();}catch(e){}stopTimer();refreshHomeStat();show('home');}

/* ===================== 归档引擎 ===================== */
const CHILD='弟弟';
const AKEY='mx_archive_'+CHILD+'_redo';
function loadArchive(){try{return JSON.parse(localStorage.getItem(AKEY))||{child:CHILD,events:[]};}catch(e){return{child:CHILD,events:[]};}}
function saveArchive(a){try{localStorage.setItem(AKEY,JSON.stringify(a));}catch(e){}}
function logEvent(ev){const a=loadArchive();a.events.push(ev);saveArchive(a);cloudUpload(ev);}
function cloudUpload(ev){
  try{
    var endpoint=localStorage.getItem('eb_endpoint');
    if(!endpoint)return;
    var kid=(CHILD==='哥哥')?'kenton':(CHILD==='弟弟')?'eddey':CHILD;
    var subj=(ev.subject==='cn')?'语文':(ev.subject==='en')?'英语':(ev.subject||'');
    var topic=ev.lesson||'';
    var rows=(ev.items||[]).map(function(it){
      return {kid:kid,subject:subj,topic:topic,
        item:(it.word!=null?it.word:(it.t!=null?it.t:'')),
        ok:!!it.ok,hint:it.hint||''};
    });
    if(!rows.length)return;
    fetch(endpoint,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(rows)})
      .then(function(){}).catch(function(){});
  }catch(e){}
}
function fmtDate(ts){const d=new Date(ts);const p=n=>(n<10?'0':'')+n;return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function aggregateWords(events){
  const m={};
  events.forEach(ev=>{(ev.items||[]).forEach(it=>{
    const key=ev.subject+'|'+it.word;
    if(!m[key])m[key]={word:it.word,hint:it.hint||'',subject:ev.subject,lesson:ev.lesson,ok:0,wrong:0,last:ev.ts};
    if(it.ok)m[key].ok++;else m[key].wrong++;
    m[key].last=Math.max(m[key].last,ev.ts);
  });});
  return Object.values(m);
}
function refreshHomeStat(){
  const a=loadArchive();const el=document.getElementById('homestat');if(!el)return;
  if(!a.events.length){el.textContent='还没有记录——做一次默写或小测就会自动归档';return;}
  const words=aggregateWords(a.events);
  const repeat=words.filter(w=>w.wrong>=2).length;
  el.innerHTML=`共 <b>${a.events.length}</b> 次练习 ｜ 反复错的词 <b style="color:var(--red)">${repeat}</b> 个 ｜ 点这里查看/导出`;
}

  show('cnlist');

function esc(s){return (''+s).replace(/'/g,"\\'");}

/* ===================== 默写流程 ===================== */
function startDict(mode,key){
  S.mode=mode;S.key=key;S.idx=0;S.miss=new Set();S.startTime=Date.now();S.perItem=[];
  S.items=CN[key].map(d=>Array.isArray(d)?{t:d[0],hint:d[1]||'',say:d[0]}:{t:d,hint:'',say:d});S.lang='zh';
  S.itemStart=Date.now();
  renderDict();show('dict');
  setTimeout(()=>runWord(),400);
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function round05(v){return Math.round(v*2)/2;}
function wordSec(it){const n=[...it.t].length;return round05(clamp(5.5+n*2,9.5,16));}
function renderDict(){
  const b=document.getElementById('dict');const it=S.items[S.idx];
  b.innerHTML=`<button class="back" onclick="confirmQuit()">← 退出</button>
    <div class="card dictbox">
      <div class="dnum">${S.key} ｜ 第 ${S.idx+1} / ${S.items.length} 个</div>
      <div class="dstatus wrt" id="dstat">🔊✍️ 一边听一边写</div>
      <div class="dhint" id="dhint">(听到就开始写，别看屏幕)</div>
      <div class="bigcount" id="bigcount">--</div>
      <div class="timerbar"><i id="tbar" style="width:100%"></i></div>
      <div class="dots2">${S.items.map((_,i)=>`<i class="${i<S.idx?'on':(i===S.idx?'cur':'')}"></i>`).join('')}</div>
      <div class="row">
        <button class="btn sm ghost" onclick="replayWord()">🔁 再听一遍</button>
        <button class="btn sm blue" id="pbtn" onclick="togglePause()">⏸ 暂停</button>
        <button class="btn sm green" onclick="nextWord()">✅ 写好了，下一个</button>
      </div>
    </div>`;
}
function runWord(){
  stopTimer();S.paused=false;S.itemStart=Date.now();
  const it=S.items[S.idx];
  const st=document.getElementById('dstat');if(!st)return;
  st.className='dstatus wrt';st.textContent='🔊✍️ 一边听一边写';
  const tb=document.getElementById('tbar');if(tb)tb.style.width='100%';
  speakTimes(it.say,S.lang,3,null);
  startWriting();
}
function startWriting(){
  const it=S.items[S.idx];
  const total=wordSec(it);timerLeft=total;
  stopTimer();
  timerH=setInterval(()=>{
    if(S.paused)return;
    timerLeft-=0.25;
    const tb=document.getElementById('tbar');
    const bc=document.getElementById('bigcount');
    const pct=Math.max(0,timerLeft/total*100);
    if(tb)tb.style.width=pct+'%';
    const secLeft=Math.ceil(Math.max(0,timerLeft));
    if(bc){bc.innerHTML=secLeft+'<small> 秒</small>';
      if(timerLeft<=3.2){bc.classList.add('warn');if(tb)tb.classList.add('warn');}
      else{bc.classList.remove('warn');if(tb)tb.classList.remove('warn');}}
    if(timerLeft<=0){stopTimer();nextWord();}
  },250);
}
function replayWord(){const it=S.items[S.idx];speakTimes(it.say,S.lang,1,null);}
function togglePause(){
  S.paused=!S.paused;
  const pb=document.getElementById('pbtn');
  if(pb)pb.textContent=S.paused?'▶ 继续':'⏸ 暂停';
  if(S.paused){haltAudio();try{speechSynthesis.cancel();}catch(e){}}
}
function nextWord(){
  speakSession++;haltAudio();try{speechSynthesis.cancel();}catch(e){}stopTimer();
  const it=S.items[S.idx];
  S.perItem.push({word:it.t,hint:it.hint||'',ms:Date.now()-(S.itemStart||Date.now())});
  if(S.idx<S.items.length-1){S.idx++;S.itemStart=Date.now();renderDict();setTimeout(()=>runWord(),300);}
  else{showAnswers();}
}
function confirmQuit(){speakSession++;haltAudio();try{speechSynthesis.cancel();}catch(e){}stopTimer();showCnList();}

/* ===================== 答案对照 ===================== */
function showAnswers(){
  const b=document.getElementById('ans');
  b.innerHTML=`<button class="back" onclick="confirmQuit()">← 返回选课</button>
    <div class="card">
      <h2>📋 ${S.key} · 对答案</h2>
      <div class="lead">对照你写的：<b>写错/没写出来的，点一下变红</b>（其余算写对）。</div>
      <div class="ansgrid">${S.items.map((it,i)=>`<div class="answord" id="aw${i}" onclick="toggleMiss(${i})">${it.t}${it.hint?`<span class="py">${it.hint}</span>`:''}</div>`).join('')}</div>
      <div class="kou" id="ansprog">把写错的点红，再点完成。</div>
      <div class="row">
        <button class="btn big" id="redoBtn" onclick="redoMiss()" style="display:none">🔁 只重默写错的</button>
        <button class="btn green big" onclick="finishLesson()">✅ 完成</button>
      </div>
    </div>`;
  show('ans');
  speakOnce('默完了！对照答案，写错的点一下变红。','zh');
}
function toggleMiss(i){
  const el=document.getElementById('aw'+i);if(!el)return;
  if(S.miss.has(i)){S.miss.delete(i);el.classList.remove('miss');}
  else{S.miss.add(i);el.classList.add('miss');}
  const rb=document.getElementById('redoBtn');if(rb)rb.style.display=S.miss.size?'inline-flex':'none';
  const p=document.getElementById('ansprog');if(p)p.innerHTML=S.miss.size?('标红 '+S.miss.size+' 个错词，点完成会记进错词本'):'把写错的点红，再点完成。';
}
function redoMiss(){
  if(!S.miss.size)return;
  S.items=[...S.miss].sort((a,b)=>a-b).map(i=>S.items[i]);
  S.idx=0;S.miss=new Set();
  renderDict();show('dict');
  speakOnce('好，只重默写错的。准备！','zh');
  setTimeout(()=>runWord(),1500);
}
function finishLesson(){
  const missWords=new Set([...S.miss].map(i=>S.items[i].t));
  const items=S.items.map((it,i)=>{const pi=S.perItem.find(p=>p.word===it.t);return {word:it.t,hint:it.hint||'',ok:!missWords.has(it.t),ms:pi?pi.ms:0};});
  logEvent({ts:Date.now(),type:'dict',subject:'cn',lesson:S.key,total:S.items.length,wrong:S.miss.size,durationSec:Math.round((Date.now()-S.startTime)/1000),items:items});
  speakOnce(S.miss.size?('记下了，错词留着再练。'):'真棒，全写对啦！','zh');
  setTimeout(()=>confirmQuit(),1200);
}

/* ===================== 理解小测引擎 ===================== */
const Q={mode:null,key:null,bank:[],idx:0,startTime:0,results:[]};
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildCnQuiz(key){
  return CN_QUIZ[key].map(item=>{const correct=item.o[item.a];const opts=shuffle(item.o);
    return {prompt:item.q,ask:'选一个最合适的：',o:opts,a:opts.indexOf(correct),word:correct,hint:'',say:'',lang:'zh'};});
}
function startQuiz(mode,key){
  Q.mode=mode;Q.key=key;Q.idx=0;Q.startTime=Date.now();Q.results=[];
  Q.bank=buildCnQuiz(key);
  renderQuiz();show('quiz');
}
function renderQuiz(){
  const b=document.getElementById('quiz');const it=Q.bank[Q.idx];
  b.innerHTML='<button class="back" onclick="quitQuiz()">← 退出小测</button>'+
    '<div class="card"><h2>🧠 理解小测</h2>'+
    '<div class="dnum" style="text-align:center">第 '+(Q.idx+1)+' / '+Q.bank.length+' 题</div>'+
    '<div style="text-align:center;font-size:22px;font-weight:800;margin:16px 0 6px;color:var(--blue)">'+it.prompt+'</div>'+
    '<div class="lead" style="text-align:center">'+it.ask+'</div>'+
    '<div class="opts">'+it.o.map((x,i)=>'<button class="opt" onclick="answerQuiz('+i+',this)">'+x+'</button>').join('')+'</div>'+
    '<div id="qfb"></div>'+
    '<div class="dots2">'+Q.bank.map((_,i)=>'<i class="'+(i<Q.idx?'on':(i===Q.idx?'cur':''))+'"></i>').join('')+'</div></div>';
}
function answerQuiz(i,btn){
  const it=Q.bank[Q.idx];const fb=document.getElementById('qfb');if(!fb)return;
  const ok=i===it.a;
  Q.results.push({word:it.word,hint:it.hint,ok:ok,ms:0});
  document.querySelectorAll('#quiz .opt').forEach(b=>b.style.pointerEvents='none');
  if(ok){btn.classList.add('right');ding();
    fb.innerHTML='<div style="background:var(--greenbg);border-radius:10px;padding:8px 12px;margin-top:8px;color:var(--green);font-weight:700;text-align:center">✅ 对!</div>';
    speakOnce('对','zh');}
  else{btn.classList.add('wrong');
    fb.innerHTML='<div style="background:#FBE6E2;border-radius:10px;padding:8px 12px;margin-top:8px;color:var(--redd);font-weight:700;text-align:center">正确答案:'+it.o[it.a]+'</div>';
    const opts=document.querySelectorAll('#quiz .opt');if(opts[it.a])opts[it.a].classList.add('right');
    speakOnce('再记一下，正确答案是'+it.o[it.a],'zh');}
  setTimeout(()=>{if(Q.idx<Q.bank.length-1){Q.idx++;renderQuiz();}else{finishQuiz();}},ok?900:2000);
}
function finishQuiz(){
  const wrong=Q.results.filter(r=>!r.ok).length;
  logEvent({ts:Date.now(),type:'quiz',subject:'cn',lesson:Q.key,
    total:Q.bank.length,wrong:wrong,durationSec:Math.round((Date.now()-Q.startTime)/1000),items:Q.results});
  const b=document.getElementById('quiz');const score=Q.bank.length-wrong;
  b.innerHTML='<button class="back" onclick="quitQuiz()">← 返回</button>'+
    '<div class="card" style="text-align:center"><h2>🧠 小测完成</h2>'+
    '<div style="font-size:48px;font-weight:800;color:'+(wrong===0?'var(--green)':'var(--red)')+';margin:14px 0">'+score+' / '+Q.bank.length+'</div>'+
    '<div class="kou">'+(wrong===0?'全对!说明这些词你是真懂了 👍':'错了 '+wrong+' 个——再看看「错词讲解」，已存档。')+'</div>'+
    '<div class="row"><button class="btn green big" onclick="quitQuiz()">完成</button></div></div>';
  show('quiz');
  speakOnce(wrong===0?'全对!这些词你真的懂了。':'做完了，错的词已经记下来。','zh');
}
function quitQuiz(){speakSession++;haltAudio();try{speechSynthesis.cancel();}catch(e){}showCnList();}
function ding(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start();o.stop(ctx.currentTime+0.3);}catch(e){}}

/* ===================== 归档视图 ===================== */
function showArchive(){
  const a=loadArchive();const b=document.getElementById('archive');
  const evs=a.events.slice().reverse();
  b.innerHTML='<button class="back" onclick="goHome()">← 返回</button>'+
    '<div class="card"><h2>📊 '+CHILD+' 的学习档案</h2>'+
    '<div class="lead">共 '+a.events.length+' 次练习。数据可<b>一键复制</b>发给爸爸，或<b>下载</b>保存。</div>'+
    '<div class="row" style="justify-content:flex-start">'+
      '<button class="btn sm blue" onclick="copyArchive()">📋 一键复制</button>'+
      '<button class="btn sm green" onclick="downloadArchive()">📥 下载存档</button>'+
      '<button class="btn sm ghost" onclick="clearArchive()">🗑 清空</button></div></div>'+
    (function(){var aw=wbAll();if(!aw.length)return '';var act=aw.filter(function(w){return !w.mastered;});return '<div class="card"><h2 style="color:var(--red)">📕 错词本（错过就记，共'+aw.length+'个）</h2><div class="lead">只要默错过一次就在这里；<b>连续答对2次</b>才算掌握、自动移走。</div><div class="ansgrid">'+aw.map(function(w){return '<div class="answord'+(w.mastered?'':' miss')+'">'+w.word+'<span class="py">'+(w.mastered?'已掌握✓':'错'+w.wrong+'次')+'</span></div>';}).join('')+'</div>'+(act.length?'<div class="row" style="justify-content:flex-start"><button class="btn green sm" onclick="startWrongbook()">🔁 重默错词（'+act.length+'）</button></div>':'<div class="kou">错词都掌握啦，太棒了！</div>')+'</div>';})()+
    '<div class="card"><h2>📅 练习记录</h2>'+
      (evs.length?evs.map(ev=>{
        const wrongItems=(ev.items||[]).filter(it=>!it.ok).map(it=>it.word);
        return '<div style="border-bottom:1px solid var(--line);padding:9px 0">'+
          '<div style="font-weight:700">'+(ev.type==='dict'?'✍️默写':'🧠小测')+' · '+ev.lesson+
            '<span style="float:right;color:#a08d6f;font-size:12px">'+fmtDate(ev.ts)+'</span></div>'+
          '<div style="font-size:13px;color:#7d6a4e;margin-top:3px">'+(ev.total-ev.wrong)+'/'+ev.total+' 对 ｜ 用时 '+ev.durationSec+'秒'+
            (wrongItems.length?' ｜ 错:<span style="color:var(--red)">'+wrongItems.join('、')+'</span>':' ｜ 全对 ✓')+'</div></div>';
      }).join(''):'<div class="lead">还没有记录</div>')+'</div>'+
    '<div class="card hidden" id="copybox"><h2>复制下面全部文字</h2>'+
      '<textarea id="copytext" style="width:100%;height:220px;font-size:12px;font-family:monospace;border:2px solid var(--line);border-radius:10px;padding:10px"></textarea></div>';
  show('archive');
}
function archiveText(){
  const a=loadArchive();
  let t='【'+CHILD+'错词重默档案】导出时间:'+fmtDate(Date.now())+'\n练习总次数:'+a.events.length+'\n\n';
  var _wb=wbAll();
  t+='== 错词本(只要错过一次就记;连续答对2次移出) ==\n';
  t+=_wb.length?_wb.map(function(w){return w.word+(w.lesson?' ['+w.lesson+']':'')+' 错'+w.wrong+'次'+(w.mastered?' 已掌握':'');}).join('\n'):'(无)';
  t+='\n\n== 每次练习明细 ==\n';
  a.events.forEach(ev=>{
    const wrongItems=(ev.items||[]).filter(it=>!it.ok).map(it=>it.word+(it.hint?'('+it.hint+')':''));
    t+='\n['+fmtDate(ev.ts)+'] '+(ev.type==='dict'?'默写':'小测')+' 语文·'+ev.lesson+' ｜ '+(ev.total-ev.wrong)+'/'+ev.total+'对 ｜ '+ev.durationSec+'秒';
    if(wrongItems.length)t+='\n  错词:'+wrongItems.join('、');
  });
  t+='\n\n== 原始数据(JSON,可直接投喂给Claude)==\n'+JSON.stringify(a);
  return t;
}
function copyArchive(){
  const txt=archiveText();
  const box=document.getElementById('copybox');const ta=document.getElementById('copytext');
  if(box&&ta){box.classList.remove('hidden');ta.value=txt;ta.focus();ta.select();}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(()=>{speakOnce('已经复制好了，可以粘贴发给爸爸。','zh');}).catch(()=>{});}
}
function downloadArchive(){
  const txt=archiveText();const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=CHILD+'错词重默档案.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function clearArchive(){if(confirm('确定清空'+CHILD+'的所有学习记录吗?不能撤销。')){localStorage.removeItem(AKEY);showArchive();}}
window.addEventListener('load',()=>{setTimeout(refreshHomeStat,100);});

/* ===== 错词本(默错过一次即记,连续答对2次才移出) ===== */
var WBKEY='mx_wrongbook_eddey_dictation_redo';
function loadWB(){try{return JSON.parse(localStorage.getItem(WBKEY))||{words:{}};}catch(e){return {words:{}};}}
function saveWB(w){try{localStorage.setItem(WBKEY,JSON.stringify(w));}catch(e){}}
function wbAddWrong(word,hint,lesson,lang){if(!word)return;var wb=loadWB();var w=wb.words[word]||{word:word,hint:hint||'',lesson:lesson||'',lang:lang||'zh',wrong:0,streak:0,mastered:false};w.wrong++;w.streak=0;w.mastered=false;if(lesson)w.lesson=lesson;if(hint)w.hint=hint;if(lang)w.lang=lang;wb.words[word]=w;saveWB(wb);}
function wbAddRight(word){var wb=loadWB();var w=wb.words[word];if(w&&!w.mastered){w.streak++;if(w.streak>=2)w.mastered=true;wb.words[word]=w;saveWB(wb);}}
function wbAll(){var wb=loadWB();return Object.keys(wb.words).map(function(k){return wb.words[k];});}
function wbActive(){return wbAll().filter(function(w){return !w.mastered;});}
function startWrongbook(){var list=wbActive();if(!list.length){alert('错词本是空的，太棒了！');return;}S.mode='cn';S.key='错词本重做';S.idx=0;S.miss=new Set();S.startTime=Date.now();S.perItem=[];S.lang='zh';S.items=list.map(function(w){return {t:w.word,hint:w.hint||'',say:w.word};});S.itemStart=Date.now();renderDict();show('dict');setTimeout(function(){runWord();},400);}
(function(){if(typeof logEvent==='function'){var _o=logEvent;logEvent=function(ev){_o(ev);try{if(ev&&ev.type==='dict'&&ev.items){ev.items.forEach(function(it){if(it.ok)wbAddRight(it.word);else wbAddWrong(it.word,it.hint,ev.lesson,'zh');});}}catch(e){}};}})();
</script>
