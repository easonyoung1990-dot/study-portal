<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>弟弟英语单元默写 · 三年级下</title>
<style>
:root{--red:#ff8a5b;--redd:#e8643a;--gold:#F2B632;--golddk:#D89400;--ink:#3A2A1E;--paper:#FBF3E6;--line:#EBDCC4;
--green:#3C9D54;--greenbg:#EAF7EC;--blue:#3170B5;--bluebg:#E8F0FA;--purple:#7B3FA0;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'LXGW WenKai Screen','PingFang SC','Microsoft YaHei',serif;
background:radial-gradient(circle at 10% 6%,#FCE6B8 0,transparent 38%),radial-gradient(circle at 92% 96%,#F6D2C0 0,transparent 42%),var(--paper);
color:var(--ink);min-height:100vh;padding-bottom:30px;}
.wrap{max-width:740px;margin:0 auto;padding:14px;}
.top{display:flex;align-items:center;gap:10px;padding:12px 4px 6px;}
.top .badge{background:var(--red);color:#fff;font-weight:700;font-size:19px;padding:6px 13px;border-radius:13px 13px 13px 4px;box-shadow:0 4px 0 var(--redd);}
.top h1{font-size:19px;margin:0;}
.top .sub{font-size:12px;color:#a8946f;}
.speak{background:#fff;border:2px solid var(--gold);color:var(--golddk);border-radius:50%;width:42px;height:42px;font-size:20px;cursor:pointer;box-shadow:0 3px 0 #f0dca0;flex-shrink:0;}
.card{background:#fff;border:2px solid var(--line);border-radius:18px;padding:18px;margin:13px 0;box-shadow:0 6px 0 #efe1c8;}
.card h2{margin:0 0 8px;font-size:19px;color:var(--redd);}
.lead{font-size:14px;color:#7d6a4e;line-height:1.7;margin:0 0 10px;}
.bigmenu{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.bigtile{background:#fff;border:3px solid var(--line);border-radius:18px;padding:22px 12px;cursor:pointer;box-shadow:0 6px 0 #efe1c8;text-align:center;transition:transform .08s;}
.bigtile:active{transform:translateY(3px);}
.bigtile .ic{font-size:44px;}
.bigtile .nm{font-weight:700;font-size:20px;margin-top:8px;}
.bigtile .ds{font-size:12px;color:#a08d6f;margin-top:4px;}
.bigtile.cn{border-color:#bcd4ee;} .bigtile.en{border-color:#ddc7ea;}
.list{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.lesson{background:#fff;border:2px solid var(--line);border-radius:14px;padding:13px 8px;cursor:pointer;box-shadow:0 4px 0 #efe1c8;text-align:center;transition:transform .07s;}
.lesson:active{transform:translateY(3px);}
.lesson .t{font-weight:700;font-size:16px;}
.lesson .n{font-size:11px;color:#a08d6f;margin-top:3px;}
.lesson.done{border-color:var(--green);background:var(--greenbg);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--red);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:16px;padding:12px 20px;border-radius:14px;box-shadow:0 4px 0 var(--redd);cursor:pointer;transition:transform .06s;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--redd);}
.btn.ghost{background:#fff;color:var(--redd);border:2px solid var(--red);box-shadow:0 4px 0 #f0d3cf;}
.btn.green{background:var(--green);box-shadow:0 4px 0 #2c7a40;}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 #225182;}
.btn.big{font-size:19px;padding:15px 26px;}
.btn.sm{font-size:14px;padding:9px 14px;}
.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:12px;justify-content:center;}
.back{background:none;border:none;color:#a08d6f;font-size:15px;font-family:inherit;cursor:pointer;padding:8px 2px;font-weight:700;}
.hidden{display:none!important;}
/* 默写界面 */
.dictbox{text-align:center;padding:10px 0;}
.dnum{font-size:15px;color:#a08d6f;font-weight:700;}
.dstatus{font-size:30px;font-weight:700;margin:18px 0 8px;min-height:44px;}
.dstatus.spk{color:var(--blue);animation:pulse2 1s infinite;}
.dstatus.wrt{color:var(--green);}
@keyframes pulse2{0%,100%{opacity:1;}50%{opacity:.55;}}
.dhint{font-size:15px;color:#7d6a4e;min-height:24px;}
.bigcount{font-size:64px;font-weight:800;color:var(--green);line-height:1;margin:8px 0 2px;font-variant-numeric:tabular-nums;}
.bigcount.warn{color:var(--red);animation:flash .5s infinite;}
@keyframes flash{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.12);opacity:.6;}}
.bigcount small{font-size:20px;font-weight:700;color:#a08d6f;}
.timerbar{height:20px;background:#F0E6D2;border-radius:10px;margin:10px 8px 4px;overflow:hidden;border:2px solid #E5D3Ae;}
.timerbar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#7CC98F);border-radius:8px;transition:width .25s linear;}
.timerbar i.warn{background:linear-gradient(90deg,var(--red),#FF7043);}
.dots2{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
.dots2 i{width:10px;height:10px;border-radius:50%;background:#e6d8bf;}
.dots2 i.on{background:var(--red);}
.dots2 i.cur{background:var(--gold);transform:scale(1.3);}
/* 答案对照 */
.ansgrid{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:12px 0;}
.answord{background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 14px;font-size:21px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 #efe1c8;transition:all .12s;}
.answord .py{display:block;font-size:11px;color:#a08d6f;font-weight:400;}
.answord.miss{background:#FBE6E2;border-color:var(--red);color:var(--redd);}
.kou{background:linear-gradient(180deg,#FCEFCF,#FBE6B0);border:2px dashed var(--golddk);border-radius:13px;padding:11px 14px;margin:11px 0;color:#7a5800;font-weight:700;font-size:14.5px;line-height:1.8;text-align:center;}
.lion{display:flex;gap:10px;align-items:flex-start;margin:10px 0;}
.lion .face{font-size:32px;flex-shrink:0;}
.lion .bubble{background:#fff;border:2px solid var(--line);border-radius:14px 14px 14px 2px;padding:10px 13px;font-size:15px;line-height:1.7;box-shadow:0 3px 0 #efe1c8;text-align:left;}
.seg{display:flex;gap:8px;justify-content:center;margin:10px 0;}
.seg button{font-family:inherit;font-size:14px;font-weight:700;padding:8px 16px;border-radius:12px;border:2px solid var(--line);background:#fff;cursor:pointer;}
.seg button.on{background:var(--red);color:#fff;border-color:var(--red);}
.answrow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:2px solid var(--line);border-radius:12px;padding:8px 12px;margin:7px 0;}
.answrow.mok{background:var(--greenbg);border-color:var(--green);}
.answrow.mno{background:#FBE6E2;border-color:var(--red);}
.answrow .aw{font-size:20px;font-weight:700;}
.answrow .py{font-size:11px;color:#a08d6f;font-weight:400;margin-left:6px;}
.markbtns{display:flex;gap:6px;flex-shrink:0;}
.mk{font-size:18px;width:46px;height:40px;border-radius:10px;border:2px solid var(--line);background:#fff;cursor:pointer;opacity:.4;}
.mk.on{opacity:1;}
.mk.ok.on{background:var(--greenbg);border-color:var(--green);}
.mk.no.on{background:#FBE6E2;border-color:var(--red);}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge">弟弟</div>
    <div style="flex:1"><h1>英语单元默写 · 三下</h1><div class="sub">沪教版3B · 4个Module/12单元 · 全自动报默</div></div>

  <div id="home">
    <div class="card">
      <div class="lion"><div class="face">🦁</div><div class="bubble">按教材单元默写英语！每个词/句<b>边听边写</b>(读三遍),时间到自动下一个;默完对照答案,<b>写错的点一下标红</b>。再做🧠中英互译,检查是不是真懂。</div></div>

    </div>

      <div style="display:flex;align-items:center;gap:12px">

        <div style="flex:1"><div style="font-weight:700;font-size:18px;color:var(--redd)">学习档案</div>
        <div style="font-size:13px;color:#7d6a4e" id="homestat">查看每次默写记录、反复错的词,导出给老师/家长</div></div>
        <div style="font-size:22px;color:#a08d6f">›</div>
      </div>
    </div>
  </div>
  <div id="cnlist" class="hidden"></div>
  <div id="enlist" class="hidden"></div>
  <div id="dict" class="hidden"></div>
  <div id="ans" class="hidden"></div>
  <div id="quiz" class="hidden"></div>
  <div id="archive" class="hidden"></div>
</div>
<script>

const CN={
};

const EN_VOCAB={

 "M3U3 Seasons 季节":[["season", "季节"], ["spring", "春天"], ["summer", "夏天"], ["autumn", "秋天"], ["winter", "冬天"], ["warm", "温暖的"], ["hot", "炎热的"], ["cool", "凉爽的"], ["cold", "寒冷的"]],

 "M4U2 Children's Day 儿童节":[["present", "礼物"], ["party", "聚会"], ["balloon", "气球"], ["card", "卡片"], ["sing", "唱歌"], ["dance", "跳舞"], ["play", "玩"], ["happy", "高兴的"]],
 "M4U3 Story time 故事时间":[["story", "故事"], ["duck", "鸭子"], ["duckling", "小鸭子"], ["swan", "天鹅"], ["nest", "鸟巢"], ["egg", "蛋"], ["ugly", "丑的"], ["beautiful", "美丽的"]],

/* 英语句子(grammar+daily expressions): [英文, 中文] */
const EN_SENT={
 "M1 句子(五感)":[["I can see a bird.", "我能看见一只鸟。"], ["I can hear a plane.", "我能听见一架飞机。"], ["Look! Listen!", "看！听！"], ["Touch it. How does it feel?", "摸一摸，它感觉怎么样？"], ["It is hard.", "它是硬的。"], ["It is soft and smooth.", "它又软又滑。"], ["What can you taste?", "你能尝到什么？"], ["It tastes sweet.", "它尝起来是甜的。"], ["It smells nice.", "它闻起来很香。"]],
 "M2 句子(喜好/衣物)":[["Do you like tigers?", "你喜欢老虎吗？"], ["Yes, I do. / No, I don't.", "是的我喜欢。/不，我不喜欢。"], ["It is tall and fat.", "它又高又胖。"], ["What is your favourite toy?", "你最喜欢的玩具是什么？"], ["My favourite toy is the robot.", "我最喜欢的玩具是机器人。"], ["This is my kite.", "这是我的风筝。"], ["This is her dress.", "这是她的连衣裙。"], ["I like the red T-shirt.", "我喜欢这件红色T恤。"], ["Put on your coat.", "穿上你的外套。"]],
 "M3 句子(形状/颜色/季节)":[["What shape is it?", "它是什么形状？"], ["It is a circle.", "它是一个圆形。"], ["It has four sides.", "它有四条边。"], ["What colour is it?", "它是什么颜色？"], ["It is red and yellow.", "它是红色和黄色的。"], ["What colour are they? They are blue.", "它们是什么颜色？是蓝色的。"], ["Which season do you like?", "你喜欢哪个季节？"], ["I like summer.", "我喜欢夏天。"], ["It is hot in summer.", "夏天很热。"]],
 "M4 句子(身体/节日/故事)":[["Touch your head.", "摸摸你的头。"], ["I have two hands.", "我有两只手。"], ["My feet are big.", "我的脚很大。"], ["Happy Children's Day!", "儿童节快乐！"], ["We sing and dance at the party.", "我们在聚会上又唱又跳。"], ["I like playing games.", "我喜欢玩游戏。"], ["Mother Duck has five eggs.", "鸭妈妈有五个蛋。"], ["The ugly duckling becomes a swan.", "丑小鸭变成了天鹅。"], ["It is beautiful.", "它很美丽。"]],
};

/* 语文理解题:选词填空,检查是否真懂词义 */
const CN_QUIZ={
};


let voices=[];function loadVoices(){voices=speechSynthesis.getVoices();}
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
let warmed=false;function warm(){if(!('speechSynthesis'in window))return;try{speechSynthesis.resume();}catch(e){}if(warmed)return;loadVoices();try{var wu=new SpeechSynthesisUtterance('ok');wu.volume=0.02;speechSynthesis.speak(wu);}catch(e){}warmed=true;}
document.body.addEventListener('touchstart',warm,{once:true});
document.body.addEventListener('click',warm,{once:true});
document.addEventListener('visibilitychange',()=>{if(document.hidden){try{speechSynthesis.cancel();}catch(e){}stopTimer();}});
setInterval(()=>{if('speechSynthesis'in window&&speechSynthesis.speaking){try{speechSynthesis.pause();speechSynthesis.resume();}catch(e){}}},9000);
function mkUtter(t,lang){
  const u=new SpeechSynthesisUtterance(t);
  if(lang==='en'){const v=voices.find(v=>/en[-_]GB/i.test(v.lang))||voices.find(v=>/en[-_]US/i.test(v.lang))||voices.find(v=>/^en/i.test(v.lang));if(v)u.voice=v;u.lang=(v&&v.lang)||'en-GB';u.rate=0.8;}
  else{const v=voices.find(v=>/zh|cmn|Chinese/i.test(v.lang));if(v)u.voice=v;u.lang='zh-CN';u.rate=0.95;}
  u.pitch=1.0;return u;
}
function speakOnce(t,lang){try{speechSynthesis.cancel();speechSynthesis.resume();}catch(e){}try{speechSynthesis.speak(mkUtter(t,lang));}catch(e){}}
function testVoice(){if(!('speechSynthesis'in window)){var k=document.querySelector('.kou');if(k)k.textContent='这个浏览器不支持朗读，请用 Safari 或 Chrome 打开';return;}warm();speakOnce('你好弟弟,我们来默写英语单词。','zh');setTimeout(()=>speakOnce('Hello, I can speak English too.','en'),2600);}

/* 读 N 遍,读完回调(带超时保护) */
let speakSession=0;
function speakTimes(t,lang,times,onDone){
  const sid=++speakSession;
  try{speechSynthesis.cancel();}catch(e){}
  let count=0,fired=false;
  function fire(){if(fired||sid!==speakSession)return;fired=true;onDone&&onDone();}
  function one(){
    if(sid!==speakSession)return;
    const u=mkUtter(t,lang);
    u.onend=()=>{ if(sid!==speakSession)return; count++;
      if(count<times){ setTimeout(one,900); } else { setTimeout(fire,400); } };
    u.onerror=()=>{ count++; if(count<times){setTimeout(one,900);} else {setTimeout(fire,400);} };
    try{speechSynthesis.resume();}catch(e){}speechSynthesis.speak(u);
  }
  one();
  /* 超时保护: 估算每遍时长 */
  const est=(t.length*(lang==='en'?90:380)+1600)*times+2500;
  setTimeout(fire,Math.min(est,40000));
}

/* ===================== 状态与导航 ===================== */
const S={mode:null,key:null,items:[],idx:0,miss:new Set(),lang:'zh',paused:false,
  startTime:0,perItem:[],marks:[]};
let timerH=null,timerLeft=0;
function stopTimer(){if(timerH){clearInterval(timerH);timerH=null;}}
function show(id){['home','cnlist','enlist','dict','ans','quiz','archive'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');window.scrollTo(0,0);}
function goHome(){speakSession++;try{speechSynthesis.cancel();}catch(e){}stopTimer();refreshHomeStat();show('home');}

/* ===================== 归档引擎 ===================== */
/* localStorage key: mx_archive_哥哥 。结构:
   { child:'哥哥', events:[ {ts, type:'dict'|'quiz', subject:'cn'|'en', lesson, total, wrong, durationSec,
       items:[ {word, hint, ok, ms} ] } ] } */
const CHILD='弟弟';
const AKEY='mx_archive_'+CHILD+'_eng3b';
function loadArchive(){try{return JSON.parse(localStorage.getItem(AKEY))||{child:CHILD,events:[]};}catch(e){return{child:CHILD,events:[]};}}
function saveArchive(a){try{localStorage.setItem(AKEY,JSON.stringify(a));}catch(e){}}
function logEvent(ev){const a=loadArchive();a.events.push(ev);saveArchive(a);}
function fmtDate(ts){const d=new Date(ts);const p=n=>(n<10?'0':'')+n;return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
/* 聚合:统计每个词的累计对错次数,找反复错 */
function aggregateWords(events){
  const m={};
  events.forEach(ev=>{(ev.items||[]).forEach(it=>{
    const key=ev.subject+'|'+it.word;
    if(!m[key])m[key]={word:it.word,hint:it.hint||'',subject:ev.subject,lesson:ev.lesson,ok:0,wrong:0,last:ev.ts};
    if(it.ok)m[key].ok++;else m[key].wrong++;
    m[key].last=Math.max(m[key].last,ev.ts);
  });});
  return Object.values(m);
}
function refreshHomeStat(){
  const a=loadArchive();const el=document.getElementById('homestat');if(!el)return;
  if(!a.events.length){el.textContent='还没有记录——做一次默写或小测就会自动归档';return;}
  const words=aggregateWords(a.events);
  const repeat=words.filter(w=>w.wrong>=2).length;
  el.innerHTML=`共 <b>${a.events.length}</b> 次练习 ｜ 反复错的词 <b style="color:var(--red)">${repeat}</b> 个 ｜ 点这里查看/导出`;
}

/* ===================== 列表 ===================== */
function showCnList(){
  const b=document.getElementById('cnlist');
  b.innerHTML=`<button class="back" onclick="goHome()">← 返回</button>
    <div class="card"><h2>📖 语文默写 · 选一课</h2>
    <div class="lead">边听边写,每词读三遍。时间略紧,写快一点!建议一次默 1-2 课。</div>
    <div class="list">${Object.keys(CN).map(k=>`<div class="lesson" onclick="startDict('cn','${k}')"><div class="t">${k}</div><div class="n">${CN[k].length} 个词</div></div>`).join('')}</div></div>
    <div class="card"><h2>🧠 语文理解小测(选词填空)</h2>
    <div class="lead">默写检查"会不会写",这里检查"懂不懂意思"——把词正确用到句子里。</div>

function dictBadge(lesson){var a=loadArchive();for(var i=a.events.length-1;i>=0;i--){var e=a.events[i];if(e.lesson===lesson)return '<div class="n" style="color:#1aa7b8;font-weight:700">上次 ✅'+(e.total-e.wrong)+' ❌'+e.wrong+'</div>';}return '';}
function showEnList(){

/* ===================== 默写流程 ===================== */
function startDict(mode,key){
  S.mode=mode;S.key=key;S.idx=0;S.miss=new Set();S.startTime=Date.now();S.perItem=[];
  if(mode==='cn'){S.items=CN[key].map(w=>({t:w,hint:'',say:w}));S.lang='zh';}
  else if(mode==='env'){S.items=EN_VOCAB[key].map(p=>({t:p[0],hint:p[1],say:p[0]}));S.lang='en';}
  else{S.items=EN_SENT[key].map(p=>({t:p[0],hint:p[1],say:p[0]}));S.lang='en';}
  S.itemStart=Date.now();
  renderDict();show('dict');
  setTimeout(()=>runWord(),400);
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function round05(v){return Math.round(v*2)/2;}
function wordSec(it){
  const w=it.t;
  if(S.mode==='cn'){ // 语文:基础5.5+每字2秒,范围9.5-16
    const n=[...w].length; return round05(clamp(5.5+n*2,9.5,16));
  }
  if(S.mode==='ens'){ // 英语整句:基础9+每字母0.32,范围16-30
    const letters=(w.match(/[a-zA-Z]/g)||[]).length; return round05(clamp(9+letters*0.32,16,30));
  }
  // 英语词/词组:基础5+每字母0.55+每空格2,范围9-18
  const letters=(w.match(/[a-zA-Z]/g)||[]).length; const sp=(w.match(/ /g)||[]).length;
  return round05(clamp(5+letters*0.55+sp*2,9,18));
}
function renderDict(){
  const b=document.getElementById('dict');const it=S.items[S.idx];
  b.innerHTML=`<button class="back" onclick="confirmQuit()">← 退出本课</button>
    <div class="card dictbox">
      <div class="dnum">${S.key} ｜ 第 ${S.idx+1} / ${S.items.length} 个</div>
      <div class="dstatus wrt" id="dstat">🔊✍️ 一边听一边写</div>
      <div class="dhint" id="dhint">${S.mode==='ens'?'(听整句,写下来)':'(听到就开始写,别看屏幕)'}</div>
      <div class="bigcount" id="bigcount">--</div>
      <div class="timerbar"><i id="tbar" style="width:100%"></i></div>
      <div class="dots2">${S.items.map((_,i)=>`<i class="${i<S.idx?'on':(i===S.idx?'cur':'')}"></i>`).join('')}</div>
      <div class="row">
        <button class="btn sm ghost" onclick="replayWord()">🔁 再听一遍</button>
        <button class="btn sm blue" id="pbtn" onclick="togglePause()">⏸ 暂停</button>
        <button class="btn sm green" onclick="nextWord()">✅ 写好了,下一个</button>
      </div>
    </div>`;
}
function runWord(){
  stopTimer();S.paused=false;S.itemStart=Date.now();
  const it=S.items[S.idx];
  const st=document.getElementById('dstat');if(!st)return;
  st.className='dstatus wrt';st.textContent='🔊✍️ 一边听一边写';
  const tb=document.getElementById('tbar');if(tb)tb.style.width='100%';
  // 报读三遍 和 书写倒计时 同时开始
  speakTimes(it.say,S.lang,3,null);
  startWriting();
}
function startWriting(){
  const it=S.items[S.idx];
  const total=wordSec(it);timerLeft=total;
  stopTimer();
  timerH=setInterval(()=>{
    if(S.paused)return;
    timerLeft-=0.25;
    const tb=document.getElementById('tbar');
    const bc=document.getElementById('bigcount');
    const pct=Math.max(0,timerLeft/total*100);
    if(tb)tb.style.width=pct+'%';
    const secLeft=Math.ceil(Math.max(0,timerLeft));
    if(bc){bc.innerHTML=secLeft+'<small> 秒</small>';
      if(timerLeft<=3.2){bc.classList.add('warn');if(tb)tb.classList.add('warn');}
      else{bc.classList.remove('warn');if(tb)tb.classList.remove('warn');}}
    if(timerLeft<=0){stopTimer();nextWord();}
  },250);
}
function replayWord(){
  // 不打断倒计时,只重读一遍
  const it=S.items[S.idx];
  speakTimes(it.say,S.lang,1,null);
}
function togglePause(){
  S.paused=!S.paused;
  const pb=document.getElementById('pbtn');
  if(pb)pb.textContent=S.paused?'▶ 继续':'⏸ 暂停';
  if(S.paused){try{speechSynthesis.cancel();}catch(e){}}
}
function nextWord(){
  speakSession++;try{speechSynthesis.cancel();}catch(e){}stopTimer();
  // 记录刚写完这个词的用时
  const it=S.items[S.idx];
  S.perItem.push({word:it.t,hint:it.hint||'',ms:Date.now()-(S.itemStart||Date.now())});
  if(S.idx<S.items.length-1){S.idx++;S.itemStart=Date.now();renderDict();setTimeout(()=>runWord(),300);}
  else{showAnswers();}
}
function confirmQuit(){
  speakSession++;try{speechSynthesis.cancel();}catch(e){}stopTimer();
  if(S.mode==='cn')showCnList();else showEnList();
}

/* ===================== 答案对照（每词强制判 ✅/❌，杜绝默认全对） ===================== */
function showAnswers(){
  const b=document.getElementById('ans');
  S.marks=new Array(S.items.length).fill(null);
  b.innerHTML=`<button class="back" onclick="confirmQuit()">← 返回选课</button>
    <div class="card">
      <h2>📋 ${S.key} · 对答案</h2>
      <div class="lead">看你写的，<b>每个词都要点</b>：写对点 ✅，写错点 ❌（全部判完才能完成）。</div>
      <div id="ansgrid"></div>
      <div class="kou" id="ansprog"></div>
      <div class="row">
        <button class="btn big" id="redoBtn" onclick="redoMiss()" style="display:none">🔁 只重默写错的</button>
        <button class="btn green big" id="finishBtn" onclick="finishLesson()" disabled style="opacity:.5">完成（先判完每个词）</button>
      </div>
    </div>`;
  show('ans');renderAnswers();
  speakOnce('默完了！对照答案，每个词点写对还是写错。','zh');
}
function renderAnswers(){
  const g=document.getElementById('ansgrid');if(!g)return;
  g.innerHTML=S.items.map((it,i)=>{const m=S.marks[i];
    return `<div class="answrow ${m===true?'mok':(m===false?'mno':'')}">
      <span class="aw">${it.t}${it.hint?`<span class="py">${it.hint}</span>`:''}</span>
      <span class="markbtns"><button class="mk ok ${m===true?'on':''}" onclick="mark(${i},true)">✅</button>
      <button class="mk no ${m===false?'on':''}" onclick="mark(${i},false)">❌</button></span></div>`;}).join('');
  const done=S.marks.filter(x=>x!==null).length, wrong=S.marks.filter(x=>x===false).length;
  const prog=document.getElementById('ansprog');
  if(prog)prog.innerHTML=`已判 <b>${done}/${S.items.length}</b>`+(done===S.items.length?` ｜ 写对 ${S.items.length-wrong}，写错 ${wrong}`:'');
  const fb=document.getElementById('finishBtn');
  if(fb){if(done===S.items.length){fb.disabled=false;fb.style.opacity='1';fb.textContent='✅ 完成，存档';}else{fb.disabled=true;fb.style.opacity='.5';fb.textContent='完成（先判完每个词）';}}
  const rb=document.getElementById('redoBtn');if(rb)rb.style.display=wrong?'inline-flex':'none';
}
function mark(i,ok){S.marks[i]=ok;ding();renderAnswers();}
function redoMiss(){
  const idx=S.items.map((_,i)=>i).filter(i=>S.marks[i]===false);
  if(!idx.length)return;
  S.items=idx.map(i=>S.items[i]);S.idx=0;S.marks=[];
  renderDict();show('dict');speakOnce('好，只重默写错的。准备！','zh');setTimeout(()=>runWord(),1500);
}
function finishLesson(){
  if(!S.marks||S.marks.some(x=>x===null))return;
  const items=S.items.map((it,i)=>{const pi=S.perItem.find(p=>p.word===it.t);return {word:it.t,hint:it.hint||'',ok:S.marks[i]===true,ms:pi?pi.ms:0};});
  const wrong=S.marks.filter(x=>x===false).length;
  logEvent({ts:Date.now(),type:'dict',subject:(S.mode==='cn'?'cn':'en'),lesson:S.key,total:S.items.length,wrong:wrong,durationSec:Math.round((Date.now()-S.startTime)/1000),items:items});
  speakOnce(wrong?('记下了，写错 '+wrong+' 个，下次重点练。'):'全对，真棒！','zh');
  setTimeout(()=>confirmQuit(),1300);
}

/* ===================== 理解小测引擎 ===================== */
const Q={mode:null,key:null,bank:[],idx:0,startTime:0,results:[]};
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildEnQuiz(key){
  const pairs=EN_VOCAB[key];const pool=pairs.slice();
  const pick=shuffle(pairs).slice(0,Math.min(8,pairs.length));
  return pick.map(p=>{const en=p[0],cn=p[1];
    const dir=Math.random()<0.5?'e2c':'c2e';
    const distract=shuffle(pool.filter(q=>q[0]!==en)).slice(0,2);
    if(dir==='e2c'){const opts=shuffle([cn,distract[0][1],distract[1]?distract[1][1]:'(无)']);
      return {prompt:en,ask:'这个英文是什么意思?',o:opts,a:opts.indexOf(cn),word:en,hint:cn,say:en,lang:'en'};}
    else{const opts=shuffle([en,distract[0][0],distract[1]?distract[1][0]:'(none)']);
      return {prompt:cn,ask:'这个中文用英文怎么说?',o:opts,a:opts.indexOf(en),word:en,hint:cn,say:'',lang:'en'};}
  });
}
function buildCnQuiz(key){
  return CN_QUIZ[key].map(item=>{const correct=item.o[item.a];const opts=shuffle(item.o);
    return {prompt:item.q,ask:'选一个最合适的词填进去:',o:opts,a:opts.indexOf(correct),word:correct,hint:'',say:'',lang:'zh'};});
}
function startQuiz(mode,key){
  Q.mode=mode;Q.key=key;Q.idx=0;Q.startTime=Date.now();Q.results=[];
  Q.bank=mode==='enq'?buildEnQuiz(key):buildCnQuiz(key);
  renderQuiz();show('quiz');
}
function renderQuiz(){
  const b=document.getElementById('quiz');const it=Q.bank[Q.idx];
  const subj=Q.mode==='enq'?'en':'cn';
  b.innerHTML='<button class="back" onclick="quitQuiz()">\u2190 退出小测</button>'+
    '<div class="card"><h2>\ud83e\udde0 '+Q.key+' \u00b7 理解小测</h2>'+
    '<div class="dnum" style="text-align:center">第 '+(Q.idx+1)+' / '+Q.bank.length+' 题</div>'+
    '<div style="text-align:center;font-size:26px;font-weight:800;margin:16px 0 6px;color:'+(subj==='en'?'var(--purple)':'var(--blue)')+'">'+it.prompt+
      (it.say?' <button class="speak" style="width:34px;height:34px;font-size:16px;vertical-align:middle" onclick="speakOnce(this.dataset.s,\'en\')" data-s="'+it.say.replace(/"/g,'&quot;')+'">\ud83d\udd0a</button>':'')+'</div>'+
    '<div class="lead" style="text-align:center">'+it.ask+'</div>'+
    '<div class="opts">'+it.o.map((x,i)=>'<button class="opt" onclick="answerQuiz('+i+',this)">'+x+'</button>').join('')+'</div>'+
    '<div id="qfb"></div>'+
    '<div class="dots2">'+Q.bank.map((_,i)=>'<i class="'+(i<Q.idx?'on':(i===Q.idx?'cur':''))+'"></i>').join('')+'</div></div>';
  if(it.say)setTimeout(()=>speakOnce(it.say,'en'),300);
}
function answerQuiz(i,btn){
  const it=Q.bank[Q.idx];const fb=document.getElementById('qfb');if(!fb)return;
  const ok=i===it.a;
  Q.results.push({word:it.word,hint:it.hint,ok:ok,ms:0});
  document.querySelectorAll('#quiz .opt').forEach(b=>b.style.pointerEvents='none');
  if(ok){btn.classList.add('right');ding();
    fb.innerHTML='<div style="background:var(--greenbg);border-radius:10px;padding:8px 12px;margin-top:8px;color:var(--green);font-weight:700;text-align:center">\u2705 对!</div>';
    speakOnce('对','zh');}
  else{btn.classList.add('wrong');
    fb.innerHTML='<div style="background:#FBE6E2;border-radius:10px;padding:8px 12px;margin-top:8px;color:var(--redd);font-weight:700;text-align:center">正确答案:'+it.o[it.a]+'</div>';
    const opts=document.querySelectorAll('#quiz .opt');if(opts[it.a])opts[it.a].classList.add('right');
    speakOnce('再记一下,正确答案是'+it.o[it.a],'zh');}
  setTimeout(()=>{if(Q.idx<Q.bank.length-1){Q.idx++;renderQuiz();}else{finishQuiz();}},ok?900:2000);
}
function finishQuiz(){
  const wrong=Q.results.filter(r=>!r.ok).length;
  logEvent({ts:Date.now(),type:'quiz',subject:(Q.mode==='enq'?'en':'cn'),lesson:Q.key,
    total:Q.bank.length,wrong:wrong,durationSec:Math.round((Date.now()-Q.startTime)/1000),items:Q.results});
  const b=document.getElementById('quiz');const score=Q.bank.length-wrong;
  b.innerHTML='<button class="back" onclick="quitQuiz()">\u2190 返回</button>'+
    '<div class="card" style="text-align:center"><h2>\ud83e\udde0 '+Q.key+' \u00b7 小测完成</h2>'+
    '<div style="font-size:48px;font-weight:800;color:'+(wrong===0?'var(--green)':'var(--red)')+';margin:14px 0">'+score+' / '+Q.bank.length+'</div>'+
    '<div class="kou">'+(wrong===0?'全对!说明这些词你是真懂了,不是死记硬背 \ud83d\udc4d':'错了 '+wrong+' 个——这些是"会写但不一定真懂"的词,已存档,重点复习。')+'</div>'+
    '<div class="row"><button class="btn green big" onclick="quitQuiz()">完成</button></div></div>';
  show('quiz');
  speakOnce(wrong===0?'全对!这些词你真的懂了。':'做完了,错的词已经记下来。','zh');
}
function quitQuiz(){speakSession++;try{speechSynthesis.cancel();}catch(e){}if(Q.mode==='enq')showEnList();else showCnList();}
function ding(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start();o.stop(ctx.currentTime+0.3);}catch(e){}}

      '<button class="btn sm ghost" onclick="clearArchive()">\ud83d\uddd1 清空</button></div></div>'+

    '<div class="card"><h2>\ud83d\udcc5 练习记录</h2>'+
      (evs.length?evs.map(ev=>{
        const wrongItems=(ev.items||[]).filter(it=>!it.ok).map(it=>it.word);
        return '<div style="border-bottom:1px solid var(--line);padding:9px 0">'+
          '<div style="font-weight:700">'+(ev.type==='dict'?'\u270d\ufe0f默写':'\ud83e\udde0小测')+' \u00b7 '+ev.lesson+
            '<span style="float:right;color:#a08d6f;font-size:12px">'+fmtDate(ev.ts)+'</span></div>'+
          '<div style="font-size:13px;color:#7d6a4e;margin-top:3px">'+(ev.total-ev.wrong)+'/'+ev.total+' 对 \uff5c 用时 '+ev.durationSec+'秒'+
            (wrongItems.length?' \uff5c 错:<span style="color:var(--red)">'+wrongItems.join('\u3001')+'</span>':' \uff5c 全对 \u2713')+'</div></div>';
      }).join(''):'<div class="lead">还没有记录</div>')+'</div>'+
    '<div class="card hidden" id="copybox"><h2>复制下面全部文字</h2>'+
      '<textarea id="copytext" style="width:100%;height:220px;font-size:12px;font-family:monospace;border:2px solid var(--line);border-radius:10px;padding:10px"></textarea></div>';
  show('archive');
}
function archiveText(){
  const a=loadArchive();const words=aggregateWords(a.events);
  const repeat=words.filter(w=>w.wrong>=2).sort((x,y)=>y.wrong-x.wrong);
  let t='【'+CHILD+'默写学习档案】导出时间:'+fmtDate(Date.now())+'\n练习总次数:'+a.events.length+'\n\n';
  t+='== 反复错的词(错\u22652次,优先复习)==\n';
  t+=repeat.length?repeat.map(w=>w.word+(w.hint?'('+w.hint+')':'')+' ['+(w.subject==='en'?'英语':'语文')+w.lesson+'] 错'+w.wrong+'次/对'+w.ok+'次').join('\n'):'(无)';
  t+='\n\n== 每次练习明细 ==\n';
  a.events.forEach(ev=>{
    const wrongItems=(ev.items||[]).filter(it=>!it.ok).map(it=>it.word+(it.hint?'('+it.hint+')':''));
    t+='\n['+fmtDate(ev.ts)+'] '+(ev.type==='dict'?'默写':'小测')+' '+(ev.subject==='en'?'英语':'语文')+'\u00b7'+ev.lesson+' \uff5c '+(ev.total-ev.wrong)+'/'+ev.total+'对 \uff5c '+ev.durationSec+'秒';
    if(wrongItems.length)t+='\n  错词:'+wrongItems.join('\u3001');
  });
  t+='\n\n== 原始数据(JSON,可直接投喂给Claude)==\n'+JSON.stringify(a);
  return t;
}
function copyArchive(){
  const txt=archiveText();
  const box=document.getElementById('copybox');const ta=document.getElementById('copytext');
  if(box&&ta){box.classList.remove('hidden');ta.value=txt;ta.focus();ta.select();}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(()=>{speakOnce('已经复制好了,可以粘贴发给爸爸或Claude。','zh');}).catch(()=>{});}
}
function downloadArchive(){
  const txt=archiveText();const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=CHILD+'默写档案.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function clearArchive(){if(confirm('确定清空'+CHILD+'的所有学习记录吗?不能撤销。')){localStorage.removeItem(AKEY);showArchive();}}
window.addEventListener('load',()=>{setTimeout(refreshHomeStat,100);});

</script>
