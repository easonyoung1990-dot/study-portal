<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>哥哥第11天 · 缺口补齐+输出爆破</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap');
:root{
  --red:#D63A2E;--redd:#A82A20;--gold:#F2B632;--golddk:#D89400;
  --ink:#3A2A1E;--paper:#FBF3E6;--card:#fff;--line:#EBDCC4;
  --green:#3C9D54;--greenbg:#EAF7EC;--blue:#3170B5;--bluebg:#E8F0FA;--purple:#7B3FA0;--purplebg:#F3EAF9;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'LXGW WenKai Screen','Baloo 2','PingFang SC','Microsoft YaHei',serif;
  background:radial-gradient(circle at 10% 6%,#FCE6B8 0,transparent 38%),radial-gradient(circle at 92% 96%,#F6D2C0 0,transparent 42%),var(--paper);
  color:var(--ink);min-height:100vh;padding:0 0 92px;}
.wrap{max-width:740px;margin:0 auto;padding:14px;}
.top{display:flex;align-items:center;gap:10px;padding:12px 4px 6px;}
.top .badge{background:var(--red);color:#fff;font-weight:700;font-size:19px;padding:6px 13px;border-radius:13px 13px 13px 4px;box-shadow:0 4px 0 var(--redd);}
.top h1{font-size:19px;margin:0;}
.top .sub{font-size:12px;color:#a8946f;}
.speak{background:#fff;border:2px solid var(--gold);color:var(--golddk);border-radius:50%;width:42px;height:42px;font-size:20px;cursor:pointer;box-shadow:0 3px 0 #f0dca0;flex-shrink:0;}
.card{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:18px;margin:13px 0;box-shadow:0 6px 0 #efe1c8;}
.card h2{margin:0 0 8px;font-size:19px;color:var(--redd);}
.card .lead{font-size:14px;color:#7d6a4e;line-height:1.7;margin:0 0 10px;}
.menu{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.tile{background:#fff;border:2px solid var(--line);border-radius:16px;padding:14px 10px;cursor:pointer;box-shadow:0 5px 0 #efe1c8;text-align:center;transition:transform .08s,box-shadow .08s;}
.tile:active{transform:translateY(3px);box-shadow:0 2px 0 #efe1c8;}
.tile .ic{font-size:30px;}
.tile .nm{font-weight:700;font-size:16px;margin-top:6px;}
.tile .ds{font-size:11px;color:#a08d6f;margin-top:3px;line-height:1.4;}
.tile.math{border-color:#f3c7c2;} .tile.cn{border-color:#bcd4ee;} .tile.en{border-color:#ddc7ea;}
.kou{background:linear-gradient(180deg,#FCEFCF,#FBE6B0);border:2px dashed var(--golddk);border-radius:13px;padding:11px 14px;margin:11px 0;color:#7a5800;font-weight:700;font-size:14px;line-height:1.85;}
.kou b{color:var(--redd);}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:16px;padding:12px 20px;border-radius:14px;box-shadow:0 4px 0 var(--redd);cursor:pointer;transition:transform .06s;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--redd);}
.btn.ghost{background:#fff;color:var(--redd);border:2px solid var(--red);box-shadow:0 4px 0 #f0d3cf;}
.btn.green{background:var(--green);box-shadow:0 4px 0 #2c7a40;}
.btn.sm{font-size:14px;padding:9px 14px;}
.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:12px;}
.back{background:none;border:none;color:#a08d6f;font-size:15px;font-family:inherit;cursor:pointer;padding:8px 2px;font-weight:700;}
.lion{display:flex;gap:10px;align-items:flex-start;margin:10px 0;}
.lion .face{font-size:32px;flex-shrink:0;animation:bob 2.6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.lion .bubble{background:#fff;border:2px solid var(--line);border-radius:14px 14px 14px 2px;padding:10px 13px;font-size:15px;line-height:1.7;box-shadow:0 3px 0 #efe1c8;}
.step{background:var(--bluebg);border-left:5px solid var(--blue);border-radius:8px;padding:10px 12px;margin:8px 0;font-size:15px;line-height:1.7;animation:pop .35s;}
.step.ok{background:var(--greenbg);border-color:var(--green);}
.step.bad{background:#FBE6E2;border-color:var(--red);}
@keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.hidden{display:none!important;}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.opt{background:#fff;border:2px solid var(--line);border-radius:14px;padding:13px 15px;font-size:16px;cursor:pointer;text-align:left;font-family:inherit;box-shadow:0 4px 0 #efe1c8;transition:transform .06s;line-height:1.5;}
.opt:active{transform:translateY(3px);box-shadow:0 1px 0 #efe1c8;}
.opt.right{background:var(--greenbg);border-color:var(--green);color:#1f6b2c;font-weight:700;}
.opt.wrong{background:#FBE6E2;border-color:var(--red);animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.dots{display:flex;gap:6px;justify-content:center;margin:14px 0 2px;}
.dots i{width:9px;height:9px;border-radius:50%;background:#e6d8bf;display:block;}
.dots i.on{background:var(--red);}
.taskbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:2px solid var(--line);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:50;}
.taskbar .note{font-size:13px;color:#7d6a4e;flex:1;}
.pulse{animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 4px 0 var(--redd);}50%{box-shadow:0 4px 0 var(--redd),0 0 0 6px rgba(214,58,46,.18);}}
.celebrate{position:fixed;inset:0;pointer-events:none;z-index:60;}
/* 几何动画 */
.geo{width:100%;max-width:420px;margin:10px auto;display:block;background:#fff;border:2px solid var(--line);border-radius:14px;}
/* 统计柱 */
.bars{display:flex;align-items:flex-end;gap:10px;height:160px;margin:14px 6px;padding-bottom:22px;border-bottom:2px solid var(--line);}
.bar{flex:1;background:var(--blue);border-radius:6px 6px 0 0;position:relative;cursor:pointer;transition:background .2s,transform .1s;min-height:6px;}
.bar:active{transform:scaleY(1.02);}
.bar.hi{background:var(--red);}
.bar .v{position:absolute;top:-20px;left:0;right:0;text-align:center;font-size:12px;font-weight:700;color:var(--ink);}
.bar .d{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:12px;color:#a08d6f;}
/* 否定句拆解 */
.sent{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0;}
.tok{background:#fff;border:2px solid var(--line);border-radius:10px;padding:8px 12px;font-size:17px;font-weight:700;}
.tok.subj{background:#FFF3D6;border-color:var(--gold);color:#7a5800;}
.tok.verb{background:var(--bluebg);border-color:var(--blue);color:#1c5a9c;}
.tok.ins{background:var(--greenbg);border-color:var(--green);color:#1f6b2c;animation:pop .4s;}
.tagline{text-align:center;font-size:14px;color:#7d6a4e;margin:6px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge">哥哥</div>
    <div style="flex:1"><h1>第11天 · 输出爆破日</h1><div class="sub">完整句拼装 · 介词 · 三单输出</div></div>
    <button class="speak" onclick="testVoice()">🔊</button>
  </div>
  <div id="home">
    <div class="card">
      <div class="lion"><div class="face">🦁</div><div class="bubble">今天英语重点变了：<b>不考你"会不会选"，考你"能不能写出完整句"</b>！read books 的 s、半句话、On my week——这些昨天的真实错误今天全部打掉。</div></div>
    </div>
    <div class="menu" id="menu"></div>
    <div class="kou" style="margin-top:14px">★ 今日三句：read books 要加 s；回答问题写完整句；on 加星期几，不说 On my week。</div>
  </div>
  <div id="stage" class="hidden"></div>
</div>
<div class="taskbar"><div class="note" id="tnote">👆 选一关开始</div><button class="btn sm pulse" id="tbtn" onclick="topAction()">开始</button></div>
<canvas class="celebrate hidden" id="cv"></canvas>
<script>
/* TTS */
let voices=[];function loadVoices(){voices=speechSynthesis.getVoices();}
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
let warmed=false;function warm(){if(!('speechSynthesis'in window))return;try{speechSynthesis.resume();}catch(e){}if(warmed)return;loadVoices();try{var wu=new SpeechSynthesisUtterance('ok');wu.volume=0.02;speechSynthesis.speak(wu);}catch(e){}warmed=true;}
/* ===== 神经真人配音层(edge-tts 预合成),失败回退浏览器TTS ===== */
/* 预合成目录:每条音频按 fnv(lang+"|"+text) 命名,与 gen_audio.py / eddey_english 一致。本App只发中文。 */
const AUDIO_DIR="audio/kenton_day11_output/";
let exAudio=null;   // 单个复用音频元素:首次手势(warm)解锁,之后每段复用(移动端更兼容)
let audioTok=0;     // 打断/超时保护:自增令牌让过期回调失效
/* 必须与 gen_audio.py 的 fnv() 一致:对 (lang+"|"+text) 的 UTF-8 字节做 FNV-1a */
function audioHash(s){const b=new TextEncoder().encode(s);let x=0x811c9dc5>>>0;for(let i=0;i<b.length;i++){x^=b[i];x=Math.imul(x,0x01000193)>>>0;}return ('0000000'+x.toString(16)).slice(-8);}
function getExAudio(){if(!exAudio){exAudio=new Audio();exAudio.setAttribute('playsinline','');exAudio.preload='auto';try{document.body.appendChild(exAudio);}catch(e){}}return exAudio;}
function haltAudio(){audioTok++;if(exAudio){try{exAudio.pause();}catch(e){}}}
/* 浏览器TTS:原有逻辑,作为回退(本App只有中文) */
function ttsSpeak(t,rate){if(!('speechSynthesis'in window))return;try{speechSynthesis.cancel();speechSynthesis.resume();}catch(e){}const u=new SpeechSynthesisUtterance(t);const zh=voices.find(v=>/zh|cmn|Chinese/i.test(v.lang));if(zh)u.voice=zh;u.lang='zh-CN';u.rate=rate||0.85;u.pitch=1.04;speechSynthesis.speak(u);}
/* 朗读一句:优先播预合成神经语音,失败回退TTS。保留原 speak(t,rate) 签名 */
function speak(t,rate){
  try{speechSynthesis.cancel();}catch(e){}
  audioTok++;const myTok=audioTok;
  const a=getExAudio();let done=false;
  const stale=()=>done||myTok!==audioTok;
  const fb=()=>{if(stale())return;done=true;ttsSpeak(t,rate);};
  a.onended=()=>{if(stale())return;done=true;};
  a.onerror=fb;
  try{a.pause();}catch(e){}
  a.src=AUDIO_DIR+audioHash('zh|'+t)+'.mp3';
  try{a.currentTime=0;}catch(e){}
  const p=a.play();
  if(p&&typeof p.catch==='function')p.catch(fb);
}
function testVoice(){warm();speak('你好哥哥，第7天三科一起加油！');}
document.body.addEventListener('touchstart',warm,{once:true});document.body.addEventListener('click',warm,{once:true});
document.addEventListener('visibilitychange',()=>{if(document.hidden){haltAudio();try{speechSynthesis.cancel();}catch(e){}}});
setInterval(()=>{if('speechSynthesis'in window&&speechSynthesis.speaking){try{speechSynthesis.pause();speechSynthesis.resume();}catch(e){}}},9000);
/* 路由 */
const MENU=[
  {id:'mathd',ic:'🔢',nm:'数学综合',ds:'巧算·最值·先认题型',c:'math'},
  {id:'cnd',ic:'📖',nm:'语文阅读',ds:'新故事!先点证据',c:'cn'},
  {id:'bing',ic:'🔧',nm:'病句词语',ds:'先选病因再改',c:'cn'},
  {id:'pin',ic:'🧩',nm:'拼完整句',ds:'词块拼装·治半句话',c:'en'},
  {id:'jiec',ic:'🔗',nm:'介词搭配',ds:'on/in/at/with',c:'en'},
  {id:'runse',ic:'✨',nm:'改错润色',ds:'真实卷面错误',c:'en'},
];
function buildMenu(){const m=document.getElementById('menu');m.innerHTML='';
  MENU.forEach(x=>{const d=document.createElement('button');d.className='tile '+x.c;d.onclick=()=>openMod(x.id);
    d.innerHTML=`<div class="ic">${x.ic}</div><div class="nm">${x.nm}</div><div class="ds">${x.ds}</div>`;m.appendChild(d);});}
buildMenu();
let curMod=null;
function openMod(id){curMod=id;document.getElementById('home').classList.add('hidden');
  const s=document.getElementById('stage');s.classList.remove('hidden');s.innerHTML='';MOD[id].render(s);
  document.getElementById('tnote').textContent='跟着小狮子一步步来 👀';document.getElementById('tbtn').textContent='返回菜单';window.scrollTo(0,0);}
function goHome(){curMod=null;document.getElementById('stage').classList.add('hidden');document.getElementById('home').classList.remove('hidden');
  document.getElementById('tnote').textContent='👆 选一关开始';document.getElementById('tbtn').textContent='开始';haltAudio();try{speechSynthesis.cancel();}catch(e){}window.scrollTo(0,0);}
function topAction(){if(curMod)goHome();}
function lion(t){return `<div class="lion"><div class="face">🦁</div><div class="bubble">${t}</div></div>`;}
function burst(){const cv=document.getElementById('cv');cv.classList.remove('hidden');const ctx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;
  const P=[],cols=['#D63A2E','#F2B632','#3C9D54','#3170B5','#FF7043'];
  for(let i=0;i<90;i++)P.push({x:innerWidth/2,y:innerHeight/3,vx:(Math.random()-.5)*11,vy:Math.random()*-11-3,c:cols[i%5],s:6+Math.random()*6,r:Math.random()*6});
  let t=0;(function an(){ctx.clearRect(0,0,cv.width,cv.height);P.forEach(p=>{p.vy+=.32;p.x+=p.vx;p.y+=p.vy;p.r+=.2;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ctx.restore();});t++;if(t<90)requestAnimationFrame(an);else cv.classList.add('hidden');})();}
function ding(){try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(.25,a.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.3);o.start();o.stop(a.currentTime+.32);}catch(e){}}
const MOD={};
/* ===== 错题云端上传（fire-and-forget，端点缺失/失败完全不影响使用） ===== */
const EB_KID='kenton';                                  // 本App=哥哥→kenton
const EB_SUBMAP={math:'数学',cn:'语文',en:'英语'};        // 内部学科→中文学科名
function ebSubject(sub){ return EB_SUBMAP[sub]||sub||''; }
/* 尝试从当前模块抓本题文字(被默写/做错的题)，抓不到就空串 */
function ebCurItem(sub){
  try{
    const id=curMod, Q=Qz[id];
    if(Q&&typeof Q.q==='number'&&Q.bank&&Q.bank[Q.q]){
      const it=Q.bank[Q.q];
      return it.t||it.ask||it.word||(it.words?it.words.join(' '):'')||'';
    }
  }catch(e){}
  return '';
}
function ebCurTopic(sub){
  try{ const x=(MENU||[]).find(m=>m.id===curMod); return x?x.nm:''; }catch(e){ return ''; }
}
/* 上传一批 item（数组）到家长云端：text/plain 避免 CORS 预检，.then/.catch 全吞 */
function ebUpload(items){
  try{
    const ep=localStorage.getItem('eb_endpoint');
    if(!ep||!items||!items.length) return;               // 没端点直接跳过
    fetch(ep,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(items)})
      .then(function(){}).catch(function(){});           // fire-and-forget
  }catch(e){}
}
/* ===== 错因统计（全局） ===== */
const DIAG={math:{},cn:{},en:{}};
function tally(sub,cause){ DIAG[sub][cause]=(DIAG[sub][cause]||0)+1;
  /* —— 本地记录完成后，追加一次云端上传（错题：ok=false）—— */
  try{
    ebUpload([{ kid:EB_KID, subject:ebSubject(sub), topic:ebCurTopic(sub),
      item:ebCurItem(sub), ok:false, hint:(cause||'')+'' }]);
  }catch(e){}
}
function diagReport(sub){
  const m=DIAG[sub]; const ks=Object.keys(m);
  if(!ks.length) return '没有错因记录——全对，太棒了！';
  ks.sort((a,b)=>m[b]-m[a]);
  return '错因统计：'+ks.map(k=>`${k}×${m[k]}`).join('，')+'。错最多的就是明天第11天要补的点。';
}

/* ===== 通用诊断引擎：两步（先认题型/句型 → 再答题）+ 错后归因 ===== */
function makeDiag(modId,intro,bank,hostId,causes,subKey){
  const M={bank:bank,q:0,phase:0,
    render(s){
      s.innerHTML=`<button class="back" onclick="goHome()">← 返回菜单</button>
        <div class="card"><h2>${intro.title}</h2><div class="lead">${intro.lead}</div>${lion(intro.lion)}</div>
        <div class="card"><h2>📋 诊断（共 ${bank.length} 题）</h2><div id="${hostId}"></div></div>`;
      this.q=0;this.phase=0;this.renderQ();
      setTimeout(()=>speak(intro.say),400);
    },
    renderQ(){
      const host=document.getElementById(hostId);if(!host)return;
      const it=this.bank[this.q];
      if(this.phase===0 && it.types){
        host.innerHTML=`<div style="font-size:16px;font-weight:700;margin-bottom:4px">${this.q+1}. ${it.t}</div>
          <div class="step">第①步：这是<b>什么${it.typeWord||'题型'}</b>？（先认对，再做）</div>
          <div class="opts">${it.types.map((x,i)=>`<button class="opt" onclick="Qz['${modId}'].pickType(${i},this)">${x}</button>`).join('')}</div>
          <div id="${hostId}fb"></div>
          <div class="dots">${this.bank.map((_,i)=>`<i class="${i<=this.q?'on':''}"></i>`).join('')}</div>`;
      } else {
        host.innerHTML=`<div style="font-size:16px;font-weight:700;margin-bottom:4px">${this.q+1}. ${it.t}</div>
          ${it.types?`<div class="step ok">题型：${it.types[it.ta]} ✓</div>`:''}
          <div class="step">第②步：选出正确答案。</div>
          <div class="opts">${it.o.map((x,i)=>`<button class="opt" onclick="Qz['${modId}'].pickAns(${i},this)">${x}</button>`).join('')}</div>
          <div id="${hostId}fb"></div>
          <div class="dots">${this.bank.map((_,i)=>`<i class="${i<=this.q?'on':''}"></i>`).join('')}</div>`;
      }
    },
    pickType(i,btn){
      const it=this.bank[this.q];const fb=document.getElementById(hostId+'fb');if(!fb)return;
      if(i===it.ta){btn.classList.add('right');ding();fb.innerHTML=`<div class="step ok">✅ 认对了！${it.te||''}</div>`;
        speak('题型认对了。');setTimeout(()=>{this.phase=1;this.renderQ();},1100);}
      else{btn.classList.add('wrong');tally(subKey,'审题/认错题型');
        fb.innerHTML=`<div class="step bad">题型认错了（已记入错因：审题）。再看一遍题里的关键词，重选。</div>`;
        speak('题型认错了，再看关键词。');setTimeout(()=>btn.classList.remove('wrong'),500);}
    },
    pickAns(i,btn){
      const it=this.bank[this.q];const fb=document.getElementById(hostId+'fb');if(!fb)return;
      if(i===it.a){btn.classList.add('right');ding();
        fb.innerHTML=`<div class="step ok">✅ 对！${it.e}</div>`;speak('答对了。'+it.e.replace(/<[^>]+>/g,''));
        this.next();}
      else{btn.classList.add('wrong');
        fb.innerHTML=`<div class="step bad"><b>正确：</b>${it.e}<br><b>你觉得自己错在哪？（点一个，记入错因表）</b>
          <div class="opts" style="margin-top:8px">${causes.map(c=>`<button class="opt" style="padding:9px 12px;font-size:14px" onclick="Qz['${modId}'].cause('${c}')">${c}</button>`).join('')}</div></div>`;
        speak('错了。'+it.e.replace(/<[^>]+>/g,'')+'。点一下你觉得错在哪。');
        setTimeout(()=>btn.classList.remove('wrong'),500);}
    },
    cause(c){ tally(subKey,c); const fb=document.getElementById(hostId+'fb');if(!fb)return;
      fb.innerHTML=`<div class="step">已记下错因：<b>${c}</b>。继续下一题。</div>`; ding(); this.next(); },
    next(){
      if(this.q<this.bank.length-1){ setTimeout(()=>{this.q++;this.phase=0;this.renderQ();},1300); }
      else{ burst(); setTimeout(()=>{const host=document.getElementById(hostId);if(!host)return;
        host.innerHTML=`<div class="step ok">🎉 ${intro.title} 完成！</div>
          <div class="kou">📋 ${diagReport(subKey)}</div>
          <div class="row"><button class="btn green" onclick="goHome()">回菜单</button></div>`;
        speak('这一科诊断完成。'+diagReport(subKey));},400); }
    }
  };
  return M;

    host.innerHTML=`<div style="font-weight:700;margin:8px 0">${this.q+1}. ${it.ask}</div>

  unpick(i){ this.cur=this.cur.filter(x=>x!==i);this.renderQ(); },
  reset(){ this.cur=[];this.renderQ(); },

    const it=this.bank[this.q];const fb=document.getElementById('pinfb');if(!fb)return;
