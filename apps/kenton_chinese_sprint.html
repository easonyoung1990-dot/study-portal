<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kenton 语文期末冲刺 · 四下(5-8单元)</title>
<style>
:root{--red:#D63A2E;--redd:#A82A20;--gold:#F2B632;--golddk:#D89400;--ink:#3A2A1E;--paper:#FBF3E6;--line:#EBDCC4;
--green:#3C9D54;--greenbg:#EAF7EC;--blue:#3170B5;--bluebg:#E8F0FA;--purple:#7B3FA0;--purplebg:#F3EAFA;--orange:#E8783C;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'LXGW WenKai Screen','PingFang SC','Microsoft YaHei',sans-serif;
background:radial-gradient(circle at 10% 6%,#FCE6B8 0,transparent 38%),radial-gradient(circle at 92% 96%,#F6D2C0 0,transparent 42%),var(--paper);
color:var(--ink);min-height:100vh;padding-bottom:34px;}
.wrap{max-width:740px;margin:0 auto;padding:14px;}
.top{display:flex;align-items:center;gap:10px;padding:12px 4px 6px;}
.top .badge{background:var(--red);color:#fff;font-weight:700;font-size:19px;padding:6px 13px;border-radius:13px 13px 13px 4px;box-shadow:0 4px 0 var(--redd);}
.top h1{font-size:19px;margin:0;}
.top .sub{font-size:12px;color:#a8946f;}
.top .spk{background:#fff;border:2px solid var(--gold);color:var(--golddk);border-radius:50%;width:42px;height:42px;font-size:20px;cursor:pointer;box-shadow:0 3px 0 #f0dca0;flex-shrink:0;}
.card{background:#fff;border:2px solid var(--line);border-radius:18px;padding:18px;margin:13px 0;box-shadow:0 6px 0 #efe1c8;}
.card h2{margin:0 0 8px;font-size:19px;color:var(--redd);}
.lead{font-size:14px;color:#7d6a4e;line-height:1.7;margin:0 0 10px;}
.bigmenu{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.bigtile{background:#fff;border:3px solid var(--line);border-radius:18px;padding:18px 12px;cursor:pointer;box-shadow:0 6px 0 #efe1c8;text-align:center;transition:transform .08s;position:relative;}
.bigtile:active{transform:translateY(3px);}
.bigtile .ic{font-size:40px;}
.bigtile .nm{font-weight:700;font-size:18px;margin-top:6px;}
.bigtile .ds{font-size:12px;color:#a08d6f;margin-top:4px;}
.bigtile .pg{font-size:11px;color:#a08d6f;margin-top:6px;}
.bigtile.done{border-color:var(--green);background:var(--greenbg);}
.bigtile .star{position:absolute;top:8px;right:10px;font-size:15px;}
.tcolor0{border-color:#bcd4ee;} .tcolor1{border-color:#cfe3c6;} .tcolor2{border-color:#ddc7ea;}
.tcolor3{border-color:#f3d2a0;} .tcolor4{border-color:#f0c4bc;} .tcolor5{border-color:#c9c0ee;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--red);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:16px;padding:12px 20px;border-radius:14px;box-shadow:0 4px 0 var(--redd);cursor:pointer;transition:transform .06s;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--redd);}
.btn.ghost{background:#fff;color:var(--redd);border:2px solid var(--red);box-shadow:0 4px 0 #f0d3cf;}
.btn.green{background:var(--green);box-shadow:0 4px 0 #2c7a40;}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 #225182;}
.btn.gray{background:#fff;color:#7d6a4e;border:2px solid var(--line);box-shadow:0 4px 0 #efe1c8;}
.btn.big{font-size:19px;padding:15px 26px;}
.btn.sm{font-size:14px;padding:9px 14px;}
.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:12px;justify-content:center;}
.back{background:none;border:none;color:#a08d6f;font-size:15px;font-family:inherit;cursor:pointer;padding:8px 2px;font-weight:700;}
.hidden{display:none!important;}
/* 做题界面 */
.qhead{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#a08d6f;font-weight:700;}
.qhead .sc{color:var(--golddk);}
.progbar{height:14px;background:#F0E6D2;border-radius:8px;margin:8px 0 4px;overflow:hidden;border:2px solid #E5D3Ae;}
.progbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#F8D070);border-radius:6px;transition:width .3s;}
.topic-chip{display:inline-block;background:var(--bluebg);color:var(--blue);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:4px;}
.qtextrow{display:flex;align-items:flex-start;gap:8px;margin:14px 0 6px;}
.qtext{font-size:21px;font-weight:700;line-height:1.5;color:var(--ink);flex:1;}
.qtext .blank{color:var(--blue);border-bottom:3px solid var(--gold);padding:0 14px;}
.spk2{background:#fff;border:2px solid var(--gold);color:var(--golddk);border-radius:12px;width:42px;height:42px;font-size:19px;cursor:pointer;box-shadow:0 3px 0 #f0dca0;flex-shrink:0;}
.spk2:active{transform:translateY(2px);box-shadow:0 1px 0 #f0dca0;}
.qsub{font-size:13px;color:#a08d6f;margin-bottom:8px;}
/* 选择题 */
.opts{display:grid;gap:10px;margin-top:6px;}
.opt{font-family:inherit;font-size:19px;font-weight:700;padding:15px 14px;border-radius:14px;border:2px solid var(--line);background:#fff;cursor:pointer;box-shadow:0 4px 0 #efe1c8;transition:transform .06s;color:var(--ink);text-align:left;word-break:break-word;display:flex;align-items:center;gap:10px;}
.opt:active{transform:translateY(2px);}
.opt .lab{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--bluebg);color:var(--blue);font-size:15px;display:grid;place-items:center;}
.opt .spkmini{margin-left:auto;flex-shrink:0;border:none;background:none;font-size:18px;cursor:pointer;color:var(--golddk);padding:2px 4px;}
.opt.right{background:var(--greenbg);border-color:var(--green);color:var(--green);box-shadow:0 4px 0 #bfe3c8;}
.opt.right .lab{background:var(--green);color:#fff;}
.opt.wrong{background:#FBE6E2;border-color:var(--red);color:var(--redd);box-shadow:0 4px 0 #f0c4bc;}
.opt.wrong .lab{background:var(--red);color:#fff;}
.opt.dim{opacity:.5;}
/* 反馈 */
.fb{border-radius:14px;padding:12px 14px;margin-top:12px;font-size:15px;line-height:1.7;}
.fb.ok{background:var(--greenbg);color:#2c7a40;border:2px solid var(--green);}
.fb.no{background:#FBE6E2;color:var(--redd);border:2px solid var(--red);}
.fb .ans{font-weight:800;font-size:18px;}
.fb .why{margin-top:5px;color:#6b5a42;font-size:14px;}
.lion{display:flex;gap:10px;align-items:flex-start;margin:10px 0;}
.lion .face{font-size:32px;flex-shrink:0;}
.lion .bubble{background:#fff;border:2px solid var(--line);border-radius:14px 14px 14px 2px;padding:10px 13px;font-size:15px;line-height:1.7;box-shadow:0 3px 0 #efe1c8;text-align:left;}
.kou{background:linear-gradient(180deg,#FCEFCF,#FBE6B0);border:2px dashed var(--golddk);border-radius:13px;padding:11px 14px;margin:11px 0;color:#7a5800;font-weight:700;font-size:14.5px;line-height:1.8;text-align:center;}
/* 小结 */
.scorebig{font-size:54px;font-weight:800;text-align:center;margin:10px 0 2px;font-variant-numeric:tabular-nums;}
.stars{font-size:30px;text-align:center;letter-spacing:4px;}
.weakrow{display:flex;align-items:center;gap:8px;background:#fff;border:2px solid var(--line);border-radius:12px;padding:9px 12px;margin:7px 0;font-size:14px;}
.weakrow .bar{flex:1;height:12px;background:#F0E6D2;border-radius:6px;overflow:hidden;}
.weakrow .bar i{display:block;height:100%;border-radius:6px;}
.wronglist{margin-top:6px;}
.wrongitem{border-bottom:1px solid var(--line);padding:9px 2px;font-size:14px;line-height:1.6;}
.wrongitem .q{font-weight:700;color:var(--ink);}
.wrongitem .a{color:var(--green);font-weight:700;}
.wrongitem .topic{font-size:11px;color:var(--blue);background:var(--bluebg);padding:1px 7px;border-radius:10px;}
textarea{width:100%;height:220px;font-size:12px;font-family:monospace;border:2px solid var(--line);border-radius:10px;padding:10px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge">Kenton</div>
    <div style="flex:1"><h1>语文期末冲刺 · 四下</h1><div class="sub">5-8单元 · 多音字 · 形近字 · 词语成语 · 古诗名句 · 文学常识 · 古文阅读</div></div>
    <button class="spk" onclick="testVoice()">🔊</button>
  </div>

  <div id="home">
    <div class="card">
      <div class="lion"><div class="face">🦁</div><div class="bubble">期末冲刺!选一关开始刷题，全是<b>点选题，不用打字</b>。每题做完<b>马上告诉你对不对、为什么</b>。题目里的字词可以点 🔊 听真人朗读。一关做完看小结，哪个知识点弱就再练那一关!</div></div>
      <div class="kou">先点右上角 🔊 试一下声音 · 错题会自动记进错题本 📒</div>
    </div>
    <div class="bigmenu" id="menu"></div>
    <div class="card" style="margin-top:14px;cursor:pointer" onclick="showArchive()">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:34px">📒</div>
        <div style="flex:1"><div style="font-weight:700;font-size:18px;color:var(--redd)">错题本 · 学习档案</div>
        <div style="font-size:13px;color:#7d6a4e" id="homestat">查看做过的题、反复错的知识点，可复制/下载给家长</div></div>
        <div style="font-size:22px;color:#a08d6f">›</div>
      </div>
    </div>
    <div class="card" style="text-align:center">
      <button class="btn blue big" onclick="startMixExam()">🎯 综合冲刺卷（各知识点混合 20 题）</button>
    </div>
  </div>

  <div id="quiz" class="hidden"></div>
  <div id="summary" class="hidden"></div>
  <div id="archive" class="hidden"></div>
</div>
<script>
"use strict";
/* ===================== 题库 =====================
   来源：四下期末 5-8 单元复习索引(kenton_chinese_review)与第2天冲刺卷(k_d2_chinese)。
   每题答案均已逐题核对，选项无重复多解，古诗/原文用权威文本。
   题型: type:'mc' 选择题。a=正确选项文字。o=选项数组(顺序固定,不重排)。
   say=朗读用的纯中文字词(给字音/古诗/词语,英语App才用en;本App全 zh)。 */
var TOPICS=[
 {key:'duoyin', icon:'🔤', name:'多音字·字音字形', color:0,
  intro:'多音字按词义定音、易错字音、看拼音写词语'},
 {key:'xingjin', icon:'✍️', name:'形近字·字形辨析', color:1,
  intro:'形声字偏旁辨义、形近字组词不写错别字'},
 {key:'ciyu', icon:'📚', name:'词语·成语·近反义', color:2,
  intro:'词语意思、读书求学成语、近义词反义词、补充成语'},
 {key:'shici', icon:'📜', name:'古诗名句·名言', color:3,
  intro:'古诗默写、自强/劝学名句填空与出处'},
 {key:'changshi', icon:'👤', name:'文学常识·课文主旨', color:4,
  intro:'课文作者、人物品质、诗歌类型与中心'},
 {key:'guwen', icon:'🧧', name:'古文·关联词·标点', color:5,
  intro:'文言字词意思、关联词搭配、标点与病句'},
];

var BANK={
/* ---------- 多音字 · 字音字形 ---------- */
duoyin:[
 {t:'「荷花」中的「荷」读什么？',say:'荷花',
  o:['hé','hè','hú','huó'],a:'hé',
  why:'「荷」是多音字：荷花读 hé；负荷、电荷读 hè。'},
 {t:'「负荷」中的「荷」读什么？',say:'负荷',
  o:['hè','hé','huò','hú'],a:'hè',
  why:'扛重担、电荷读 hè；荷花读 hé。多音字要放回词语里读。'},
 {t:'「引吭高歌」中的「吭」读什么？',say:'引吭高歌',
  o:['háng','kēng','kàng','hàng'],a:'háng',
  why:'「引吭高歌」放开嗓子唱，读 háng；「一声不吭」读 kēng。'},
 {t:'「鲜为人知」中的「鲜」读什么？',say:'鲜为人知',
  o:['xiǎn','xiān','xián','xiè'],a:'xiǎn',
  why:'「鲜为人知」是很少有人知道，「鲜」当「少」讲读 xiǎn；新鲜读 xiān。'},
 {t:'「倔强」中的「强」读什么？',say:'倔强',
  o:['jiàng','qiáng','qiǎng','jiāng'],a:'jiàng',
  why:'「倔强」性子硬不服输，读 jiàng；强大读 qiáng；勉强读 qiǎng。'},
 {t:'「刹那」的「刹」读什么？',say:'刹那',
  o:['chà','shà','chā','shā'],a:'chà',
  why:'「刹那」指极短的时间，读 chà；刹车读 shā。'},
 {t:'看拼音写词语：wèi lán（　）的天空，应写：',say:'蔚蓝',
  o:['蔚蓝','尉蓝','慰蓝','蔚兰'],a:'蔚蓝',
  why:'「蔚蓝」像晴朗天空那样的蓝色，是草字头的「蔚」。'},
 {t:'看拼音写词语：mào shèng（　）的树林，应写：',say:'茂盛',
  o:['茂盛','茂胜','貌盛','茂剩'],a:'茂盛',
  why:'「茂盛」指草木长得多而壮，草字头的「茂」+「盛」。'},
],
/* ---------- 形近字 · 字形辨析 ---------- */
xingjin:[
 {t:'选正确的字：坚不可（　）（攻不破）',say:'坚不可摧',
  o:['摧','催','崔','璀'],a:'摧',
  why:'「坚不可摧」是提手旁的「摧」(摧毁)；催=催促，崔=姓氏。'},
 {t:'选正确的字：（　）绝（不答应）',say:'拒绝',
  o:['拒','距','矩','炬'],a:'拒',
  why:'「拒绝」是提手旁的「拒」(用手挡开)；距=距离，矩=规矩。'},
 {t:'选正确的字：规（　）（规则）',say:'规矩',
  o:['矩','拒','距','炬'],a:'矩',
  why:'「规矩」是矢字旁的「矩」，本指画方的工具，引申为规则。'},
 {t:'选正确的字：胳（　）（手臂）',say:'胳膊',
  o:['膊','搏','博','缚'],a:'膊',
  why:'「胳膊」是月(肉)字旁的「膊」，跟身体部位有关；拼搏用「搏」。'},
 {t:'选正确的字：拼（　）（拼命努力）',say:'拼搏',
  o:['搏','膊','博','缚'],a:'搏',
  why:'「拼搏」是提手旁的「搏」，表用力搏斗；胳膊用「膊」。'},
 {t:'选正确的字：干（　）（不湿）',say:'干燥',
  o:['燥','躁','澡','噪'],a:'燥',
  why:'「干燥」是火字旁的「燥」，跟干、热有关；急躁用足字旁「躁」。'},
 {t:'选正确的字：急（　）（不耐烦）',say:'急躁',
  o:['躁','燥','澡','噪'],a:'躁',
  why:'「急躁」是足字旁的「躁」，跟脾气、动作有关；干燥用火字旁「燥」。'},
 {t:'选正确的字：向日（　）（一种花）',say:'向日葵',
  o:['葵','癸','睽','奎'],a:'葵',
  why:'「向日葵」是草字头的「葵」，是一种会朝着太阳的植物。'},
],
/* ---------- 词语 · 成语 · 近反义 ---------- */
ciyu:[
 {t:'「用口袋装萤火虫来照明读书」是哪个成语？',say:'囊萤夜读',
  o:['囊萤夜读','悬梁刺股','凿壁偷光','程门立雪'],a:'囊萤夜读',
  why:'晋朝车胤家穷买不起灯油，用薄绢口袋装萤火虫照明读书，叫「囊萤夜读」。'},
 {t:'「凿穿墙壁借邻居的光读书」是哪个成语？',say:'凿壁偷光',
  o:['凿壁偷光','囊萤夜读','悬梁刺股','手不释卷'],a:'凿壁偷光',
  why:'匡衡在墙上凿洞借邻居的灯光读书，叫「凿壁偷光」。'},
 {t:'「书本不离手，形容勤奋好学」是哪个成语？',say:'手不释卷',
  o:['手不释卷','程门立雪','铁杵成针','凿壁偷光'],a:'手不释卷',
  why:'「释」是放下，「卷」是书；手不释卷=书总不离手，非常勤奋。'},
 {t:'意思是「遇到危险时一点也不害怕」的词语是？',say:'临危不惧',
  o:['临危不惧','彬彬有礼','焦躁不安','心急如焚'],a:'临危不惧',
  why:'「临危不惧」：面临危险毫不畏惧，形容人勇敢镇定。'},
 {t:'意思是「形容文雅有礼貌」的词语是？',say:'彬彬有礼',
  o:['彬彬有礼','临危不惧','心急如焚','焦躁不安'],a:'彬彬有礼',
  why:'「彬彬有礼」形容人举止文雅、很有礼貌。'},
 {t:'「著名」的近义词是？',say:'著名',
  o:['闻名','陌生','普通','奇怪'],a:'闻名',
  why:'「著名」=有名、出名，近义词是「闻名」(还可说「有名」)。'},
 {t:'「慷慨」的反义词是？',say:'慷慨',
  o:['吝啬','大方','热情','勇敢'],a:'吝啬',
  why:'「慷慨」指大方、不小气；反义词是「吝啬」(小气、舍不得)。'},
 {t:'把成语补充完整：千（　）一发（形容非常危急）',say:'千钧一发',
  o:['钧','均','军','君'],a:'钧',
  why:'「千钧一发」千钧重量吊在一根头发上，形容极其危急。「钧」是古代重量单位。'},
],
/* ---------- 古诗名句 · 名言 ---------- */
shici:[
 {t:'《宿新市徐公店》：篱落疏疏一径深，（　）。',say:'树头新绿未成阴',
  o:['树头新绿未成阴','麦花雪白菜花稀','飞入菜花无处寻','桃花流水鳜鱼肥'],a:'树头新绿未成阴',
  why:'杨万里《宿新市徐公店》：「篱落疏疏一径深，树头新绿未成阴。」'},
 {t:'《宿新市徐公店》：儿童急走追黄蝶，（　）。',say:'飞入菜花无处寻',
  o:['飞入菜花无处寻','树头新绿未成阴','麦花雪白菜花稀','斜风细雨不须归'],a:'飞入菜花无处寻',
  why:'下句「飞入菜花无处寻」——蝴蝶飞进黄菜花里就找不着了，画面很有趣。'},
 {t:'《四时田园杂兴》：梅子金黄杏子肥，（　）。',say:'麦花雪白菜花稀',
  o:['麦花雪白菜花稀','桃花流水鳜鱼肥','飞入菜花无处寻','斜风细雨不须归'],a:'麦花雪白菜花稀',

var SUB='语文';

function show(id){['home','quiz','summary','archive'].forEach(function(x){document.getElementById(x).classList.add('hidden');});
  document.getElementById(id).classList.remove('hidden');haltAudio();try{if(window.speechSynthesis)window.speechSynthesis.cancel();}catch(e){}window.scrollTo(0,0);}
function goHome(){renderMenu();refreshHomeStat();show('home');}

/* ===================== 神经真人朗读层(edge-tts 预合成)，失败回退浏览器TTS ===================== */
/* 预合成目录:每条音频按 fnv(lang+"|"+text) 命名,与 gen_audio_manifest 一致。本App只朗读中文(lang='zh')。 */
var AUDIO_DIR="audio/kenton_chinese_sprint/";
var exAudio=null;   // 单个复用音频元素:首次手势(warm)解锁,之后每段复用(移动端更兼容)
var audioTok=0;     // 打断/超时保护:自增令牌让过期回调失效
/* 必须与清单的 fnv() 一致:对 (lang+"|"+text) 的 UTF-8 字节做 FNV-1a，取8位十六进制 */
function audioHash(s){var b=new TextEncoder().encode(s);var x=0x811c9dc5>>>0;for(var i=0;i<b.length;i++){x^=b[i];x=Math.imul(x,0x01000193)>>>0;}return ('0000000'+x.toString(16)).slice(-8);}
function getExAudio(){if(!exAudio){exAudio=new Audio();exAudio.setAttribute('playsinline','');exAudio.preload='auto';try{document.body.appendChild(exAudio);}catch(e){}}return exAudio;}
function haltAudio(){audioTok++;if(exAudio){try{exAudio.pause();}catch(e){}}}

var voices=[];function loadVoices(){try{voices=speechSynthesis.getVoices();}catch(e){}}
if('speechSynthesis'in window){loadVoices();try{speechSynthesis.onvoiceschanged=loadVoices;}catch(e){}}
var warmed=false;function warm(){if(!('speechSynthesis'in window))return;try{speechSynthesis.resume();}catch(e){}if(warmed)return;loadVoices();try{var wu=new SpeechSynthesisUtterance('ok');wu.volume=0.02;speechSynthesis.speak(wu);}catch(e){}warmed=true;}
document.body.addEventListener('touchstart',warm,{once:true});
document.body.addEventListener('click',warm,{once:true});
document.addEventListener('visibilitychange',function(){if(document.hidden){haltAudio();try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}}});
function mkUtter(t,lang){
  var u=new SpeechSynthesisUtterance(t);
  if(lang==='en'){var ve=voices.find(function(v){return /^en/i.test(v.lang);});if(ve)u.voice=ve;u.lang=(ve&&ve.lang)||'en-GB';u.rate=0.9;}
  else{var v=voices.find(function(v){return /zh|cmn|Chinese/i.test(v.lang);});if(v)u.voice=v;u.lang='zh-CN';u.rate=0.9;}
  u.pitch=1.0;return u;
}
/* 浏览器TTS:作为回退 */
function ttsSpeakOnce(t,lang){try{speechSynthesis.cancel();speechSynthesis.resume();}catch(e){}try{speechSynthesis.speak(mkUtter(t,lang));}catch(e){}}
/* 朗读一次:优先播预合成神经语音(AUDIO_DIR+hash.mp3)，缺失/失败回退浏览器 TTS */
function speakOnce(t,lang){
  lang=lang||'zh';
  try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
  audioTok++;var myTok=audioTok;
  var a=getExAudio();var done=false;
  function stale(){return done||myTok!==audioTok;}
  function fb(){if(stale())return;done=true;ttsSpeakOnce(t,lang);}
  a.onended=function(){if(stale())return;done=true;};
  a.onerror=fb;
  try{a.pause();}catch(e){}
  a.src=AUDIO_DIR+audioHash(lang+"|"+t)+".mp3";
  try{a.currentTime=0;}catch(e){}
  var p=a.play();
  if(p&&typeof p.catch==='function')p.catch(fb);
}
function testVoice(){
  if(!('speechSynthesis'in window)){var k=document.querySelector('.kou');if(k)k.textContent='这个浏览器不支持朗读，请用 Safari 或 Chrome 打开';return;}
  warm();speakOnce('你好哥哥，我们来冲刺语文期末。','zh');
}

/* ===================== 归档 + 云端 ===================== */
function loadArchive(){try{return JSON.parse(localStorage.getItem(AKEY))||{child:CHILD,subject:SUB,events:[]};}catch(e){return{child:CHILD,subject:SUB,events:[]};}}
function saveArchive(a){try{localStorage.setItem(AKEY,JSON.stringify(a));}catch(e){}}
function logEvent(ev){var a=loadArchive();a.events.push(ev);saveArchive(a);cloudUpload(ev);}
/* 云端上传:端点缺失/断网/出错都静默,绝不影响使用(fire-and-forget,不 await,整段 try/catch) */
function cloudUpload(ev){
  try{
    var endpoint=null;
    try{endpoint=localStorage.getItem('eb_endpoint');}catch(e){}
    if(!endpoint)return;
    var topic=ev.topic||'';
    var items=(ev.items||[]).map(function(it){
      return {kid:KID,subject:SUB,topic:topic,
        item:(it.word!=null?it.word:''),
        ok:!!it.ok,hint:(it.hint!=null?it.hint:'')};
    });
    if(!items.length)return;
    fetch(endpoint,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(items)})
      .then(function(){}).catch(function(){});
  }catch(e){}
}
function fmtDate(ts){var d=new Date(ts);var p=function(n){return (n<10?'0':'')+n;};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());}
/* 聚合:按知识点统计累计对错 */
function aggregateTopics(events){
  var m={};
  events.forEach(function(ev){(ev.items||[]).forEach(function(it){
    var key=it.topic||ev.topic||'其它';
    if(!m[key])m[key]={topic:key,ok:0,wrong:0};
    if(it.ok)m[key].ok++;else m[key].wrong++;
  });});
  return m;
}
function refreshHomeStat(){
  var a=loadArchive();var el=document.getElementById('homestat');if(!el)return;
  if(!a.events.length){el.textContent='还没有记录——做完一关就会自动归档进错题本';return;}
  var wrong=0,total=0;a.events.forEach(function(ev){(ev.items||[]).forEach(function(it){total++;if(!it.ok)wrong++;});});
  el.innerHTML='共做 <b>'+total+'</b> 题 ｜ 错 <b style="color:var(--red)">'+wrong+'</b> 题 ｜ 点这里看错题/导出';
}

/* ===================== 首页关卡 ===================== */
function topicBest(name){
  var a=loadArchive();var best=null;
  a.events.forEach(function(ev){if(ev.topic===name&&ev.total){var pct=Math.round((ev.total-ev.wrong)/ev.total*100);if(best===null||pct>best)best=pct;}});
  return best;
}
function starStr(pct){if(pct===null)return '';if(pct>=90)return '⭐⭐⭐';if(pct>=70)return '⭐⭐';if(pct>=1)return '⭐';return '';}
function renderMenu(){
  var m=document.getElementById('menu');
  m.innerHTML=TOPICS.map(function(tp){
    var best=topicBest(tp.name);
    var star=starStr(best);
    return '<div class="bigtile tcolor'+tp.color+(best!==null&&best>=90?' done':'')+'" onclick="startTopic(\''+tp.key+'\')">'+
      (star?'<div class="star">'+star+'</div>':'')+
      '<div class="ic">'+tp.icon+'</div>'+
      '<div class="nm">'+tp.name+'</div>'+
      '<div class="ds">'+BANK[tp.key].length+' 题</div>'+
      (best!==null?'<div class="pg">最好 '+best+'% 正确</div>':'<div class="pg">还没做过</div>')+
      '</div>';
  }).join('');
}

/* ===================== 开始做题 ===================== */
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function startTopic(key){
  var tp=TOPICS.filter(function(t){return t.key===key;})[0];
  warm();
  G.topicKey=key;G.topicName=tp.name;G.isMix=false;
  G.items=BANK[key].map(function(q){var o=Object.assign({_topic:tp.name},q);return o;});
  G.idx=0;G.correct=0;G.results=[];G.startTime=Date.now();
  renderQuiz();show('quiz');
}
function startMixExam(){
  warm();
  G.topicKey='mix';G.topicName='综合冲刺卷';G.isMix=true;
  var pool=[];
  TOPICS.forEach(function(tp){
    var qs=shuffle(BANK[tp.key]).slice(0,4).map(function(q){return Object.assign({_topic:tp.name},q);});
    pool=pool.concat(qs);
  });
  pool=shuffle(pool).slice(0,20);
  G.items=pool;
  G.idx=0;G.correct=0;G.results=[];G.startTime=Date.now();
  renderQuiz();show('quiz');
}

function esc(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function renderQuiz(){
  var b=document.getElementById('quiz');
  var it=G.items[G.idx];
  G.answered=false;
  var pct=Math.round(G.idx/G.items.length*100);
  var qhtml=esc(it.t).replace(/（　）|\(\s*\)|□|______/g,'<span class="blank">？</span>');
  var html='<button class="back" onclick="confirmQuit()">← 退出本关</button>'+
   '<div class="card">'+
    '<div class="qhead"><span>第 '+(G.idx+1)+' / '+G.items.length+' 题</span><span class="sc">⭐ 已对 '+G.correct+'</span></div>'+
    '<div class="progbar"><i style="width:'+pct+'%"></i></div>'+
    (G.isMix?'<div class="topic-chip">'+esc(it._topic)+'</div>':'')+
    '<div class="qtextrow"><div class="qtext">'+qhtml+'</div>'+
      (it.say?'<button class="spk2" title="朗读" onclick="speakOnce(this.dataset.s,\'zh\')" data-s="'+esc(it.say)+'">🔊</button>':'')+
    '</div>'+
    '<div class="qsub">点一个选项，做完看讲解 👇</div>'+
    '<div class="opts" id="opts">'+
      it.o.map(function(x,i){
        var lab=String.fromCharCode(65+i);
        var readable=/[一-龥]/.test(x);
        return '<button class="opt" onclick="answerMC('+i+')">'+
          '<span class="lab">'+lab+'</span><span>'+esc(x)+'</span>'+
          (readable?'<span class="spkmini" onclick="event.stopPropagation();speakOnce(this.dataset.s,\'zh\')" data-s="'+esc(x)+'">🔊</span>':'')+
        '</button>';
      }).join('')+
    '</div>'+
    '<div id="fb"></div></div>';
  b.innerHTML=html;
  // 进题自动朗读题面里的字词(短词/古诗才读，避免长句啰嗦)
  if(it.say&&it.say.length<=12)setTimeout(function(){speakOnce(it.say,'zh');},250);
}

/* 选择题作答 */
function answerMC(i){
  if(G.answered)return;G.answered=true;
  var it=G.items[G.idx];
  var chosen=it.o[i];
  var ok=(chosen===it.a);
  var btns=document.querySelectorAll('#opts .opt');
  for(var k=0;k<btns.length;k++){
    btns[k].onclick=null;btns[k].style.pointerEvents='none';
    var optTxt=it.o[k];
    if(optTxt===it.a)btns[k].classList.add('right');
    else if(k===i)btns[k].classList.add('wrong');
    else btns[k].classList.add('dim');
  }
  recordAndFeedback(ok,it,it.a,chosen);
}
function recordAndFeedback(ok,it,correctShown,chosen){
  if(ok)G.correct++;
  G.results.push({word:it.t,hint:(''+it.a),ok:ok,topic:it._topic,why:it.why,shown:correctShown,user:chosen});
  var fb=document.getElementById('fb');
  if(fb){
    if(ok){
      ding();
      fb.innerHTML='<div class="fb ok">✅ 答对了！<div class="why">💡 '+esc(it.why)+'</div></div>';
    }else{
      fb.innerHTML='<div class="fb no">❌ 正确答案：<span class="ans">'+esc(correctShown)+'</span><div class="why">💡 '+esc(it.why)+'</div></div>';
    }
    fb.innerHTML+='<div class="row"><button class="btn '+(G.idx<G.items.length-1?'green':'blue')+' big" onclick="nextQ()">'+(G.idx<G.items.length-1?'下一题 →':'看小结 🎉')+'</button></div>';
  }
}
function nextQ(){
  if(G.idx<G.items.length-1){G.idx++;renderQuiz();window.scrollTo(0,0);}
  else{finishTopic();}
}
function confirmQuit(){
  if(G.results.length&&!confirm('确定退出本关吗？已做的题不会保存到错题本。'))return;
  goHome();
}

/* ===================== 小结 ===================== */
function finishTopic(){
  var total=G.items.length,wrong=total-G.correct;
  logEvent({ts:Date.now(),topic:G.topicName,isMix:G.isMix,total:total,wrong:wrong,
    durationSec:Math.round((Date.now()-G.startTime)/1000),
    items:G.results.map(function(r){return {word:r.word,hint:r.hint,ok:r.ok,topic:r.topic};})});

  var pct=Math.round(G.correct/total*100);
  var stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=50?'⭐':'☆';
  var cheer=pct>=90?'太棒了，几乎全对！':pct>=70?'不错，再练练弱项就更稳！':pct>=50?'有进步，错的题要重点看！':'别灰心，把错题再做一遍就会了！';

  var byTopic={};
  G.results.forEach(function(r){if(!byTopic[r.topic])byTopic[r.topic]={ok:0,wrong:0};if(r.ok)byTopic[r.topic].ok++;else byTopic[r.topic].wrong++;});

  var wrongs=G.results.filter(function(r){return !r.ok;});

  var html='<button class="back" onclick="goHome()">← 返回首页</button>'+
   '<div class="card" style="text-align:center">'+
    '<h2>🎉 '+esc(G.topicName)+' · 完成</h2>'+
    '<div class="scorebig" style="color:'+(wrong===0?'var(--green)':'var(--redd)')+'">'+G.correct+' / '+total+'</div>'+
    '<div class="stars">'+stars+'</div>'+
    '<div class="kou">'+cheer+'（正确率 '+pct+'%）</div>';

  // 各知识点掌握条(综合卷或跨多知识点时显示)
  var topicKeys=Object.keys(byTopic);
  if(topicKeys.length>1){
    html+='<div style="text-align:left;margin-top:10px"><div style="font-weight:700;color:var(--redd);margin-bottom:6px">📊 各知识点掌握情况</div>';
    topicKeys.forEach(function(tk){
      var d=byTopic[tk];var tt=d.ok+d.wrong;var p=Math.round(d.ok/tt*100);
      var col=p>=90?'var(--green)':p>=60?'var(--gold)':'var(--red)';
      html+='<div class="weakrow"><span style="width:130px;flex-shrink:0">'+esc(tk)+'</span>'+
        '<span class="bar"><i style="width:'+p+'%;background:'+col+'"></i></span>'+
        '<span style="width:54px;text-align:right;font-weight:700;color:'+col+'">'+d.ok+'/'+tt+'</span></div>';
    });
    html+='</div>';
  }
  html+='</div>';

  // 错题回看
  if(wrongs.length){
    html+='<div class="card"><h2 style="color:var(--red)">📒 这次的错题（已记进错题本）</h2><div class="wronglist">'+
      wrongs.map(function(r){return '<div class="wrongitem">'+
        (G.isMix?'<span class="topic">'+esc(r.topic)+'</span> ':'')+
        '<div class="q">'+esc(r.word)+'</div>'+
        '<div>正确答案：<span class="a">'+esc(r.shown)+'</span></div>'+
        '<div style="color:#6b5a42;font-size:13px;margin-top:2px">💡 '+esc(r.why)+'</div>'+
      '</div>';}).join('')+'</div></div>';
  }else{
    html+='<div class="card"><div class="kou">这一关全对，没有错题！🏆</div></div>';
  }

  html+='<div class="card" style="text-align:center"><div class="row">'+
    (G.isMix?'':'<button class="btn green big" onclick="startTopic(\''+G.topicKey+'\')">🔁 再做一遍这关</button>')+
    '<button class="btn blue big" onclick="goHome()">🏠 返回选关</button>'+
    '</div></div>';

  document.getElementById('summary').innerHTML=html;
  show('summary');
}

/* ===================== 错题本视图 ===================== */
function showArchive(){
  var a=loadArchive();var b=document.getElementById('archive');
  var tagg=aggregateTopics(a.events);
  var weak=Object.keys(tagg).map(function(k){return tagg[k];}).filter(function(t){return t.wrong>0;}).sort(function(x,y){return y.wrong-x.wrong;});
  var evs=a.events.slice().reverse();
  var wrongQs=[];var seen={};
  evs.forEach(function(ev){(ev.items||[]).forEach(function(it){if(!it.ok&&!seen[it.word]){seen[it.word]=1;wrongQs.push({q:it.word,a:it.hint,topic:it.topic||ev.topic});}});});

  var html='<button class="back" onclick="goHome()">← 返回</button>'+
   '<div class="card"><h2>📒 '+CHILD+' 语文错题本</h2>'+
    '<div class="lead">共做 '+a.events.length+' 关。下面数据可<b>一键复制</b>发家长，或<b>下载</b>保存。</div>'+
    '<div class="row" style="justify-content:flex-start">'+
      '<button class="btn sm blue" onclick="copyArchive()">📋 一键复制</button>'+
      '<button class="btn sm green" onclick="downloadArchive()">📥 下载存档</button>'+
      '<button class="btn sm gray" onclick="clearArchive()">🗑 清空</button></div></div>';

  if(weak.length){
    html+='<div class="card"><h2 style="color:var(--red)">🔴 薄弱知识点（按错题多少排）</h2>';
    weak.forEach(function(t){var tt=t.ok+t.wrong;var p=Math.round(t.ok/tt*100);var col=p>=90?'var(--green)':p>=60?'var(--gold)':'var(--red)';
      html+='<div class="weakrow"><span style="width:140px;flex-shrink:0">'+esc(t.topic)+'</span>'+
        '<span class="bar"><i style="width:'+p+'%;background:'+col+'"></i></span>'+
        '<span style="width:60px;text-align:right;font-weight:700;color:'+col+'">'+t.ok+'/'+tt+'</span></div>';
    });
    html+='</div>';
  }

  if(wrongQs.length){
    html+='<div class="card"><h2>❌ 做错过的题</h2><div class="wronglist">'+
      wrongQs.map(function(w){return '<div class="wrongitem">'+(w.topic?'<span class="topic">'+esc(w.topic)+'</span> ':'')+
        '<div class="q">'+esc(w.q)+'</div><div>正确答案：<span class="a">'+esc(w.a)+'</span></div></div>';}).join('')+
      '</div></div>';
  }

  html+='<div class="card"><h2>📅 练习记录</h2>'+
    (evs.length?evs.map(function(ev){return '<div style="border-bottom:1px solid var(--line);padding:9px 0">'+
      '<div style="font-weight:700">'+(ev.isMix?'🎯综合卷':'📘'+esc(ev.topic))+
        '<span style="float:right;color:#a08d6f;font-size:12px">'+fmtDate(ev.ts)+'</span></div>'+
      '<div style="font-size:13px;color:#7d6a4e;margin-top:3px">'+(ev.total-ev.wrong)+'/'+ev.total+' 对 ｜ 用时 '+ev.durationSec+'秒'+
        (ev.wrong?' ｜ 错 <span style="color:var(--red)">'+ev.wrong+'</span> 题':' ｜ 全对 ✓')+'</div></div>';
      }).join(''):'<div class="lead">还没有记录</div>')+'</div>';

  html+='<div class="card hidden" id="copybox"><h2>复制下面全部文字</h2>'+
    '<textarea id="copytext"></textarea></div>';

  b.innerHTML=html;show('archive');
}
function archiveText(){
  var a=loadArchive();var tagg=aggregateTopics(a.events);
  var weak=Object.keys(tagg).map(function(k){return tagg[k];}).sort(function(x,y){return y.wrong-x.wrong;});
  var t='【'+CHILD+' · 语文(四下5-8单元)期末冲刺学习档案】导出时间:'+fmtDate(Date.now())+'\n练习总关数:'+a.events.length+'\n\n';
  t+='== 各知识点掌握(对/总) ==\n';
  t+=weak.length?weak.map(function(w){var tt=w.ok+w.wrong;return w.topic+': '+w.ok+'/'+tt+' 对'+(w.wrong?' (错'+w.wrong+')':'');}).join('\n'):'(无)';
  t+='\n\n== 做错过的题 ==\n';
  var evs=a.events.slice().reverse();var seen={};var wl=[];
  evs.forEach(function(ev){(ev.items||[]).forEach(function(it){if(!it.ok&&!seen[it.word]){seen[it.word]=1;wl.push('['+(it.topic||ev.topic)+'] '+it.word+' → 正确:'+it.hint);}});});
  t+=wl.length?wl.join('\n'):'(无)';
  t+='\n\n== 每关明细 ==\n';
  a.events.forEach(function(ev){t+='\n['+fmtDate(ev.ts)+'] '+(ev.isMix?'综合卷':ev.topic)+' ｜ '+(ev.total-ev.wrong)+'/'+ev.total+'对 ｜ '+ev.durationSec+'秒';});
  t+='\n\n== 原始数据(JSON) ==\n'+JSON.stringify(a);
  return t;
}
function copyArchive(){
  var txt=archiveText();
  var box=document.getElementById('copybox');var ta=document.getElementById('copytext');
  if(box&&ta){box.classList.remove('hidden');ta.value=txt;ta.focus();ta.select();}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){}).catch(function(){});}
}
function downloadArchive(){
  var txt=archiveText();var blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download=CHILD+'语文错题档案.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}
function clearArchive(){if(confirm('确定清空 '+CHILD+' 的语文错题记录吗？不能撤销。')){localStorage.removeItem(AKEY);showArchive();}}

/* 答对提示音 */
function ding(){try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start();o.stop(ctx.currentTime+0.3);}catch(e){}}

/* ===================== 启动 ===================== */
window.addEventListener('load',function(){renderMenu();refreshHomeStat();});
