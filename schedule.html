<html lang="zh-CN">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>暑期课表（9点后起床版）</title>
<style>
  :root{ --bg:#fff7f0; --ink:#3a2e3f; --muted:#8a7e91; --card:#fff; --sh:0 6px 18px rgba(120,90,140,.14); --r:18px;
         --kenton:#36c5d6; --eddey:#ff8a5b; --p:#b197fc; --g:#8ce99a; --y:#ffd166; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--ink);
       background:radial-gradient(circle at 12% 8%,#ffe9f3 0,transparent 40%),radial-gradient(circle at 88% 4%,#e6f9ff 0,transparent 38%),var(--bg);min-height:100vh;}
  .wrap{max-width:620px;margin:0 auto;padding:16px 14px 50px;}
  h1{font-size:21px;margin:6px 2px 2px;}
  .sub{color:var(--muted);font-size:13px;margin:0 2px 14px;}
  .tabs{display:flex;gap:8px;margin-bottom:14px;position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);padding:6px 0;z-index:5;}
  .tab{flex:1;border:2px solid #eee;background:#fff;border-radius:999px;padding:10px;font-weight:800;font-size:15px;cursor:pointer;color:var(--ink);}
  .tab.on{border-color:var(--ink);background:var(--ink);color:#fff;}
  .box{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:12px;}
  .box h3{margin:0 0 8px;font-size:15px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-size:12px;font-weight:700;border-radius:999px;padding:5px 10px;background:#f3eef9;color:#5b4b7a;}
  .legend{display:flex;flex-wrap:wrap;gap:6px 12px;font-size:12px;color:var(--muted);}
  .pickup{font-size:13px;line-height:1.7;}
  .pickup b{color:var(--ink);}
  .day{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:12px;border-left:7px solid var(--p);}
  .day .dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .day .dn{font-size:17px;font-weight:800;}
  .day .loc{font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;background:#eef6ff;color:#2a6ea8;}
  .day .loc.jq{background:#fff0e6;color:#b85a26;}
  .day .loc.ay{background:#f0fff0;color:#2f8a3f;}
  .row{display:flex;gap:10px;padding:6px 0;border-top:1px dashed #eee;font-size:14px;line-height:1.45;}
  .row:first-of-type{border-top:none;}
  .row .tm{flex:0 0 60px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;}
  .row .ac{flex:1;}
  .row.hi .ac{font-weight:700;}
  .row.car{background:#fff7ef;border-radius:10px;margin:3px -6px;padding:7px 6px;}
  .end{color:var(--muted);font-size:12px;}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:18px;}
</style>
</head>

  <div class="box" id="pickupBox">
    <h3>🚗 接送清单</h3>
    <div class="pickup" id="pickup"></div>
  </div>

  <div class="box">

    <div class="legend">

    </div>
  </div>

  <div id="days"></div>
